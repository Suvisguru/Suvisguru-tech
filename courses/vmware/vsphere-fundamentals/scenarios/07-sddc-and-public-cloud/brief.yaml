# Intake brief — Lesson 07, vSphere Fundamentals
# Topic: Software-Defined Datacenter and how it forms the foundation of public cloud.

lesson:
  title: "Software-Defined Datacenter and the foundation of public cloud"
  slug: "07-sddc-and-public-cloud"
  domain: "vmware"
  course_slug: "vsphere-fundamentals"
  position: 7
  granularity: "concept"
  brief_drafted_on: "2026-04-30"

learner_profile:
  prerequisites: ["Lessons 01-06."]

learning_outcomes:
  - "Learner can name the four layers of an SDDC: compute, storage, network, management/automation."
  - "Learner can identify VMware product equivalents (vSphere, vSAN, NSX, vCenter+vRealize)."
  - "Learner can articulate why public cloud (AWS, Azure, GCP) is fundamentally an SDDC at hyperscale."

scope:
  in_scope:
    - "Compute virtualization (vSphere)."
    - "Storage virtualization (vSAN as canonical example, plus general software-defined storage)."
    - "Network virtualization (NSX as canonical, plus general SDN)."
    - "Management and automation plane."
    - "How AWS/Azure/GCP map to these layers."
  out_of_scope: ["Specific NSX feature breakdown, vSAN policies, hybrid-cloud specifics — separate lessons."]
  decomposition_needed: false

planned_sections:
  concept_explanation: { target_words: 280 }
  before_after: { target_words_each_side: 110 }
  analogy: { direction: "From apartment building to entire city — every street, utility, traffic light is software-defined." }
  eli5: { target_words_max: 100 }
  eli10: { target_words: 240 }
  real_world_scenarios: { count: 4 }
  static_diagram: { purpose: "SDDC stack with all four layers + arrow showing public cloud is the same stack at hyperscale." }
  animated_illustration: { mode_toggles: ["compute", "storage", "network", "management", "cloud"] }
  flashcards: { count: 10 }
  quiz: { count: 3 }

interactive_preview_page:
  hero_widget: "Build-the-SDDC. Click to add each layer in order."
  hover_to_define_terms: ["SDDC", "vSAN", "NSX", "software-defined", "hyperscale"]
