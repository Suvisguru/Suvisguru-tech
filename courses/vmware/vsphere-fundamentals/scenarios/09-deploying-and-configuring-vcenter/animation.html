<!DOCTYPE html>
<!--
  Lesson 09 — Deploying and Configuring vCenter Server
  Eight modes: overview / prereqs / stage1 / stage2 / sso / rbac / inventory / ha
  Pause/Play + Speed slider parity with lessons 1-8.
  No transform-origin on rotation groups (per DECISIONS.md).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deploying and Configuring vCenter — animation</title>
<style>
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; margin: 0; }
  .controls { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .mode-btn { border: 1px solid #d8d6cf; background: #ffffff; color: #3a3a3a; padding: 8px 11px; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; animation: btn-pop 2.4s ease-in-out infinite; }
  @keyframes btn-pop { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(63,74,94,0); } 50% { transform: scale(1.035); box-shadow: 0 0 0 4px rgba(63,74,94,0.08); } }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active { background: #3F4A5E; color: #FFFFFF; border-color: #3F4A5E; animation: none; }
  .stage-label { font-size: 15px; color: #3a3a3a; margin: 12px 0 18px 0; font-weight: 500; }
  .speed-control { margin-left: auto; font-size: 13px; color: #5F5E5A; display: flex; gap: 8px; align-items: center; }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas { width: 100%; max-width: 1040px; height: auto; display: block; }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="overview"]  .mode-overview,
  #canvas[data-mode="prereqs"]   .mode-prereqs,
  #canvas[data-mode="stage1"]    .mode-stage1,
  #canvas[data-mode="stage2"]    .mode-stage2,
  #canvas[data-mode="sso"]       .mode-sso,
  #canvas[data-mode="rbac"]      .mode-rbac,
  #canvas[data-mode="inventory"] .mode-inventory,
  #canvas[data-mode="ha"]        .mode-ha { display: block; }
</style>
</head>
<body>

<div class="controls">
  <button class="mode-btn active" data-mode="overview" type="button">1 · Overview</button>
  <button class="mode-btn" data-mode="prereqs" type="button">2 · Prereqs</button>
  <button class="mode-btn" data-mode="stage1" type="button">3 · Stage 1</button>
  <button class="mode-btn" data-mode="stage2" type="button">4 · Stage 2</button>
  <button class="mode-btn" data-mode="sso" type="button">5 · SSO</button>
  <button class="mode-btn" data-mode="rbac" type="button">6 · RBAC</button>
  <button class="mode-btn" data-mode="inventory" type="button">7 · Inventory · Backup</button>
  <button class="mode-btn" data-mode="ha" type="button">8 · vCenter HA</button>
  <button class="mode-btn" id="play-btn" type="button">Pause</button>
  <span class="speed-control"><span>Speed</span><input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider"><span id="speed-display">1.0&times;</span></span>
</div>
<div class="stage-label" id="stage-label">Subtopic 1 of 8 · Overview: vCenter ties many ESXi hosts into one managed fleet, unlocking vMotion, DRS, HA, and central RBAC.</div>

<svg id="canvas" data-mode="overview" viewBox="0 0 1040 540" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="aArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3F4A5E"/>
    </marker>
    <marker id="aArrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1F8A60"/>
    </marker>
    <marker id="aArrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#B85829"/>
    </marker>
  </defs>

  <!-- ============================================
       MODE 1: OVERVIEW
       Story: 6 hosts on the left appear one at a time, vCenter on the right gathers them into one view, then highlights vMotion (a VM jumps from one host to another).
       ============================================ -->
  <g class="mode-group mode-overview">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 1 — vCENTER MANAGES MANY HOSTS</text>

    <!-- 6 hosts on the left -->
    <g transform="translate(80,90)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#1F2937">ESXi hosts</text>
      <g>
        <g><rect x="0" y="20" width="120" height="40" rx="4" fill="#3F4A5E"/><text x="60" y="44" text-anchor="middle" font-size="11" fill="#FFFFFF">esx-01</text></g>
        <g><rect x="0" y="70" width="120" height="40" rx="4" fill="#3F4A5E"/><text x="60" y="94" text-anchor="middle" font-size="11" fill="#FFFFFF">esx-02</text></g>
        <g><rect x="0" y="120" width="120" height="40" rx="4" fill="#3F4A5E"/><text x="60" y="144" text-anchor="middle" font-size="11" fill="#FFFFFF">esx-03</text></g>
        <g><rect x="0" y="170" width="120" height="40" rx="4" fill="#3F4A5E"/><text x="60" y="194" text-anchor="middle" font-size="11" fill="#FFFFFF">esx-04</text></g>
        <g><rect x="0" y="220" width="120" height="40" rx="4" fill="#3F4A5E"/><text x="60" y="244" text-anchor="middle" font-size="11" fill="#FFFFFF">esx-05</text></g>
        <g><rect x="0" y="270" width="120" height="40" rx="4" fill="#3F4A5E"/><text x="60" y="294" text-anchor="middle" font-size="11" fill="#FFFFFF">esx-06</text></g>
      </g>
    </g>

    <!-- arrows from each host to vCenter -->
    <g>
      <line x1="200" y1="130" x2="500" y2="240" stroke="#3F4A5E" stroke-width="1.2" opacity="0.8"/>
      <line x1="200" y1="180" x2="500" y2="240" stroke="#3F4A5E" stroke-width="1.2" opacity="0.8"/>
      <line x1="200" y1="230" x2="500" y2="240" stroke="#3F4A5E" stroke-width="1.2" opacity="0.8"/>
      <line x1="200" y1="280" x2="500" y2="260" stroke="#3F4A5E" stroke-width="1.2" opacity="0.8"/>
      <line x1="200" y1="330" x2="500" y2="260" stroke="#3F4A5E" stroke-width="1.2" opacity="0.8"/>
      <line x1="200" y1="380" x2="500" y2="260" stroke="#3F4A5E" stroke-width="1.2" opacity="0.8"/>
    </g>

    <!-- vCenter in middle -->
    <g transform="translate(500,200)">
      <rect width="160" height="100" rx="8" fill="#1F8A60"/>
      <text x="80" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">vCenter</text>
      <text x="80" y="60" text-anchor="middle" font-size="11" fill="#FFFFFF" opacity="0.9">vSphere Client</text>
      <text x="80" y="78" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">vc-01.lab.local</text>
    </g>

    <!-- right side: feature labels with VM moving (vMotion) -->
    <g transform="translate(720,90)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#1F2937">Features unlocked</text>
      <g transform="translate(0,30)">
        <rect width="180" height="34" rx="6" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60"/>
        <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1F8A60">vMotion (live migrate)</text>
      </g>
      <g transform="translate(0,80)">
        <rect width="180" height="34" rx="6" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60"/>
        <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1F8A60">DRS (load balance)</text>
      </g>
      <g transform="translate(0,130)">
        <rect width="180" height="34" rx="6" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60"/>
        <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1F8A60">vSphere HA</text>
      </g>
      <g transform="translate(0,180)">
        <rect width="180" height="34" rx="6" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60"/>
        <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1F8A60">Templates · libraries</text>
      </g>
      <g transform="translate(0,230)">
        <rect width="180" height="34" rx="6" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60"/>
        <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1F8A60">Central RBAC + audit</text>
      </g>
    </g>

    <!-- VM moving from esx-02 to esx-05 (vMotion demonstration) -->
    <g>
      <rect x="100" y="95" width="20" height="14" rx="2" fill="#F2C94C" stroke="#1F2937" stroke-width="0.5">
        <animate attributeName="x" values="100;100;180;100" keyTimes="0;0.2;0.6;1" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="95;95;320;95" keyTimes="0;0.2;0.6;1" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text font-size="9" fill="#1F2937">
        <animate attributeName="x" values="115;115;195;115" keyTimes="0;0.2;0.6;1" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="105;105;330;105" keyTimes="0;0.2;0.6;1" dur="6s" repeatCount="indefinite"/>
        <tspan>vm-A</tspan>
      </text>
    </g>

    <text x="520" y="510" text-anchor="middle" font-size="12" font-weight="600" fill="#5A6B81">VM lives-moves between hosts under vCenter's coordination</text>
  </g>

  <!-- ============================================
       MODE 2: PREREQS
       Story: 4-row checklist; each row turns green in sequence; missing PTR shown red briefly
       ============================================ -->
  <g class="mode-group mode-prereqs">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 2 — vCENTER PREREQUISITES</text>

    <g transform="translate(180,90)">
      <text x="340" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#1F2937">Pre-flight checklist</text>

      <!-- DNS row -->
      <g transform="translate(0,30)">
        <rect width="680" height="60" rx="8" fill="#FFFFFF" stroke="#E5E9F0"/>
        <circle cx="36" cy="30" r="14" fill="#5A6B81">
          <animate attributeName="fill" values="#5A6B81;#5A6B81;#1F8A60;#1F8A60" keyTimes="0;0.05;0.18;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="36" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#1F2937">DNS</text>
        <text x="60" y="40" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">A: vc-01.lab.local → 10.20.30.50  ·  PTR: 10.20.30.50 → vc-01.lab.local</text>
        <text x="660" y="35" text-anchor="end" font-size="14" font-weight="700" fill="#1F8A60" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.05;0.18;1" dur="8s" repeatCount="indefinite"/>
          ✓
        </text>
      </g>

      <!-- NTP row -->
      <g transform="translate(0,100)">
        <rect width="680" height="60" rx="8" fill="#FFFFFF" stroke="#E5E9F0"/>
        <circle cx="36" cy="30" r="14" fill="#5A6B81">
          <animate attributeName="fill" values="#5A6B81;#5A6B81;#5A6B81;#1F8A60;#1F8A60" keyTimes="0;0.18;0.3;0.4;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="36" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#1F2937">NTP</text>
        <text x="60" y="40" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">target host + appliance synced to time.lab.local</text>
        <text x="660" y="35" text-anchor="end" font-size="14" font-weight="700" fill="#1F8A60" opacity="0">
          <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.18;0.3;0.4;1" dur="8s" repeatCount="indefinite"/>
          ✓
        </text>
      </g>

      <!-- Network row -->
      <g transform="translate(0,170)">
        <rect width="680" height="60" rx="8" fill="#FFFFFF" stroke="#E5E9F0"/>
        <circle cx="36" cy="30" r="14" fill="#5A6B81">
          <animate attributeName="fill" values="#5A6B81;#5A6B81;#5A6B81;#5A6B81;#1F8A60;#1F8A60" keyTimes="0;0.3;0.45;0.55;0.6;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="36" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#1F2937">Network</text>
        <text x="60" y="40" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">port group: mgmt  ·  IP: 10.20.30.50/24  ·  GW: 10.20.30.1</text>
        <text x="660" y="35" text-anchor="end" font-size="14" font-weight="700" fill="#1F8A60" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.3;0.45;0.55;0.6;1" dur="8s" repeatCount="indefinite"/>
          ✓
        </text>
      </g>

      <!-- Sizing row -->
      <g transform="translate(0,240)">
        <rect width="680" height="60" rx="8" fill="#FFFFFF" stroke="#E5E9F0"/>
        <circle cx="36" cy="30" r="14" fill="#5A6B81">
          <animate attributeName="fill" values="#5A6B81;#5A6B81;#5A6B81;#5A6B81;#5A6B81;#5A6B81;#1F8A60;#1F8A60" keyTimes="0;0.3;0.45;0.55;0.65;0.75;0.8;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="36" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
        <text x="60" y="22" font-size="13" font-weight="700" fill="#1F2937">Sizing</text>
        <text x="60" y="40" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">Tiny / Small / Medium / Large / X-Large  ·  picked: Small (100 hosts / 1k VMs)</text>
        <text x="660" y="35" text-anchor="end" font-size="14" font-weight="700" fill="#1F8A60" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;0;0;1;1" keyTimes="0;0.3;0.45;0.55;0.65;0.75;0.8;1" dur="8s" repeatCount="indefinite"/>
          ✓
        </text>
      </g>

      <!-- Bottom: Ready to install -->
      <g transform="translate(0,320)">
        <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1F8A60" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;0;0;0;1;1" keyTimes="0;0.3;0.45;0.55;0.65;0.75;0.8;0.85;1" dur="8s" repeatCount="indefinite"/>
          ✓ Ready to launch the installer
        </text>
      </g>
    </g>
  </g>

  <!-- ============================================
       MODE 3: STAGE 1
       Story: laptop runs installer, OVA travels across to host, VM appears on host (powered on but services not started)
       ============================================ -->
  <g class="mode-group mode-stage1">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 3 — STAGE 1: DEPLOY THE OVA</text>

    <!-- Laptop on left -->
    <g transform="translate(80,150)">
      <rect width="200" height="130" rx="8" fill="#1F2937"/>
      <rect x="10" y="10" width="180" height="110" rx="2" fill="#0a3a73"/>
      <text x="100" y="40" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" font-weight="700" fill="#FFFFFF">VCSA Installer</text>
      <text x="100" y="60" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5">Stage 1: Deploy</text>
      <rect x="20" y="75" width="160" height="14" rx="2" fill="#1F2937"/>
      <rect x="20" y="75" width="0" height="14" rx="2" fill="#5DCAA5">
        <animate attributeName="width" values="0;160;160" keyTimes="0;0.7;1" dur="8s" repeatCount="indefinite"/>
      </rect>
      <text x="100" y="105" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">vc-01.lab.local</text>
      <rect x="-15" y="130" width="230" height="6" rx="2" fill="#5A6B81"/>
    </g>

    <!-- "OVA" travelling across -->
    <g>
      <line x1="280" y1="215" x2="700" y2="215" stroke="#3F4A5E" stroke-width="2" stroke-dasharray="6,6"/>
      <g>
        <rect x="0" y="0" width="48" height="20" rx="3" fill="#5DCAA5">
          <animate attributeName="x" values="280;680;680;680" keyTimes="0;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
        </rect>
        <text font-size="10" font-weight="700" fill="#1F2937">
          <animate attributeName="x" values="290;690;690;690" keyTimes="0;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
          <animate attributeName="y" values="214;214;214;214" keyTimes="0;0.7;0.85;1" dur="8s" repeatCount="indefinite"/>
          <tspan>OVA</tspan>
        </text>
      </g>
      <text x="490" y="200" text-anchor="middle" font-size="11" fill="#5A6B81">push appliance OVA across the management network</text>
    </g>

    <!-- ESXi host on right -->
    <g transform="translate(720,140)">
      <rect width="240" height="160" rx="8" fill="#3F4A5E" stroke="#1F2937" stroke-width="1.5"/>
      <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF" opacity="0.85">esx-01.lab.local</text>
      <text x="120" y="38" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.7">datastore: ds-vsan</text>
      <!-- VM appears at end -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.7;0.85;0.9;1" dur="8s" repeatCount="indefinite"/>
        <rect x="40" y="55" width="160" height="80" rx="4" fill="#5DCAA5" opacity="0.6"/>
        <text x="120" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1F2937">vc-01.lab.local</text>
        <text x="120" y="100" text-anchor="middle" font-size="10" fill="#1F2937">Photon Linux</text>
        <text x="120" y="116" text-anchor="middle" font-size="10" font-style="italic" fill="#1F2937">powered on, services NOT started</text>
      </g>
    </g>

    <text x="520" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#5A6B81" opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.7;0.85;0.9;1" dur="8s" repeatCount="indefinite"/>
      Stage 1 complete · proceed to Stage 2 to start vCenter services
    </text>
  </g>

  <!-- ============================================
       MODE 4: STAGE 2
       Story: progress bar fills "Setting up SSO ..." "Starting services ..." then login screen appears
       ============================================ -->
  <g class="mode-group mode-stage2">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 4 — STAGE 2: FIRST-TIME SETUP</text>

    <!-- Setup phase -->
    <g opacity="0">
      <animate attributeName="opacity" values="1;1;0;0;0;0" keyTimes="0;0.55;0.6;1;1;1" dur="8s" repeatCount="indefinite"/>
      <rect x="160" y="120" width="720" height="280" rx="10" fill="#0a3a73"/>
      <text x="520" y="160" text-anchor="middle" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">vCenter Server Stage 2 Setup</text>

      <!-- progressing tasks -->
      <g transform="translate(220,200)">
        <text x="0" y="14" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5" opacity="0">
          <animate attributeName="opacity" values="0;1;1;1;1;1" keyTimes="0;0.05;0.2;0.4;0.55;1" dur="8s" repeatCount="indefinite"/>
          ✓ Configure NTP
        </text>
        <text x="0" y="40" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5" opacity="0">
          <animate attributeName="opacity" values="0;0;0;1;1;1" keyTimes="0;0.05;0.18;0.22;0.5;1" dur="8s" repeatCount="indefinite"/>
          ✓ Configure SSO domain (vsphere.local)
        </text>
        <text x="0" y="66" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.05;0.22;0.35;0.4;1" dur="8s" repeatCount="indefinite"/>
          ✓ Initialize Postgres database
        </text>
        <text x="0" y="92" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">
          ⚙ Starting vCenter services...
          <animate attributeName="fill" values="#FFFFFF;#FFFFFF;#5DCAA5" keyTimes="0;0.5;0.6" dur="8s" repeatCount="indefinite"/>
        </text>
        <text x="0" y="92" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5" opacity="0">
          <animate attributeName="opacity" values="0;0;0;0;0;1" keyTimes="0;0.4;0.5;0.55;0.58;0.6" dur="8s" repeatCount="indefinite"/>
          ✓ vCenter services started
        </text>

        <rect x="0" y="110" width="500" height="14" rx="2" fill="#1F2937"/>
        <rect x="0" y="110" width="0" height="14" rx="2" fill="#5DCAA5">
          <animate attributeName="width" values="0;500;500" keyTimes="0;0.55;1" dur="8s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

      <text x="120" y="155" text-anchor="middle" font-size="10" font-style="italic" fill="#5A6B81">takes over 10.20.30.50</text>
    </g>

    <!-- Witness -->
    <g transform="translate(720,150)">
      <rect width="240" height="180" rx="10" fill="#FFFFFF" stroke="#9D9C95" stroke-width="2.5"/>
      <text x="120" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#9D9C95">Witness</text>
      <text x="120" y="58" text-anchor="middle" font-size="11" fill="#5A6B81">vc-01-witness</text>
      <text x="120" y="100" text-anchor="middle" font-size="12" fill="#9D9C95">tie-breaker (no data)</text>
      <text x="120" y="155" text-anchor="middle" font-size="10" font-style="italic" fill="#5A6B81">confirms Active is really down</text>
    </g>

    <!-- Replication arrows -->
    <line x1="320" y1="240" x2="400" y2="240" stroke="#3F4A5E" stroke-width="2" marker-end="url(#aArrow)" marker-start="url(#aArrow)"/>
    <text x="360" y="232" text-anchor="middle" font-size="9" fill="#5A6B81">repl.</text>

    <!-- Witness lines -->
    <path d="M200,330 Q420,400 720,330" fill="none" stroke="#9D9C95" stroke-width="1.5" stroke-dasharray="3,3"/>
    <path d="M520,330 Q620,360 720,330" fill="none" stroke="#9D9C95" stroke-width="1.5" stroke-dasharray="3,3"/>

    <text x="520" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#5A6B81">Active fails → Witness confirms → Passive promotes → service stays up</text>
  </g>

</svg>

<script>
const svg = document.getElementById('canvas');
const playBtn = document.getElementById('play-btn');
const speedSlider = document.getElementById('speed-slider');
const speedDisplay = document.getElementById('speed-display');
const stageLabel = document.getElementById('stage-label');

const labels = {
  overview:  'Subtopic 1 of 8 · Overview: vCenter ties many ESXi hosts into one managed fleet, unlocking vMotion, DRS, HA, and central RBAC.',
  prereqs:   'Subtopic 2 of 8 · Prerequisites: DNS (forward + reverse), NTP, network, and sizing — get all four right before launching the installer.',
  stage1:    'Subtopic 3 of 8 · Stage 1: the installer (running on your laptop) deploys the VCSA OVA to a target ESXi host. Services not started yet.',
  stage2:    'Subtopic 4 of 8 · Stage 2: NTP, SSO domain, and services start. When the progress bar finishes, vCenter is alive.',
  sso:       'Subtopic 5 of 8 · SSO + identity sources: vCenter SSO authenticates against AD (or other IdP) and issues tokens vCenter trusts.',
  rbac:      'Subtopic 6 of 8 · RBAC: privileges + roles + permissions + propagation. Object-level permissions override inherited ones.',
  inventory: 'Subtopic 7 of 8 · Inventory + Backup: organize the fleet into datacenter/folder/cluster/host/VM, and ship file-based backups nightly.',
  ha:        'Subtopic 8 of 8 · vCenter HA: Active + Passive + Witness. Active fails → Passive promotes in minutes. Distinct from vSphere HA.',
};

let isPaused = false;
let speed = 1;
let svgClock = 0;
let lastWall = performance.now();
let rafId = null;

function loop(now) {
  if (!isPaused) {
    const dt = (now - lastWall) / 1000;
    svgClock += dt * speed;
    svg.setCurrentTime(svgClock);
  }
  lastWall = now;
  rafId = requestAnimationFrame(loop);
}

function startLoop() {
  svg.pauseAnimations();
  svgClock = svg.getCurrentTime();
  lastWall = performance.now();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.getAttribute('data-mode');
    svg.setAttribute('data-mode', mode);
    stageLabel.textContent = labels[mode] || '';
    svgClock = 0;
    svg.setCurrentTime(0);
  });
});

playBtn.addEventListener('click', () => {
  isPaused = !isPaused;
  playBtn.textContent = isPaused ? 'Play' : 'Pause';
});

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedDisplay.innerHTML = speed.toFixed(1) + '&times;';
});

startLoop();
</script>

</body>
