<!DOCTYPE html>
<!--
  Lesson 10 — Configuring vSphere Networking
  Six modes: overview / vss / vds / port-groups / teaming / vmkernel
  Pause/Play + Speed parity with prior lessons.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>vSphere Networking — animation</title>
<style>
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; margin: 0; }
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .mode-btn { border: 1px solid #d8d6cf; background: #ffffff; color: #3a3a3a; padding: 9px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; animation: btn-pop 2.4s ease-in-out infinite; }
  @keyframes btn-pop { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(63,74,94,0); } 50% { transform: scale(1.035); box-shadow: 0 0 0 4px rgba(63,74,94,0.08); } }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active { background: #3F4A5E; color: #FFFFFF; border-color: #3F4A5E; animation: none; }
  .stage-label { font-size: 15px; color: #3a3a3a; margin: 12px 0 18px 0; font-weight: 500; }
  .speed-control { margin-left: auto; font-size: 13px; color: #5F5E5A; display: flex; gap: 8px; align-items: center; }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas { width: 100%; max-width: 1040px; height: auto; display: block; }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="overview"] .mode-overview,
  #canvas[data-mode="vss"] .mode-vss,
  #canvas[data-mode="vds"] .mode-vds,
  #canvas[data-mode="port-groups"] .mode-port-groups,
  #canvas[data-mode="teaming"] .mode-teaming,
  #canvas[data-mode="vmkernel"] .mode-vmkernel { display: block; }
</style>
</head>
<body>

<div class="controls">
  <button class="mode-btn active" data-mode="overview" type="button">1 · Overview</button>
  <button class="mode-btn" data-mode="vss" type="button">2 · vSS</button>
  <button class="mode-btn" data-mode="vds" type="button">3 · vDS</button>
  <button class="mode-btn" data-mode="port-groups" type="button">4 · Port groups · VLANs</button>
  <button class="mode-btn" data-mode="teaming" type="button">5 · Teaming</button>

  <span class="speed-control"><span>Speed</span><input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider"><span id="speed-display">1.0&times;</span></span>

<div class="stage-label" id="stage-label">Subtopic 1 of 6 · Overview: VM → vNIC → port group → vSwitch → uplink → physical switch.</div>

<svg id="canvas" data-mode="overview" viewBox="0 0 1040 540" xmlns="http://www.w3.org/2000/svg">

        <rect x="10" y="60" width="200" height="22" rx="3" fill="#5DCAA5" opacity="0.7"/>

    <g transform="translate(520,90)">

      <text x="240" y="84" text-anchor="middle" font-size="11" font-style="italic" fill="#5A6B81" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0;0;0;1;1" keyTimes="0;0.5;0.6;0.7;0.8;0.85;0.9;0.95;1" dur="8s" repeatCount="indefinite"/>

    <text x="520" y="490" text-anchor="middle" font-size="12" font-weight="600" fill="#5A6B81">vSS = simple, free, but every host is its own snowflake</text>

        <text x="80" y="69" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2937">DMZ-VLAN-200 ✓</text>

    <g transform="translate(320,250)">
      <rect width="160" height="100" rx="6" fill="#3F4A5E"/>
      <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">host-2</text>
      <rect x="10" y="32" width="140" height="18" rx="2" fill="#5A6B81"/>
      <text x="80" y="46" text-anchor="middle" font-size="9" fill="#FFFFFF">vDS data plane</text>
      <g opacity="0">

<script>
const svg = document.getElementById('canvas');
const playBtn = document.getElementById('play-btn');
const speedSlider = document.getElementById('speed-slider');
const speedDisplay = document.getElementById('speed-display');
const stageLabel = document.getElementById('stage-label');

const labels = {
  overview:    'Subtopic 1 of 6 · Overview: VM → vNIC → port group → vSwitch → uplink → physical switch.',
  vss:         'Subtopic 2 of 6 · vSS: per-host networking. Configure each host independently — drift is the operational hazard.',
  vds:         'Subtopic 3 of 6 · vDS: configure once in vCenter, applied identically to every host. Data plane survives vCenter outage.',
  'port-groups': 'Subtopic 4 of 6 · Port groups + VLAN tagging: VST is most common. VLAN on the port group must match a trunked VLAN on the physical switch.',
  teaming:     'Subtopic 5 of 6 · NIC teaming: ≥2 physical NICs per vSwitch. Originating-port pins each VM to one uplink; failover swaps in milliseconds.',
  vmkernel:    'Subtopic 6 of 6 · vmkernel adapters: one per major service (management, vMotion, vSAN, NFS) on its own VLAN — isolation = predictability.',
};

let isPaused = false;
let speed = 1;
let svgClock = 0;
let lastWall = performance.now();
let rafId = null;

function loop(now) {
  if (!isPaused) {
    const dt = (now - lastWall) / 1000;
    svgClock += dt * speed;
    svg.setCurrentTime(svgClock);
  }
  lastWall = now;
  rafId = requestAnimationFrame(loop);
}
function startLoop() {
  svg.pauseAnimations();
  svgClock = svg.getCurrentTime();
  lastWall = performance.now();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.getAttribute('data-mode');
    svg.setAttribute('data-mode', mode);
    stageLabel.textContent = labels[mode] || '';
    svgClock = 0;
    svg.setCurrentTime(0);
  });
});

playBtn.addEventListener('click', () => {
  isPaused = !isPaused;
  playBtn.textContent = isPaused ? 'Play' : 'Pause';
});

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedDisplay.innerHTML = speed.toFixed(1) + '&times;';
});

startLoop();
</script>
