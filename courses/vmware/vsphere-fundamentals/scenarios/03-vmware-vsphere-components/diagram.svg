<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lesson 03 — VMware, vSphere, and the components
  Static architecture diagram showing all 5 components.
  ViewBox 1100 × 660. Alignment math verified pre-ship.

  Layout (top to bottom):
    Title:        y=30 (text)
    vCenter:      y=70 to 130   (height 60)
    Connector:    y=130 to 200  (vCenter bottom → Host tops)
    Hosts:        y=200 to 420  (height 220)
       inside each host:
         VMs:       relative y=10 to 70   (60 tall)
         Hyper:     relative y=70 to 90   (20 tall; abuts VMs)
         Chassis:   relative y=90 to 200  (110 tall; abuts hypervisor)
         Bottom margin to host group end: 20
    Connector:    y=420 to 480  (Hosts → Datastore)
    Datastore:    y=480 to 580  (height 100)
    Caption:      y=620
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" width="1100" height="660"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#3F4A5E" letter-spacing="2.5">VSPHERE — FIVE COMPONENTS, ONE SYSTEM</text>
  <line x1="380" y1="48" x2="720" y2="48" stroke="#E8E5DD" stroke-width="1"/>

  <!-- ============================== vCenter Server (management plane) ============================== -->
  <g>
    <rect x="430" y="70" width="240" height="60" rx="10" fill="#3F4A5E" stroke="#1F2433" stroke-width="1.5"/>
    <!-- Eye/management icon -->
    <g transform="translate(450, 86)">
      <circle cx="14" cy="14" r="13" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="5" fill="#FFFFFF"/>
      <circle cx="14" cy="14" r="2" fill="#3F4A5E"/>
    </g>
    <text x="490" y="98" font-size="14" font-weight="600" fill="#FFFFFF">vCenter Server</text>
    <text x="490" y="116" font-size="11" fill="#B5C0D0">management plane</text>
  </g>

  <!-- Connector trunk: vCenter bottom (550, 130) → split bus (165) → host tops (200) -->
  <line x1="550" y1="130" x2="550" y2="165" stroke="#3F4A5E" stroke-width="2"/>
  <line x1="340" y1="165" x2="760" y2="165" stroke="#3F4A5E" stroke-width="2"/>
  <line x1="340" y1="165" x2="340" y2="200" stroke="#3F4A5E" stroke-width="2"/>
  <line x1="760" y1="165" x2="760" y2="200" stroke="#3F4A5E" stroke-width="2"/>

  <!-- ============================== Host 1 ============================== -->
  <!-- Host group at translate(150, 200), 380 wide × 220 tall -->
  <g transform="translate(150, 200)">
    <!-- Host frame (subtle background) -->
    <rect x="0" y="0" width="380" height="220" rx="10" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.2"/>

    <!-- VMs region: y=10 to y=70 (60 tall). 4 VMs each 80 wide, 3 gaps of 10. Total 350. Centered: margin 15. -->
    <!-- VM 1 -->
    <g transform="translate(15, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-01</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">app</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="32" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>
    <!-- VM 2 -->
    <g transform="translate(105, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-02</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">db</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="42" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>
    <!-- VM 3 -->
    <g transform="translate(195, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-03</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">web</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="38" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>
    <!-- VM 4 -->
    <g transform="translate(285, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-04</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">api</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="28" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>

    <!-- Hypervisor (ESXi): y=70 to y=90, abuts VMs -->
    <rect x="10" y="70" width="360" height="20" fill="#3F4A5E"/>
    <text x="190" y="84" text-anchor="middle" font-size="10" font-weight="500" fill="#E8E8E0" letter-spacing="1.5">ESXi (hypervisor)</text>

    <!-- Chassis: y=90 to y=200, abuts hypervisor -->
    <rect x="10" y="90" width="360" height="110" rx="3" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
    <rect x="10" y="90" width="14" height="110" fill="#909093"/>
    <rect x="356" y="90" width="14" height="110" fill="#909093"/>
    <!-- Internal: vSwitch indicator -->
    <g transform="translate(40, 110)">
      <rect width="100" height="36" rx="3" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
      <text x="50" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#5F5E5A" letter-spacing="0.8">VIRTUAL SWITCH</text>
      <line x1="6" y1="22" x2="94" y2="22" stroke="#3F4A5E" stroke-width="1"/>
      <circle cx="14" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="30" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="46" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="62" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="78" cy="29" r="2" fill="#5DCAA5"/>
    </g>
    <!-- NIC area on the right -->
    <g transform="translate(220, 110)">
      <rect width="120" height="36" fill="#3a3a3a"/>
      <text x="60" y="14" text-anchor="middle" font-size="9" font-weight="500" fill="#cfcfcf">NIC + I/O</text>
      <rect x="20" y="20" width="20" height="10" fill="#1a1a1a" rx="1"/>
      <rect x="50" y="20" width="20" height="10" fill="#1a1a1a" rx="1"/>
      <rect x="80" y="20" width="20" height="10" fill="#1a1a1a" rx="1"/>
    </g>
    <!-- Host name -->
    <text x="190" y="167" text-anchor="middle" font-size="10" font-weight="500" fill="#3A3A3A">esxi-host-01</text>

    <!-- Host label below -->
    <text x="190" y="216" text-anchor="middle" font-size="11" font-style="italic" fill="#9D9C95">Physical host (with ESXi)</text>
  </g>

  <!-- ============================== Host 2 ============================== -->
  <g transform="translate(570, 200)">
    <rect x="0" y="0" width="380" height="220" rx="10" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.2"/>
    <g transform="translate(15, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-05</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">cache</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="46" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>
    <g transform="translate(105, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-06</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">log</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="30" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>
    <g transform="translate(195, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-07</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">qa</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="22" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>
    <g transform="translate(285, 10)">
      <rect width="80" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 16 L 0 5 Q 0 0 5 0 L 75 0 Q 80 0 80 5 L 80 16 Z" fill="#5F5E5A"/>
      <text x="6" y="12" font-size="9" font-weight="500" fill="#FFFFFF">vm-08</text>
      <rect x="6" y="22" width="24" height="12" rx="2" fill="#A8A8AC"/>
      <text x="18" y="31" font-size="8" fill="#FFFFFF" text-anchor="middle">linux</text>
      <text x="34" y="31" font-size="9" fill="#3A3A3A">backup</text>
      <rect x="6" y="40" width="60" height="3" rx="1" fill="#E0E0DE"/>
      <rect x="6" y="40" width="36" height="3" rx="1" fill="#5A6B81"/>
      <circle cx="72" cy="6" r="2" fill="#5DCAA5"/>
    </g>
    <rect x="10" y="70" width="360" height="20" fill="#3F4A5E"/>
    <text x="190" y="84" text-anchor="middle" font-size="10" font-weight="500" fill="#E8E8E0" letter-spacing="1.5">ESXi (hypervisor)</text>
    <rect x="10" y="90" width="360" height="110" rx="3" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
    <rect x="10" y="90" width="14" height="110" fill="#909093"/>
    <rect x="356" y="90" width="14" height="110" fill="#909093"/>
    <g transform="translate(40, 110)">
      <rect width="100" height="36" rx="3" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
      <text x="50" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#5F5E5A" letter-spacing="0.8">VIRTUAL SWITCH</text>
      <line x1="6" y1="22" x2="94" y2="22" stroke="#3F4A5E" stroke-width="1"/>
      <circle cx="14" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="30" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="46" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="62" cy="29" r="2" fill="#5DCAA5"/>
      <circle cx="78" cy="29" r="2" fill="#5DCAA5"/>
    </g>
    <g transform="translate(220, 110)">
      <rect width="120" height="36" fill="#3a3a3a"/>
      <text x="60" y="14" text-anchor="middle" font-size="9" font-weight="500" fill="#cfcfcf">NIC + I/O</text>
      <rect x="20" y="20" width="20" height="10" fill="#1a1a1a" rx="1"/>
      <rect x="50" y="20" width="20" height="10" fill="#1a1a1a" rx="1"/>
      <rect x="80" y="20" width="20" height="10" fill="#1a1a1a" rx="1"/>
    </g>
    <text x="190" y="167" text-anchor="middle" font-size="10" font-weight="500" fill="#3A3A3A">esxi-host-02</text>
    <text x="190" y="216" text-anchor="middle" font-size="11" font-style="italic" fill="#9D9C95">Physical host (with ESXi)</text>
  </g>

  <!-- Connector to datastore: from host bottom centers (340, 420) and (760, 420), to datastore -->
  <line x1="340" y1="420" x2="340" y2="455" stroke="#3F4A5E" stroke-width="2"/>
  <line x1="760" y1="420" x2="760" y2="455" stroke="#3F4A5E" stroke-width="2"/>
  <line x1="340" y1="455" x2="760" y2="455" stroke="#3F4A5E" stroke-width="2"/>
  <line x1="550" y1="455" x2="550" y2="480" stroke="#3F4A5E" stroke-width="2"/>

  <!-- ============================== Datastore ============================== -->
  <!-- Datastore: x=350-750 (400 wide), y=480-580 (100 tall) -->
  <g transform="translate(350, 480)">
    <rect width="400" height="100" rx="10" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1.2"/>
    <!-- Cylinder/disk icons (storage) -->
    <g transform="translate(30, 24)">
      <ellipse cx="20" cy="6" rx="20" ry="6" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <rect x="0" y="6" width="40" height="40" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <ellipse cx="20" cy="46" rx="20" ry="6" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <ellipse cx="20" cy="20" rx="20" ry="6" fill="none" stroke="#5F5E5A" stroke-width="1" opacity="0.4"/>
      <ellipse cx="20" cy="33" rx="20" ry="6" fill="none" stroke="#5F5E5A" stroke-width="1" opacity="0.4"/>
    </g>
    <!-- Label -->
    <text x="200" y="38" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A">Datastore</text>
    <text x="200" y="58" text-anchor="middle" font-size="11" fill="#5F5E5A">where VM disks live</text>
    <text x="200" y="80" text-anchor="middle" font-size="10" font-style="italic" fill="#9D9C95">Both hosts see the same files. A VM can move between hosts; its data stays put.</text>
  </g>

  <!-- Bottom caption -->
  <text x="550" y="624" text-anchor="middle" font-size="13" fill="#5F5E5A" font-style="italic">vCenter manages many ESXi hosts. Each host runs VMs. Datastore and virtual networks are shared infrastructure.</text>

</svg>
