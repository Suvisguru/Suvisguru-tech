<!DOCTYPE html>
<!--
  Lesson 03 — VMware, vSphere, and the components
  Animated walk-through. Five mode buttons: esxi, vcenter, vms, datastores, networks.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>vSphere components — animation</title>
<style>
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; margin: 0; }
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .mode-btn { border: 1px solid #d8d6cf; background: #ffffff; color: #3a3a3a; padding: 9px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active { background: #3F4A5E; color: #FFFFFF; border-color: #3F4A5E; }
  .stage-label { font-size: 15px; color: #3a3a3a; margin: 12px 0 18px 0; min-height: 22px; font-weight: 500; }
  .speed-control { margin-left: auto; font-size: 13px; color: #5F5E5A; display: flex; gap: 8px; align-items: center; }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas { width: 100%; max-width: 1040px; height: auto; display: block; }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="esxi"]       .mode-esxi,
  #canvas[data-mode="vcenter"]    .mode-vcenter,
  #canvas[data-mode="vms"]        .mode-vms,
  #canvas[data-mode="datastores"] .mode-datastores,
  #canvas[data-mode="networks"]   .mode-networks { display: block; }
  @media (max-width: 700px) { body { padding: 16px; } .speed-control { margin-left: 0; width: 100%; margin-top: 4px; } .mode-btn { padding: 7px 11px; font-size: 12px; } }
</style>
</head>
<body>

<div class="controls">
  <button class="mode-btn active" data-mode="esxi" type="button">ESXi</button>
  <button class="mode-btn" data-mode="vcenter" type="button">vCenter</button>
  <button class="mode-btn" data-mode="vms" type="button">VMs</button>
  <button class="mode-btn" data-mode="datastores" type="button">Datastores</button>
  <button class="mode-btn" data-mode="networks" type="button">Networks</button>
  <button class="mode-btn" id="play-btn" type="button">Pause</button>
  <span class="speed-control"><span>Speed</span><input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider"><span id="speed-display">1.0&times;</span></span>
</div>

<div class="stage-label" id="stage-label">ESXi: the hypervisor on every host.</div>

<svg id="canvas" data-mode="esxi" viewBox="0 0 1040 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <!-- ============================== ESXi MODE ============================== -->
  <g class="mode-group mode-esxi">
    <text x="520" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">ESXI: HYPERVISOR ON A PHYSICAL HOST</text>
    <!-- One host with VMs above, hypervisor band, chassis. Layers abut. -->
    <g transform="translate(280, 110)">
      <!-- VM row: y=0 to y=80 -->
      <g transform="translate(0, 0)">
        <rect width="120" height="80" rx="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
        <path d="M 0 22 L 0 6 Q 0 0 6 0 L 114 0 Q 120 0 120 6 L 120 22 Z" fill="#5F5E5A"/>
        <text x="9" y="15" font-size="12" font-weight="500" fill="#FFFFFF">vm-01</text>
        <rect x="8" y="32" width="40" height="20" rx="3" fill="#A8A8AC"/>
        <text x="28" y="46" font-size="13" fill="#FFFFFF" text-anchor="middle">linux</text>
        <text x="56" y="46" font-size="13" fill="#3A3A3A">app</text>
        <rect x="8" y="60" width="80" height="6" rx="2" fill="#E0E0DE"/>
        <rect x="8" y="60" width="44" height="6" rx="2" fill="#5A6B81"><animate attributeName="width" values="44;52;36;48;44" dur="6s" repeatCount="indefinite"/></rect>
        <circle cx="110" cy="11" r="3" fill="#5DCAA5"/>
      </g>
      <g transform="translate(130, 0)">
        <rect width="120" height="80" rx="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
        <path d="M 0 22 L 0 6 Q 0 0 6 0 L 114 0 Q 120 0 120 6 L 120 22 Z" fill="#5F5E5A"/>
        <text x="9" y="15" font-size="12" font-weight="500" fill="#FFFFFF">vm-02</text>
        <rect x="8" y="32" width="40" height="20" rx="3" fill="#A8A8AC"/>
        <text x="28" y="46" font-size="13" fill="#FFFFFF" text-anchor="middle">linux</text>
        <text x="56" y="46" font-size="13" fill="#3A3A3A">db</text>
        <rect x="8" y="60" width="80" height="6" rx="2" fill="#E0E0DE"/>
        <rect x="8" y="60" width="56" height="6" rx="2" fill="#5A6B81"><animate attributeName="width" values="56;64;48;58;52" dur="7s" repeatCount="indefinite"/></rect>
        <circle cx="110" cy="11" r="3" fill="#5DCAA5"/>
      </g>
      <g transform="translate(260, 0)">
        <rect width="120" height="80" rx="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
        <path d="M 0 22 L 0 6 Q 0 0 6 0 L 114 0 Q 120 0 120 6 L 120 22 Z" fill="#5F5E5A"/>
        <text x="9" y="15" font-size="12" font-weight="500" fill="#FFFFFF">vm-03</text>
        <rect x="8" y="32" width="40" height="20" rx="3" fill="#A8A8AC"/>
        <text x="28" y="46" font-size="13" fill="#FFFFFF" text-anchor="middle">linux</text>
        <text x="56" y="46" font-size="13" fill="#3A3A3A">web</text>
        <rect x="8" y="60" width="80" height="6" rx="2" fill="#E0E0DE"/>
        <rect x="8" y="60" width="50" height="6" rx="2" fill="#5A6B81"><animate attributeName="width" values="50;60;42;54;48" dur="8s" repeatCount="indefinite"/></rect>
        <circle cx="110" cy="11" r="3" fill="#5DCAA5"/>
      </g>
      <!-- Hypervisor: y=80 to y=110, abuts VMs -->
      <rect x="0" y="80" width="380" height="30" fill="#3F4A5E">
        <animate attributeName="fill" values="#3F4A5E;#536179;#3F4A5E" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="190" y="100" text-anchor="middle" font-size="14" font-weight="500" fill="#E8E8E0" letter-spacing="2">ESXi (hypervisor)</text>
      <!-- Chassis: y=110 to y=270, abuts hypervisor -->
      <rect x="0" y="110" width="380" height="160" rx="3" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <rect x="0" y="110" width="14" height="160" fill="#909093"/>
      <rect x="366" y="110" width="14" height="160" fill="#909093"/>
      <text x="190" y="240" text-anchor="middle" font-size="13" font-weight="500" fill="#3A3A3A">esxi-host-01</text>
    </g>
    <text x="520" y="430" text-anchor="middle" font-size="14" fill="#3A3A3A">ESXi runs directly on hardware. It creates the VMs and shares CPU, RAM, and network among them.</text>
    <text x="520" y="456" text-anchor="middle" font-size="13" fill="#9D9C95" font-style="italic">In the analogy: ESXi is the building's superintendent — one per building.</text>
  </g>

  <!-- ============================== VCENTER MODE ============================== -->
  <g class="mode-group mode-vcenter">
    <text x="520" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">VCENTER: ONE BRAIN, MANY HOSTS</text>

    <g transform="translate(400, 100)">

      <g transform="translate(20, 16)">

    </g>
    <!-- Connector trunk -->
    <line x1="520" y1="160" x2="520" y2="195" stroke="#3F4A5E" stroke-width="2"/>
    <line x1="180" y1="195" x2="860" y2="195" stroke="#3F4A5E" stroke-width="2"/>
    <line x1="180" y1="195" x2="180" y2="230" stroke="#3F4A5E" stroke-width="2"/>
    <line x1="350" y1="195" x2="350" y2="230" stroke="#3F4A5E" stroke-width="2"/>

    <g>

        <rect width="80" height="60" rx="4" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
        <rect width="80" height="14" rx="4" fill="#3F4A5E"/>
        <text x="40" y="11" text-anchor="middle" font-size="9" font-weight="500" fill="#E8E8E0" letter-spacing="1.2">ESXi</text>
        <rect x="6" y="22" width="68" height="14" rx="2" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="6" y="22" width="40" height="14" rx="2" fill="#5A6B81"><animate attributeName="width" values="40;48;36" dur="6s" repeatCount="indefinite"/></rect>
        <text x="40" y="50" text-anchor="middle" font-size="9" fill="#3A3A3A">host-01</text>
      </g>
      <g transform="translate(310, 230)">
        <rect width="80" height="60" rx="4" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
        <rect width="80" height="14" rx="4" fill="#3F4A5E"/>
        <text x="40" y="11" text-anchor="middle" font-size="9" font-weight="500" fill="#E8E8E0" letter-spacing="1.2">ESXi</text>
        <rect x="6" y="22" width="68" height="14" rx="2" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="6" y="22" width="48" height="14" rx="2" fill="#5A6B81"><animate attributeName="width" values="48;52;42" dur="7s" repeatCount="indefinite"/></rect>
        <text x="40" y="50" text-anchor="middle" font-size="9" fill="#3A3A3A">host-02</text>
      </g>
      <g transform="translate(480, 230)">
        <rect width="80" height="60" rx="4" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
        <rect width="80" height="14" rx="4" fill="#3F4A5E"/>
        <text x="40" y="11" text-anchor="middle" font-size="9" font-weight="500" fill="#E8E8E0" letter-spacing="1.2">ESXi</text>
        <rect x="6" y="22" width="68" height="14" rx="2" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="6" y="22" width="36" height="14" rx="2" fill="#5A6B81"><animate attributeName="width" values="36;44;32" dur="9s" repeatCount="indefinite"/></rect>
        <text x="40" y="50" text-anchor="middle" font-size="9" fill="#3A3A3A">host-03</text>
      </g>
      <g transform="translate(650, 230)">
        <rect width="80" height="60" rx="4" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
        <rect width="80" height="14" rx="4" fill="#3F4A5E"/>
        <text x="40" y="11" text-anchor="middle" font-size="9" font-weight="500" fill="#E8E8E0" letter-spacing="1.2">ESXi</text>
        <rect x="6" y="22" width="68" height="14" rx="2" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="6" y="22" width="52" height="14" rx="2" fill="#5A6B81"><animate attributeName="width" values="52;60;46" dur="8s" repeatCount="indefinite"/></rect>
        <text x="40" y="50" text-anchor="middle" font-size="9" fill="#3A3A3A">host-04</text>
      </g>
      <g transform="translate(820, 230)">
        <rect width="80" height="60" rx="4" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
        <rect width="80" height="14" rx="4" fill="#3F4A5E"/>
        <text x="40" y="11" text-anchor="middle" font-size="9" font-weight="500" fill="#E8E8E0" letter-spacing="1.2">ESXi</text>
        <rect x="6" y="22" width="68" height="14" rx="2" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="6" y="22" width="44" height="14" rx="2" fill="#5A6B81"><animate attributeName="width" values="44;50;38" dur="6.5s" repeatCount="indefinite"/></rect>
        <text x="40" y="50" text-anchor="middle" font-size="9" fill="#3A3A3A">host-05</text>
      </g>
    </g>
    <!-- Heartbeat indicators between vCenter and hosts -->
    <circle cx="180" cy="212" r="3" fill="#5DCAA5"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="212" r="3" fill="#5DCAA5"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>

    <text x="520" y="380" text-anchor="middle" font-size="14" fill="#3A3A3A">vCenter inventories every host. Provisioning, moves, monitoring — all from one place.</text>
    <text x="520" y="406" text-anchor="middle" font-size="13" fill="#9D9C95" font-style="italic">If vCenter goes down, hosts keep running their VMs. You lose central management, not workloads.</text>
  </g>

  <!-- ============================== VMS MODE ============================== -->
  <g class="mode-group mode-vms">
    <text x="520" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">VIRTUAL MACHINES: THE WORKLOADS</text>
    <g transform="translate(220, 110)">
      <!-- Single VM at large scale showing internals -->
      <rect width="600" height="280" rx="10" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <path d="M 0 50 L 0 10 Q 0 0 10 0 L 590 0 Q 600 0 600 10 L 600 50 Z" fill="#5F5E5A"/>
      <text x="20" y="32" font-size="18" font-weight="500" fill="#FFFFFF">vm-payroll-01</text>
      <circle cx="580" cy="25" r="6" fill="#5DCAA5"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
      <text x="556" y="29" text-anchor="end" font-size="11" fill="#B5C0D0">running</text>

      <!-- OS layer -->

        <rect width="520" height="40" rx="5" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
        <text x="20" y="25" font-size="13" font-weight="500" fill="#FFFFFF">Operating system</text>

        <text x="20" y="25" font-size="13" font-weight="500" fill="#1F8A60">Application</text>
        <text x="510" y="25" text-anchor="end" font-size="13" fill="#1F8A60">payroll-app</text>
      </g>
      <!-- Resource indicators -->
      <g transform="translate(40, 190)">
        <text x="0" y="0" font-size="11" font-weight="600" fill="#5F5E5A" letter-spacing="1">RESOURCES</text>

        <rect x="60" y="40" width="200" height="10" rx="2" fill="#E0E0DE"/>
        <rect x="60" y="40" width="160" height="10" rx="2" fill="#5A6B81"><animate attributeName="width" values="160;170;150;165" dur="7s" repeatCount="indefinite"/></rect>
        <text x="0" y="74" font-size="12" fill="#3A3A3A">Disk</text>
        <rect x="60" y="66" width="200" height="10" rx="2" fill="#E0E0DE"/>
        <rect x="60" y="66" width="92" height="10" rx="2" fill="#5A6B81"/>
      </g>
      <!-- Network -->
      <g transform="translate(340, 200)">
        <text x="0" y="0" font-size="11" font-weight="600" fill="#5F5E5A" letter-spacing="1">NETWORK</text>
        <circle cx="20" cy="40" r="20" fill="#FFFFFF" stroke="#3F4A5E" stroke-width="1.5"/>

      </g>
    </g>
    <text x="520" y="430" text-anchor="middle" font-size="14" fill="#3A3A3A">A VM is an OS plus an app, packaged into a software computer.</text>
    <text x="520" y="456" text-anchor="middle" font-size="13" fill="#9D9C95" font-style="italic">In the analogy: an apartment with its furniture, residents, and address.</text>
  </g>

  <!-- ============================== DATASTORES MODE ============================== -->
  <g class="mode-group mode-datastores">
    <text x="520" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">DATASTORES: SHARED STORAGE BOTH HOSTS SEE</text>
    <!-- Two hosts side by side -->
    <g transform="translate(120, 110)">
      <rect width="200" height="120" rx="6" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <rect width="200" height="20" rx="6" fill="#3F4A5E"/>
      <text x="100" y="14" text-anchor="middle" font-size="11" font-weight="500" fill="#E8E8E0" letter-spacing="1.5">ESXi · host-01</text>
      <g transform="translate(20, 36)">
        <rect width="76" height="64" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="76" height="14" fill="#5F5E5A"/>
        <text x="6" y="11" font-size="9" font-weight="500" fill="#FFFFFF">vm-01</text>
      </g>
      <g transform="translate(104, 36)">
        <rect width="76" height="64" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="76" height="14" fill="#5F5E5A"/>
        <text x="6" y="11" font-size="9" font-weight="500" fill="#FFFFFF">vm-02</text>
      </g>
    </g>
    <g transform="translate(720, 110)">
      <rect width="200" height="120" rx="6" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <rect width="200" height="20" rx="6" fill="#3F4A5E"/>
      <text x="100" y="14" text-anchor="middle" font-size="11" font-weight="500" fill="#E8E8E0" letter-spacing="1.5">ESXi · host-02</text>
      <g transform="translate(20, 36)">
        <rect width="76" height="64" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="76" height="14" fill="#5F5E5A"/>
        <text x="6" y="11" font-size="9" font-weight="500" fill="#FFFFFF">vm-03</text>
      </g>
      <g transform="translate(104, 36)">
        <rect width="76" height="64" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="76" height="14" fill="#5F5E5A"/>
        <text x="6" y="11" font-size="9" font-weight="500" fill="#FFFFFF">vm-04</text>
      </g>
    </g>

        <ellipse cx="20" cy="22" rx="20" ry="6" fill="none" stroke="#5F5E5A" opacity="0.4"/>
        <ellipse cx="20" cy="38" rx="20" ry="6" fill="none" stroke="#5F5E5A" opacity="0.4"/>
      </g>
      <text x="170" y="40" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A">Shared Datastore</text>
      <text x="170" y="60" text-anchor="middle" font-size="11" fill="#5F5E5A">VM disks live here</text>
      <text x="170" y="80" text-anchor="middle" font-size="10" font-style="italic" fill="#9D9C95">Both hosts can read and write the same files</text>
    </g>
    <!-- Connection lines from each host to datastore. With pulsing animation. -->
    <line x1="220" y1="230" x2="450" y2="320" stroke="#5DCAA5" stroke-width="2" stroke-dasharray="4 3">

    </line>
    <line x1="820" y1="230" x2="590" y2="320" stroke="#5DCAA5" stroke-width="2" stroke-dasharray="4 3">
      <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <text x="520" y="490" text-anchor="middle" font-size="14" fill="#3A3A3A">A datastore is shared by every host that can reach it. Move a VM between hosts — the data stays put.</text>
  </g>

  <!-- ============================== NETWORKS MODE ============================== -->
  <g class="mode-group mode-networks">
    <text x="520" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">VIRTUAL NETWORKS: VSWITCH INSIDE THE HOST</text>
    <!-- One host showing 4 VMs, vSwitch inside, NIC, link out -->
    <g transform="translate(140, 110)">
      <rect width="760" height="280" rx="8" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1"/>
      <text x="380" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#5F5E5A" letter-spacing="1">INSIDE ONE ESXI HOST</text>

      <!-- 4 VMs -->
      <g transform="translate(40, 50)">
        <rect width="120" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="120" height="14" rx="5" fill="#5F5E5A"/>

      </g>
      <g transform="translate(180, 50)">
        <rect width="120" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="120" height="14" rx="5" fill="#5F5E5A"/>
        <text x="8" y="10" font-size="9" font-weight="500" fill="#FFFFFF">vm-db</text>
      </g>
      <g transform="translate(320, 50)">
        <rect width="120" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="120" height="14" rx="5" fill="#5F5E5A"/>
        <text x="8" y="10" font-size="9" font-weight="500" fill="#FFFFFF">vm-web</text>
      </g>
      <g transform="translate(460, 50)">
        <rect width="120" height="60" rx="5" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
        <rect width="120" height="14" rx="5" fill="#5F5E5A"/>
        <text x="8" y="10" font-size="9" font-weight="500" fill="#FFFFFF">vm-cache</text>
      </g>

      <!-- vSwitch -->
      <g transform="translate(40, 140)">
        <rect width="540" height="50" rx="5" fill="#FFFFFF" stroke="#3F4A5E" stroke-width="2"/>
        <text x="270" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#3F4A5E" letter-spacing="1.5">VIRTUAL SWITCH (vSwitch)</text>
        <line x1="20" y1="32" x2="520" y2="32" stroke="#3F4A5E" stroke-width="1"/>
        <!-- ports -->
        <circle cx="60" cy="42" r="3" fill="#5DCAA5"/>
        <circle cx="120" cy="42" r="3" fill="#5DCAA5"/>
        <circle cx="180" cy="42" r="3" fill="#5DCAA5"/>
        <circle cx="240" cy="42" r="3" fill="#5DCAA5"/>
        <circle cx="300" cy="42" r="3" fill="#5DCAA5"/>
        <circle cx="360" cy="42" r="3" fill="#5DCAA5"/>

      <line x1="240" y1="110" x2="240" y2="140" stroke="#5F5E5A" stroke-width="1.5"/>

      <!-- Inter-VM packet animation along vSwitch -->
      <circle r="4" fill="#5DCAA5">
        <animateMotion dur="4s" repeatCount="indefinite" rotate="0">
          <mpath href="#network-packet-path"/>

      </circle>
      <path id="network-packet-path" d="M 100 110 L 100 172 L 240 172 L 240 110 L 240 172 L 380 172" fill="none" opacity="0"/>

      <!-- Physical NIC -->
      <g transform="translate(260, 220)">
        <rect width="100" height="36" rx="3" fill="#3a3a3a"/>
        <text x="50" y="14" text-anchor="middle" font-size="10" font-weight="500" fill="#cfcfcf">PHYSICAL NIC</text>
        <rect x="20" y="20" width="20" height="10" rx="1" fill="#1a1a1a"/>
        <rect x="60" y="20" width="20" height="10" rx="1" fill="#1a1a1a"/>

  </g>
</svg>

<script>
(function () {
  const svg = document.getElementById('canvas');
  const playBtn = document.getElementById('play-btn');
  const speedSlider = document.getElementById('speed-slider');
  const speedDisplay = document.getElementById('speed-display');
  const stageLabel = document.getElementById('stage-label');
  const stageText = {
    esxi: 'ESXi: the hypervisor on every host.',
    vcenter: 'vCenter Server: one brain managing many hosts.',
    vms: 'Virtual machines: OS + app, packaged as software computers.',
    datastores: 'Datastores: shared storage that every host can see.',
    networks: 'Virtual networks: vSwitches connecting VMs inside the host.'
  };
  let speed = 1.0, isPaused = false, svgClock = 0, lastFrame = performance.now();
  svg.pauseAnimations();
  function tick(now) {
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;
    if (!isPaused) { svgClock += dt * speed; svg.setCurrentTime(svgClock); }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.toggle('active', b === btn));
    svg.dataset.mode = mode;
    stageLabel.textContent = stageText[mode];
    svgClock = 0; svg.setCurrentTime(0);
  }));
  playBtn.addEventListener('click', () => { isPaused = !isPaused; playBtn.textContent = isPaused ? 'Play' : 'Pause'; });
  speedSlider.addEventListener('input', e => { speed = parseFloat(e.target.value); speedDisplay.textContent = speed.toFixed(1) + '×'; });
})();
</script>
</body>
