# Intake brief — Lesson 03, vSphere Fundamentals
# Topic: What is VMware, what is vSphere, and the components of vSphere.

lesson:
  title: "VMware, vSphere, and the components"
  slug: "03-vmware-vsphere-components"
  domain: "vmware"
  course_slug: "vsphere-fundamentals"
  position: 3
  granularity: "sub-topic"
  brief_drafted_on: "2026-04-30"

learner_profile:
  prerequisites:
    - "Lessons 01 and 02 completed: knows what virtualization is, the apartment-building analogy, and the five primary benefits."
  assumed_zero_knowledge_of:
    - "VMware product names beyond vSphere itself."
    - "vCenter Server, ESXi, datastores, virtual switches as named concepts."

learning_outcomes:
  - "Learner can name VMware as the company and vSphere as its flagship platform."
  - "Learner can name and place the five core components: ESXi, vCenter Server, virtual machines, datastores, virtual networks."
  - "Learner can explain the relationship between an ESXi host and vCenter Server."
  - "Learner extends the apartment-building analogy to the new components."

scope:
  in_scope_components:
    - "ESXi — the hypervisor that runs on each physical host."
    - "vCenter Server — the management plane that oversees many ESXi hosts."
    - "Virtual machines — the workloads (already known from lessons 01-02)."
    - "Datastores — the storage abstraction that VMs read and write to."
    - "Virtual networks — the network abstraction (vSwitch, port groups) that connects VMs."
  out_of_scope:
    - "Detailed feature breakdowns (vMotion, HA, DRS, FT) — those each get their own lessons."
    - "Storage policies, NSX details — separate lessons."
    - "Specific vSphere versions and editions — not pedagogically essential here."
  decomposition_needed: false

planned_sections:
  concept_explanation:
    target_words: 280
  before_after:
    target_words_each_side: 110
    before_focus: "Managing 50 standalone hypervisor hosts by hand."
    after_focus: "Same 50 hosts behind one vCenter Server."
  analogy:
    direction: "Property management company overseeing many buildings — extends apartment-building analogy from lessons 01-02."
  eli5:
    target_words_max: 100
  eli10:
    target_words: 220
  real_world_scenarios:
    count: 4
    target_words_each: 110
  static_diagram:
    purpose: "Single composition showing all 5 components and their relationships in one frame."
  animated_illustration:
    central_motion: "Tour through each component: what it is, where it sits, what it does."
    mode_toggles: ["esxi", "vcenter", "vms", "datastores", "networks"]
  flashcards:
    count: 10
  quiz:
    count: 3

interactive_preview_page:
  follow: "STYLE.md 'Lesson preview page' section. Reference: preview-lesson-02.html."
  hero_widget: >
    Build-the-architecture interactive — start with bare hardware, click to add ESXi,
    then vCenter, then VMs, then datastores, then virtual networks. Each click
    completes one layer; the readout narrates each addition.
  hover_to_define_terms:
    - "ESXi"
    - "vCenter Server"
    - "datastore"
    - "vSwitch"
    - "cluster"
