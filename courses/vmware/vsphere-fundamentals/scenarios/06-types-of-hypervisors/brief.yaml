# Intake brief — Lesson 06, vSphere Fundamentals
# Topic: Types of hypervisors — Type 1 (bare-metal) vs Type 2 (hosted).

lesson:
  title: "Types of hypervisors"
  slug: "06-types-of-hypervisors"
  domain: "vmware"
  course_slug: "vsphere-fundamentals"
  position: 6
  granularity: "concept"
  brief_drafted_on: "2026-04-30"

learner_profile:
  prerequisites: ["Lessons 01-04 — knows what virtualization is, the components of vSphere, and the brief history."]

learning_outcomes:
  - "Learner can name the two types of hypervisors and the technical difference (bare-metal vs hosted)."
  - "Learner can name canonical examples of each type."
  - "Learner can choose which type to use for a given context (production servers vs developer laptop)."

scope:
  in_scope:
    - "Type 1 (bare-metal): ESXi, KVM, Hyper-V, Xen."
    - "Type 2 (hosted): VMware Workstation, VMware Fusion, VirtualBox, Parallels."
    - "Performance trade-off: Type 1 wins on raw throughput; Type 2 wins on convenience for developers."
    - "Use cases for each."
  out_of_scope: ["Specific hypervisor implementations beyond names. CPU virtualization extensions (VT-x, AMD-V) — separate topic."]
  decomposition_needed: false

planned_sections:
  concept_explanation: { target_words: 240 }
  before_after: { target_words_each_side: 110 }
  analogy: { direction: "Type 1 = purpose-built apartment building. Type 2 = single-family house with basement apartments." }
  eli5: { target_words_max: 100 }
  eli10: { target_words: 220 }
  real_world_scenarios: { count: 4 }
  static_diagram: { purpose: "Side-by-side stack diagram showing Type 1 and Type 2 layouts." }
  animated_illustration: { mode_toggles: ["type1", "type2"] }
  flashcards: { count: 10 }
  quiz: { count: 3 }

interactive_preview_page:
  hero_widget: "Toggle between Type 1 and Type 2 stack diagrams. Two mode tabs."
