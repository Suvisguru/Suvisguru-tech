<!DOCTYPE html>
<!--
  Lesson 06 — Types of hypervisors. Two-mode toggle (Type 1 / Type 2).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Types of hypervisors — animation</title>
<style>
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; margin: 0; }
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .mode-btn { border: 1px solid #d8d6cf; background: #ffffff; color: #3a3a3a; padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active { background: #3F4A5E; color: #FFFFFF; border-color: #3F4A5E; }
  .stage-label { font-size: 15px; color: #3a3a3a; margin: 12px 0 18px 0; font-weight: 500; }
  .speed-control { margin-left: auto; font-size: 13px; color: #5F5E5A; display: flex; gap: 8px; align-items: center; }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas { width: 100%; max-width: 1040px; height: auto; display: block; }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="type1"] .mode-type1, #canvas[data-mode="type2"] .mode-type2 { display: block; }
</style>
</head>
<body>

<div class="controls">
  <button class="mode-btn active" data-mode="type1" type="button">Type 1 (bare-metal)</button>
  <button class="mode-btn" data-mode="type2" type="button">Type 2 (hosted)</button>
  <button class="mode-btn" id="play-btn" type="button">Pause</button>
  <span class="speed-control"><span>Speed</span><input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider"><span id="speed-display">1.0&times;</span></span>
</div>
<div class="stage-label" id="stage-label">Type 1: hypervisor runs directly on the hardware. No host OS.</div>

      </g>

        <text x="12" y="17" font-size="13" font-weight="500" fill="#FFFFFF">vm-02</text>
        <rect x="12" y="36" width="42" height="20" rx="3" fill="#A8A8AC"/>
        <text x="33" y="50" font-size="13" fill="#FFFFFF" text-anchor="middle">linux</text>

        <text x="70" y="120" text-anchor="middle" font-size="13" fill="#1F8A60" font-weight="600">running</text>
        <text x="70" y="142" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">⚡ near-native speed</text>
        <circle cx="130" cy="13" r="3" fill="#5DCAA5"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(300, 0)">
        <rect width="140" height="180" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
        <path d="M 0 26 L 0 8 Q 0 0 8 0 L 132 0 Q 140 0 140 8 L 140 26 Z" fill="#5F5E5A"/>
        <text x="12" y="17" font-size="13" font-weight="500" fill="#FFFFFF">vm-03</text>
        <rect x="12" y="36" width="42" height="20" rx="3" fill="#A8A8AC"/>

        <rect width="140" height="180" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>

        <text x="12" y="17" font-size="13" font-weight="500" fill="#FFFFFF">vm-04</text>
        <rect x="12" y="36" width="42" height="20" rx="3" fill="#A8A8AC"/>
        <text x="33" y="50" font-size="13" fill="#FFFFFF" text-anchor="middle">linux</text>

    <rect x="230" y="260" width="590" height="60" fill="#3F4A5E" stroke="#1F2433" stroke-width="1.5">

    </rect>

    <text x="525" y="308" text-anchor="middle" font-size="12" fill="#B5C0D0" font-style="italic">ESXi · KVM · Hyper-V · Xen</text>
    <!-- Hardware: y=320-400 (80 tall, abuts hypervisor) -->

    <text x="525" y="350" text-anchor="middle" font-size="16" font-weight="600" fill="#1A1A1A" letter-spacing="1">PHYSICAL HARDWARE</text>
    <text x="525" y="370" text-anchor="middle" font-size="12" fill="#5F5E5A">CPU · RAM · disks · NICs</text>
    <text x="525" y="390" text-anchor="middle" font-size="11" fill="#9D9C95" font-style="italic">datacenter or cloud server</text>
    <!-- Caption -->
    <text x="520" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#1F8A60">⚡ Hypervisor talks directly to the hardware. No OS in between.</text>
    <text x="520" y="476" text-anchor="middle" font-size="13" fill="#5F5E5A">Used by: ESXi (every vSphere host), KVM, Hyper-V, Xen — production servers and public cloud.</text>
  </g>

  <!-- Type 2 mode -->
  <g class="mode-group mode-type2">
    <text x="520" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">TYPE 2 — HOSTED HYPERVISOR</text>
    <!-- Stack: VMs (y=80-220, 140 tall) → Hyper app (y=220-280, 60 tall) → Host OS (y=280-340, 60 tall) → Hardware (y=340-410, 70 tall) -->
    <g transform="translate(290, 80)">
      <g transform="translate(0, 0)">
        <rect width="140" height="140" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>

        <text x="12" y="17" font-size="13" font-weight="500" fill="#FFFFFF">vm-test</text>
        <rect x="12" y="36" width="42" height="20" rx="3" fill="#A8A8AC"/>

        <text x="60" y="50" font-size="13" fill="#3A3A3A">test</text>

        <text x="70" y="100" text-anchor="middle" font-size="13" fill="#B85829" font-weight="600">running</text>
        <text x="70" y="120" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">○ slower (~80% speed)</text>
        <circle cx="130" cy="13" r="3" fill="#5DCAA5"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/></circle>
      </g>
      <g transform="translate(160, 0)">
        <rect width="140" height="140" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
        <path d="M 0 26 L 0 8 Q 0 0 8 0 L 132 0 Q 140 0 140 8 L 140 26 Z" fill="#5F5E5A"/>
        <text x="12" y="17" font-size="13" font-weight="500" fill="#FFFFFF">vm-dev</text>
        <rect x="12" y="36" width="42" height="20" rx="3" fill="#A8A8AC"/>
        <text x="33" y="50" font-size="13" fill="#FFFFFF" text-anchor="middle">linux</text>
        <text x="60" y="50" font-size="13" fill="#3A3A3A">dev</text>
        <rect x="12" y="68" width="116" height="6" rx="2" fill="#E0E0DE"/>
        <rect x="12" y="68" width="60" height="6" rx="2" fill="#5A6B81"/>
        <text x="70" y="100" text-anchor="middle" font-size="13" fill="#B85829" font-weight="600">running</text>

        <rect x="12" y="36" width="42" height="20" rx="3" fill="#A8A8AC"/>
        <text x="33" y="50" font-size="13" fill="#FFFFFF" text-anchor="middle">windows</text>
        <text x="60" y="50" font-size="13" fill="#3A3A3A">qa</text>
        <rect x="12" y="68" width="116" height="6" rx="2" fill="#E0E0DE"/>
        <rect x="12" y="68" width="40" height="6" rx="2" fill="#5A6B81"/>

        <text x="70" y="120" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">○ slower (~80% speed)</text>
        <circle cx="130" cy="13" r="3" fill="#5DCAA5"><animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/></circle>
      </g>
    </g>
    <!-- Hypervisor app: y=220-280 (60 tall, abuts VMs and host OS) -->
    <rect x="290" y="220" width="460" height="60" fill="#3F4A5E" stroke="#1F2433" stroke-width="1.5">
      <animate attributeName="fill" values="#3F4A5E;#536179;#3F4A5E" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="520" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#E8E8E0" letter-spacing="2">TYPE 2 HYPERVISOR (an app)</text>

    <rect x="230" y="280" width="580" height="60" fill="#536179" stroke="#3F4A5E" stroke-width="1.5"/>

    <text x="520" y="326" text-anchor="middle" font-size="12" fill="#E8EAEF" font-style="italic">Windows · macOS · Linux</text>
    <!-- Hardware: y=340-410 (70 tall, abuts) -->
    <rect x="230" y="340" width="580" height="70" rx="0" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1.5"/>
    <text x="520" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A" letter-spacing="1">PHYSICAL HARDWARE</text>
    <text x="520" y="386" text-anchor="middle" font-size="12" fill="#5F5E5A">your laptop or desktop</text>

  </g>

</svg>

<script>
(function () {
  const svg = document.getElementById('canvas');
  const playBtn = document.getElementById('play-btn');
  const speedSlider = document.getElementById('speed-slider');
  const speedDisplay = document.getElementById('speed-display');
  const stageLabel = document.getElementById('stage-label');
  const stageText = {
    type1: 'Type 1: hypervisor runs directly on the hardware. No host OS.',
    type2: 'Type 2: hypervisor is an application on top of a regular OS.'
  };
  let speed = 1.0, isPaused = false, svgClock = 0, lastFrame = performance.now();
  svg.pauseAnimations();
  function tick(now) {
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;
    if (!isPaused) { svgClock += dt * speed; svg.setCurrentTime(svgClock); }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.toggle('active', b === btn));
    svg.dataset.mode = mode;
    stageLabel.textContent = stageText[mode];
    svgClock = 0; svg.setCurrentTime(0);
  }));
  playBtn.addEventListener('click', () => { isPaused = !isPaused; playBtn.textContent = isPaused ? 'Play' : 'Pause'; });
  speedSlider.addEventListener('input', e => { speed = parseFloat(e.target.value); speedDisplay.textContent = speed.toFixed(1) + '×'; });
})();
</script>
</body>
</html>
