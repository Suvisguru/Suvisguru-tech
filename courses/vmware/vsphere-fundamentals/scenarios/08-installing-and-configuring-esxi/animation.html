<!DOCTYPE html>
<!--
  Lesson 08 — Installing and Configuring ESXi
  Six modes: install / accounts / ui-config / services / ntp-dns-routing / lockdown.
  Pause/Play + Speed slider parity with lessons 1-5.
  No transform-origin attribute on rotation groups (per DECISIONS.md).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Installing and Configuring ESXi — animation</title>
<style>
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; margin: 0; }
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .mode-btn { border: 1px solid #d8d6cf; background: #ffffff; color: #3a3a3a; padding: 9px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; animation: btn-pop 2.4s ease-in-out infinite; }
  @keyframes btn-pop { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(63,74,94,0); } 50% { transform: scale(1.035); box-shadow: 0 0 0 4px rgba(63,74,94,0.08); } }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active { background: #3F4A5E; color: #FFFFFF; border-color: #3F4A5E; animation: none; }
  .stage-label { font-size: 15px; color: #3a3a3a; margin: 12px 0 18px 0; font-weight: 500; }
  .speed-control { margin-left: auto; font-size: 13px; color: #5F5E5A; display: flex; gap: 8px; align-items: center; }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas { width: 100%; max-width: 1040px; height: auto; display: block; }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="install"] .mode-install,
  #canvas[data-mode="accounts"] .mode-accounts,
  #canvas[data-mode="ui-config"] .mode-ui-config,
  #canvas[data-mode="services"] .mode-services,
  #canvas[data-mode="ntp-dns-routing"] .mode-ntp,
  #canvas[data-mode="lockdown"] .mode-lockdown { display: block; }
</style>
</head>
<body>

<div class="controls">
  <button class="mode-btn active" data-mode="install" type="button">1 · Install</button>
  <button class="mode-btn" data-mode="accounts" type="button">2 · Accounts</button>
  <button class="mode-btn" data-mode="ui-config" type="button">3 · UI config</button>
  <button class="mode-btn" data-mode="services" type="button">4 · Services</button>
  <button class="mode-btn" data-mode="ntp-dns-routing" type="button">5 · NTP/DNS/Routing</button>
  <button class="mode-btn" data-mode="lockdown" type="button">6 · Lockdown</button>
  <button class="mode-btn" id="play-btn" type="button">Pause</button>
  <span class="speed-control"><span>Speed</span><input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider"><span id="speed-display">1.0&times;</span></span>
</div>
<div class="stage-label" id="stage-label">Subtopic 1 of 6 · Install: ISO boots, target chosen, root password set, host comes up on the yellow DCUI.</div>

<svg id="canvas" data-mode="install" viewBox="0 0 1040 540" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="aArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3F4A5E"/>
    </marker>
    <marker id="aArrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1F8A60"/>
    </marker>
    <marker id="aArrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#B85829"/>
    </marker>
  </defs>

  <!-- ============================================
       MODE 1: INSTALL  (8 second loop)
       Story: ISO boots → installer prompts → progress bar → reboot → DCUI live
       ============================================ -->
  <g class="mode-group mode-install">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 1 — INSTALLING ESXi ON BARE-METAL</text>

    <!-- Timeline strip -->
    <g transform="translate(60,80)">
      <text x="0" y="0" font-size="11" fill="#5A6B81">t = 0s</text>
      <text x="920" y="0" font-size="11" text-anchor="end" fill="#5A6B81">~10 min on a real host</text>
      <line x1="0" y1="10" x2="920" y2="10" stroke="#D5DCE6" stroke-width="2"/>
      <!-- moving cursor -->
      <g>
        <circle cx="0" cy="10" r="6" fill="#3F4A5E">
          <animate attributeName="cx" values="0;230;460;690;920;920" keyTimes="0;0.25;0.5;0.75;0.95;1" dur="8s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- Stage 1: BIOS / Server boots from ISO (visible 0-2s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.22;0.25;0.7;0.85;0.97;1" dur="8s" repeatCount="indefinite"/>
      <rect x="120" y="130" width="800" height="340" rx="10" fill="#1F2937"/>
      <text x="520" y="180" text-anchor="middle" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5">VMware ESXi 8.0 — Boot Menu</text>
      <text x="520" y="220" text-anchor="middle" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">▸ ESXi-8.0.0 standard installer</text>
      <text x="520" y="250" text-anchor="middle" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">  Boot from local disk</text>
      <text x="520" y="280" text-anchor="middle" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">  Memory test</text>
      <text x="520" y="380" text-anchor="middle" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5">Press ENTER to install · ⏱ 5</text>
    </g>

    <!-- Stage 2: Installer prompts (visible 2-4s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.22;0.27;0.47;0.5;0.97;1" dur="8s" repeatCount="indefinite"/>
      <rect x="120" y="130" width="800" height="340" rx="10" fill="#0a3a73"/>
      <rect x="120" y="130" width="800" height="32" rx="10" fill="#0d5dc4"/>
      <text x="140" y="151" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">VMware ESXi 8.0.0 Installer</text>
      <text x="160" y="200" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">Select a disk to install or upgrade:</text>
      <rect x="160" y="220" width="600" height="20" fill="#FFFFFF"/>
      <text x="170" y="234" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">▸ usb_disk · 64.0 GiB · KingstonDT</text>
      <text x="170" y="260" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">  local.SSD · 256 GiB · INTEL_S4520</text>
      <text x="160" y="320" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">Root password:  ●●●●●●●●●●●●</text>
      <text x="160" y="345" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">Confirm:        ●●●●●●●●●●●●</text>
      <text x="160" y="430" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5">F11 to install</text>
    </g>

    <!-- Stage 3: Progress bar (visible 4-6s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0;0;0" keyTimes="0;0.22;0.27;0.47;0.5;0.72;0.75;0.97;1" dur="8s" repeatCount="indefinite"/>
      <rect x="120" y="130" width="800" height="340" rx="10" fill="#0a3a73"/>
      <text x="520" y="240" text-anchor="middle" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">Installing ESXi ...</text>
      <rect x="220" y="280" width="600" height="22" rx="3" fill="#1F2937" stroke="#FFFFFF"/>
      <rect x="222" y="282" width="0" height="18" rx="2" fill="#5DCAA5">
        <animate attributeName="width" values="0;596" keyTimes="0;1" dur="2s" begin="4s" repeatCount="1"/>
      </rect>
      <text x="520" y="340" text-anchor="middle" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">Writing system partitions to /vmfs/devices/disks/usb_disk</text>
      <text x="520" y="400" text-anchor="middle" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#5DCAA5">Press Enter to reboot when complete</text>
    </g>

    <!-- Stage 4: Yellow DCUI live (visible 6-8s) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0;1;1" keyTimes="0;0.22;0.27;0.47;0.72;0.75;1" dur="8s" repeatCount="indefinite"/>
      <rect x="120" y="130" width="800" height="340" rx="10" fill="#F2C94C" stroke="#1F2937" stroke-width="2"/>
      <rect x="120" y="130" width="800" height="36" rx="10" fill="#1F2937"/>
      <text x="140" y="153" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#FFFFFF">VMware ESXi 8.0.0 (VMKernel Release Build 21495797)</text>
      <text x="160" y="200" font-size="13" font-family="ui-monospace, Menlo, monospace" font-weight="700" fill="#1F2937">Hardware: Dell PowerEdge R750 · 2 × Xeon · 384 GB RAM</text>
      <text x="160" y="240" font-size="14" font-family="ui-monospace, Menlo, monospace" font-weight="700" fill="#1F2937">esx-01.lab.local</text>
      <text x="160" y="270" font-size="13" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">Management network: 10.20.30.41 (vmnic0)</text>
      <text x="160" y="295" font-size="12" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">To manage this host: https://10.20.30.41/</text>
      <text x="160" y="380" font-size="13" font-family="ui-monospace, Menlo, monospace" font-weight="700" fill="#1F2937">&lt;F2&gt; Customize System / View Logs</text>
      <text x="160" y="405" font-size="13" font-family="ui-monospace, Menlo, monospace" font-weight="700" fill="#1F2937">&lt;F12&gt; Shut Down / Restart</text>
      <text x="520" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#1F8A60">✓ host is up · ready for configuration</text>
    </g>
  </g>

  <!-- ============================================
       MODE 2: ACCOUNTS  (8 second loop)
       Story: 6 admins all using root → audit log shows root,root,root → switch to named accounts → audit log shows alice,bob,...
       ============================================ -->
  <g class="mode-group mode-accounts">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 2 — ACCOUNT BEST PRACTICES</text>

    <!-- 6 admin silhouettes on the left -->
    <g transform="translate(80,90)">
      <text x="0" y="0" font-size="13" font-weight="700" fill="#1F2937">6 admins</text>
      <g>
        <g transform="translate(20,30)">
          <circle cx="0" cy="0" r="10" fill="#5A6B81"/><rect x="-12" y="10" width="24" height="20" rx="5" fill="#5A6B81"/>
          <text x="20" y="20" font-size="11" fill="#1F2937">alice</text>
        </g>
        <g transform="translate(20,80)">
          <circle cx="0" cy="0" r="10" fill="#5A6B81"/><rect x="-12" y="10" width="24" height="20" rx="5" fill="#5A6B81"/>
          <text x="20" y="20" font-size="11" fill="#1F2937">bob</text>
        </g>
        <g transform="translate(20,130)">
          <circle cx="0" cy="0" r="10" fill="#5A6B81"/><rect x="-12" y="10" width="24" height="20" rx="5" fill="#5A6B81"/>
          <text x="20" y="20" font-size="11" fill="#1F2937">carol</text>
        </g>
        <g transform="translate(20,180)">
          <circle cx="0" cy="0" r="10" fill="#5A6B81"/><rect x="-12" y="10" width="24" height="20" rx="5" fill="#5A6B81"/>
          <text x="20" y="20" font-size="11" fill="#1F2937">dan</text>
        </g>
        <g transform="translate(20,230)">
          <circle cx="0" cy="0" r="10" fill="#5A6B81"/><rect x="-12" y="10" width="24" height="20" rx="5" fill="#5A6B81"/>
          <text x="20" y="20" font-size="11" fill="#1F2937">eve</text>
        </g>
        <g transform="translate(20,280)">
          <circle cx="0" cy="0" r="10" fill="#5A6B81"/><rect x="-12" y="10" width="24" height="20" rx="5" fill="#5A6B81"/>
          <text x="20" y="20" font-size="11" fill="#1F2937">frank</text>
        </g>
      </g>
    </g>

    <!-- Stage A: all use root (visible 0-4s) -->
    <g>
      <!-- door labelled root -->
      <g opacity="0">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="8s" repeatCount="indefinite"/>
        <rect x="280" y="120" width="100" height="280" rx="6" fill="#8E2A2A" stroke="#1F2937" stroke-width="2"/>
        <text x="330" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">root</text>
        <text x="330" y="180" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.9">(shared password)</text>
        <circle cx="365" cy="270" r="4" fill="#F2C94C"/>
        <!-- 6 lines from admins to root door -->
        <line x1="170" y1="120" x2="280" y2="160" stroke="#8E2A2A" stroke-width="1.4"/>
        <line x1="170" y1="170" x2="280" y2="200" stroke="#8E2A2A" stroke-width="1.4"/>
        <line x1="170" y1="220" x2="280" y2="240" stroke="#8E2A2A" stroke-width="1.4"/>
        <line x1="170" y1="270" x2="280" y2="280" stroke="#8E2A2A" stroke-width="1.4"/>
        <line x1="170" y1="320" x2="280" y2="320" stroke="#8E2A2A" stroke-width="1.4"/>
        <line x1="170" y1="370" x2="280" y2="360" stroke="#8E2A2A" stroke-width="1.4"/>
      </g>
      <!-- audit log showing all root -->
      <g opacity="0">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.5;1" dur="8s" repeatCount="indefinite"/>
        <rect x="430" y="120" width="540" height="280" rx="6" fill="#1F2937"/>
        <text x="450" y="148" font-size="12" font-family="ui-monospace, Menlo, monospace" font-weight="700" fill="#FFFFFF">/var/log/auth.log</text>
        <text x="450" y="180" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 14:01 · login: <tspan fill="#F2C94C">root</tspan> · vm-create</text>
        <text x="450" y="200" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 14:08 · login: <tspan fill="#F2C94C">root</tspan> · network-edit</text>
        <text x="450" y="220" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 14:33 · login: <tspan fill="#F2C94C">root</tspan> · datastore-mount</text>
        <text x="450" y="240" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 15:12 · login: <tspan fill="#F2C94C">root</tspan> · vm-power-off</text>
        <text x="450" y="260" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 16:55 · login: <tspan fill="#F2C94C">root</tspan> · service-ssh-start</text>
        <text x="450" y="280" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 17:01 · login: <tspan fill="#F2C94C">root</tspan> · vm-snapshot</text>
        <text x="450" y="320" font-size="13" font-weight="700" fill="#B85829">⚠ who actually did each action?  no idea.</text>
        <text x="450" y="350" font-size="12" fill="#FFFFFF">post-mortem can't attribute any action.</text>
      </g>
    </g>

    <!-- Stage B: switch to named accounts (visible 4-8s) -->
    <g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.55;1" dur="8s" repeatCount="indefinite"/>
        <!-- vault holding root -->
        <rect x="280" y="120" width="100" height="80" rx="6" fill="#5A6B81" stroke="#1F2937" stroke-width="2"/>
        <text x="330" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">vault</text>
        <text x="330" y="166" text-anchor="middle" font-size="10" fill="#FFFFFF">root (glass-break)</text>
        <circle cx="365" cy="180" r="3" fill="#F2C94C"/>
        <!-- vCenter SSO door -->
        <rect x="280" y="220" width="100" height="180" rx="6" fill="#3F4A5E" stroke="#1F2937" stroke-width="2"/>
        <text x="330" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">vCenter</text>
        <text x="330" y="270" text-anchor="middle" font-size="11" fill="#FFFFFF">SSO</text>
        <text x="330" y="295" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.85">named</text>
        <text x="330" y="307" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.85">accounts</text>
        <text x="330" y="345" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.85">role-based</text>
        <text x="330" y="357" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.85">access</text>
        <!-- 6 lines from admins to SSO door -->
        <line x1="170" y1="120" x2="280" y2="240" stroke="#3F4A5E" stroke-width="1.4"/>
        <line x1="170" y1="170" x2="280" y2="260" stroke="#3F4A5E" stroke-width="1.4"/>
        <line x1="170" y1="220" x2="280" y2="290" stroke="#3F4A5E" stroke-width="1.4"/>
        <line x1="170" y1="270" x2="280" y2="320" stroke="#3F4A5E" stroke-width="1.4"/>
        <line x1="170" y1="320" x2="280" y2="350" stroke="#3F4A5E" stroke-width="1.4"/>
        <line x1="170" y1="370" x2="280" y2="380" stroke="#3F4A5E" stroke-width="1.4"/>
      </g>
      <!-- audit log with named users -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.55;1" dur="8s" repeatCount="indefinite"/>
        <rect x="430" y="120" width="540" height="280" rx="6" fill="#1F2937"/>
        <text x="450" y="148" font-size="12" font-family="ui-monospace, Menlo, monospace" font-weight="700" fill="#FFFFFF">/var/log/auth.log</text>
        <text x="450" y="180" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 14:01 · login: <tspan fill="#5DCAA5">alice@corp</tspan> · vm-create</text>
        <text x="450" y="200" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 14:08 · login: <tspan fill="#5DCAA5">bob@corp</tspan> · network-edit</text>
        <text x="450" y="220" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 14:33 · login: <tspan fill="#5DCAA5">carol@corp</tspan> · datastore-mount</text>
        <text x="450" y="240" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 15:12 · login: <tspan fill="#5DCAA5">dan@corp</tspan> · vm-power-off</text>
        <text x="450" y="260" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 16:55 · login: <tspan fill="#5DCAA5">eve@corp</tspan> · service-ssh-start</text>
        <text x="450" y="280" font-size="11" font-family="ui-monospace, Menlo, monospace" fill="#9D9C95">2026-04-30 17:01 · login: <tspan fill="#5DCAA5">frank@corp</tspan> · vm-snapshot</text>
        <text x="450" y="320" font-size="13" font-weight="700" fill="#1F8A60">✓ every action attributed to a person</text>
        <text x="450" y="350" font-size="12" fill="#FFFFFF">post-mortem can pinpoint who did what.</text>
      </g>
    </g>
  </g>

  <!-- ============================================
       MODE 3: UI-CONFIG  (8 second loop)
       Story: vCenter goes down → admin reaches DCUI → restarts management agents → host back
       ============================================ -->
  <g class="mode-group mode-ui-config">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 3 — DCUI &amp; HOST CLIENT WHEN vCENTER IS DOWN</text>

    <!-- vCenter box (top center) -->
    <g transform="translate(440,90)">
      <rect width="160" height="60" rx="8" fill="#3F4A5E" stroke="#1F2937" stroke-width="2"/>
      <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">vCenter</text>
      <text x="80" y="46" text-anchor="middle" font-size="11" fill="#FFFFFF" opacity="0.85">vSphere Client</text>
      <!-- crashed cross (appears at 1.5s) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1;1" keyTimes="0;0.18;0.22;0.85;0.95;1" dur="8s" repeatCount="indefinite"/>
        <line x1="20" y1="14" x2="140" y2="46" stroke="#B85829" stroke-width="3"/>
        <line x1="140" y1="14" x2="20" y2="46" stroke="#B85829" stroke-width="3"/>
        <text x="80" y="-4" text-anchor="middle" font-size="11" font-weight="700" fill="#B85829">crashed</text>
      </g>
    </g>

    <!-- Admin laptop on the left -->
    <g transform="translate(80,170)">
      <rect width="120" height="76" rx="6" fill="#1F2937"/>
      <rect x="6" y="6" width="108" height="60" rx="2" fill="#5DCAA5" opacity="0.15"/>
      <text x="60" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#5DCAA5">admin</text>
      <rect x="-10" y="76" width="140" height="6" rx="2" fill="#5A6B81"/>

<script>
const svg = document.getElementById('canvas');
const playBtn = document.getElementById('play-btn');
const speedSlider = document.getElementById('speed-slider');
const speedDisplay = document.getElementById('speed-display');
const stageLabel = document.getElementById('stage-label');

const labels = {
  install:           'Subtopic 1 of 6 · Install: ISO boots, target chosen, root password set, host comes up on the yellow DCUI.',
  accounts:          'Subtopic 2 of 6 · Accounts: shared root vs named accounts via vCenter SSO. Audit log goes from "root" everywhere to a real name per action.',
  'ui-config':       'Subtopic 3 of 6 · DCUI & Host Client: when vCenter is down, you reach the host through the yellow DCUI (or Host Client). Restart Management Agents fixes the most common case.',
  services:          'Subtopic 4 of 6 · Services: SSH off by default. Enable for an investigation, set policy to "Start manually" so a reboot returns the host to a safe state.',
  'ntp-dns-routing': 'Subtopic 5 of 6 · NTP, DNS, routing: clock drift causes most "certificate" errors at vCenter join. Configure all three before joining.',
  lockdown:          'Subtopic 6 of 6 · Lockdown mode: Disabled, Normal, Strict. Each closes more direct-access doors. Exception users keep service accounts working.',
};

let isPaused = false;
let speed = 1;
let svgClock = 0;
let lastWall = performance.now();
let rafId = null;

function loop(now) {
  if (!isPaused) {
    const dt = (now - lastWall) / 1000;
    svgClock += dt * speed;
    svg.setCurrentTime(svgClock);
  }
  lastWall = now;
  rafId = requestAnimationFrame(loop);
}

function startLoop() {
  // Always pause SMIL ourselves and drive the clock manually so Speed actually works
  svg.pauseAnimations();
  svgClock = svg.getCurrentTime();
  lastWall = performance.now();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.getAttribute('data-mode');
    svg.setAttribute('data-mode', mode);
    stageLabel.textContent = labels[mode] || '';
    // restart the clock for the new mode
    svgClock = 0;
    svg.setCurrentTime(0);
  });
});

playBtn.addEventListener('click', () => {
  isPaused = !isPaused;
  playBtn.textContent = isPaused ? 'Play' : 'Pause';
});

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedDisplay.innerHTML = speed.toFixed(1) + '&times;';
});

startLoop();
</script>
