      <rect x="8" y="48" width="80" height="4" rx="1" fill="#E0E0DE"/>
      <rect x="8" y="48" width="42" height="4" rx="1" fill="#5A6B81"/>
      <circle cx="110" cy="9" r="2.5" fill="#5DCAA5"/>
    </g>

    <g transform="translate(120, 0)">
