  <!-- ============================== TRANSITION ============================== -->
  <g transform="translate(550, 730)">
    <line x1="-450" y1="0" x2="-100" y2="0" stroke="#cccccc" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="100" y1="0" x2="450" y2="0" stroke="#cccccc" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="-90" y="-22" width="180" height="44" rx="22" fill="#3F4A5E"/>
    <text x="0" y="6" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">CONSOLIDATE</text>
    <line x1="0" y1="34" x2="0" y2="74" stroke="#3F4A5E" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ============================== AFTER TITLE ============================== -->
  <g>
    <text x="550" y="848" font-size="13" font-weight="500" fill="#3F4A5E" text-anchor="middle" letter-spacing="2">AFTER VIRTUALIZATION</text>
    <text x="550" y="882" font-size="22" font-weight="500" fill="#1a1a1a" text-anchor="middle">One host, eight VMs</text>
    <text x="550" y="908" font-size="14" font-weight="400" fill="#5F5E5A" text-anchor="middle" font-style="italic">~72% utilization. Capacity is being used.</text>
  </g>

