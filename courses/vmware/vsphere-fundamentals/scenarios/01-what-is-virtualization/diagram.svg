  <!-- Server 4: dns-server, 4% (bottom-right) -->
  <g transform="translate(560, 460)">
    <use href="#rack-server-rear"/>
    <text x="240" y="220" font-size="16" font-weight="500" fill="#3a3a3a" text-anchor="middle">dns-server</text>
    <g transform="translate(160, 240)">
