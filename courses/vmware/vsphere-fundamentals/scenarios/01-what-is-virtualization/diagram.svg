    <!-- VM row 2 -->
    <g transform="translate(0, 64)">
      <rect x="0" y="0" width="120" height="64" rx="6" ry="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
      <path d="M 0 18 L 0 6 Q 0 0 6 0 L 114 0 Q 120 0 120 6 L 120 18 Z" fill="#5F5E5A"/>
