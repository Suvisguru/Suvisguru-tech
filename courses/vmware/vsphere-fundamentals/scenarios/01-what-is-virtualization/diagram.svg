      <path d="M 0 18 L 0 6 Q 0 0 6 0 L 114 0 Q 120 0 120 6 L 120 18 Z" fill="#5F5E5A"/>
      <text x="9" y="13" font-size="11" font-weight="500" fill="#FFFFFF">vm-02</text>
      <rect x="8" y="24" width="34" height="16" rx="3" fill="#A8A8AC"/>
