<!DOCTYPE html>
<!--
  Lesson 01 — What is virtualization?
  Animated SVG illustration.

  Modes: "before" shows 4 physical servers each running one app at low utilization;
         "after" shows 1 host with a hypervisor band and 8 VMs at high utilization.

  Loop: 10s nominal at 1.0x. Speed 0.3x to 2x. Pause/play.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What is virtualization? — animation</title>
<style>
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding: 24px;
    color: #1a1a1a;
    margin: 0;
  }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .mode-btn {
    border: 1px solid #d8d6cf;
    background: #ffffff;
    color: #3a3a3a;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active {
    background: #3F4A5E;
    color: #FFFFFF;
    border-color: #3F4A5E;
  }
  .stage-label {
    font-size: 15px;
    color: #3a3a3a;
    margin: 12px 0 18px 0;
    min-height: 22px;
    font-weight: 500;
  }
  .speed-control {
    margin-left: auto;
    font-size: 13px;
    color: #5F5E5A;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas {
    width: 100%;
    max-width: 1040px;
    height: auto;
    display: block;
  }
  #canvas .mode-before, #canvas .mode-after { display: none; }
  #canvas.show-before .mode-before { display: block; }
  #canvas.show-after  .mode-after  { display: block; }
  @media (max-width: 700px) {
    body { padding: 16px; }
    .speed-control { margin-left: 0; width: 100%; margin-top: 4px; }
  }
</style>
</head>
<body>

<div class="controls">
  <button class="mode-btn active" data-mode="before" type="button">Before</button>
  <button class="mode-btn" data-mode="after" type="button">After</button>
  <button class="mode-btn" id="play-btn" type="button">Pause</button>
  <span class="speed-control">
    <span>Speed</span>
    <input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider">
    <span id="speed-display">1.0&times;</span>
  </span>
</div>

<div class="stage-label" id="stage-label">Before: one application per server, most capacity idle.</div>

        <circle cx="32.5" cy="32.5" r="22" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="1"/>
        <g>

          <animate attributeName="width" values="202;213;196;218;182;208;200;210;202" dur="10s" repeatCount="indefinite"/>
        </rect>
        <text x="290" y="11" font-size="13" font-weight="500" fill="#3A3A3A" text-anchor="start">~72% utilization</text>
      </g>
    </g>

    <text x="520" y="615" font-size="14" font-weight="500" fill="#5F5E5A" text-anchor="middle">
      1 host, 8 VMs. The hypervisor manages the sharing.
    </text>
  </g>
</svg>

<script>
(function () {
  const svg = document.getElementById('canvas');
  const playBtn = document.getElementById('play-btn');
  const speedSlider = document.getElementById('speed-slider');
  const speedDisplay = document.getElementById('speed-display');
  const stageLabel = document.getElementById('stage-label');

  const stageText = {
    before: 'Before: one application per server, most capacity idle.',
    after:  'After: many VMs share one host, capacity is used.'
  };

  let speed = 1.0;
  let isPaused = false;
  let svgClock = 0;
  let lastFrame = performance.now();

  svg.pauseAnimations();

  function tick(now) {
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;
    if (!isPaused) {
      svgClock += dt * speed;
      svg.setCurrentTime(svgClock);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  document.querySelectorAll('.mode-btn[data-mode]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const mode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn[data-mode]').forEach(function (b) {
        b.classList.toggle('active', b === btn);
      });
      svg.classList.remove('show-before', 'show-after');
      svg.classList.add('show-' + mode);
      stageLabel.textContent = stageText[mode];
      svgClock = 0;
      svg.setCurrentTime(0);
    });
  });

  playBtn.addEventListener('click', function () {
    isPaused = !isPaused;
    playBtn.textContent = isPaused ? 'Play' : 'Pause';
  });

  speedSlider.addEventListener('input', function (e) {
    speed = parseFloat(e.target.value);
    speedDisplay.textContent = speed.toFixed(1) + '×';
  });
})();
</script>

</body>
</html>
