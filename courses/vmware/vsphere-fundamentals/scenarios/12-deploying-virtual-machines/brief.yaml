      before_after: { target_words_each_side: 80 }
      analogy: { direction: "OVF/OVA is the flat-pack version of a furnished apartment — boxes you unpack into a unit. Vendors ship appliances this way so customers can drop them into any vSphere." }
      quick_check: { type: "multiple_choice", options: 4 }
