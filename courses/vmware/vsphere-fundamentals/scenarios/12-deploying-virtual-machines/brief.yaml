    pedagogical_block:
      concept: { target_words: 200 }
      before_after: { target_words_each_side: 80 }
      analogy: { direction: "A template is the gold-standard show apartment. A clone is a copy of that apartment, ready for a tenant. You build the show apartment carefully once, then stamp out copies." }
      quick_check: { type: "multiple_choice", options: 4 }
      eli5: { target_words_max: 80 }
      eli10: { target_words: 180 }
