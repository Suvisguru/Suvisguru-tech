# Intake brief — Lesson 12, vSphere Fundamentals (final lesson)
# Topic: Deploying Virtual Machines
# Format: PER-SUBTOPIC structure.

lesson:
  title: "Deploying Virtual Machines"
  slug: "12-deploying-virtual-machines"
  domain: "vmware"
  course_slug: "vsphere-fundamentals"
  position: 12
  granularity: "sub-topic"
  brief_drafted_on: "2026-05-01"
  pedagogical_format: "per-subtopic"

learner_profile:
  prerequisites:
    - "Lessons 01-11. Hosts, vCenter, networking, and storage are all in place."
  assumed_zero_knowledge_of:
    - "VM internals (vCPU, vRAM, vDisk, vNIC, virtual hardware version)."
    - "How to create a new VM from scratch in vSphere Client."
    - "Templates and clones — reusable VM blueprints."
    - "Content libraries — cross-vCenter sharing of templates and ISOs."
    - "OVF/OVA — packaged VM imports."
    - "VM snapshots — point-in-time states and their costs."
    - "VMware Tools — the in-guest agent and what it provides."
    - "Day-2 VM lifecycle operations — power, edit settings, hot-add."

learning_outcomes_overall:
  - "Learner can describe the major virtual hardware that makes up a VM."
  - "Learner can step through creating a new VM from scratch in the vSphere Client."
  - "Learner can convert a VM to a template and deploy clones from it."
  - "Learner can use a content library to share templates and ISOs across vCenters."
  - "Learner can deploy a VM from an OVF/OVA package."
  - "Learner can take, consolidate, and remove a VM snapshot — and explain when not to."
  - "Learner can describe what VMware Tools provides and why every guest should have it."
  - "Learner can perform day-2 VM operations: edit settings, hot-add, migrate, remove."

subtopics:
  - id: 1
    slug: "vm-overview"
    title: "VM overview: what's inside a virtual machine"
    pedagogical_block:
      concept: { target_words: 220 }
      before_after: { target_words_each_side: 80 }
      analogy: { direction: "A VM is a fully-furnished apartment: walls (vRAM), floor (vDisk), electricity (vCPU), windows (vNIC), and a key (BIOS/UEFI). The hypervisor is the building infrastructure that makes them possible." }
      quick_check: { type: "multiple_choice", options: 4 }
      eli5: { target_words_max: 80 }
      eli10: { target_words: 200 }
      real_world: { count: 1 }
      flashcards: { count: 3 }
      quiz: { count: 2 }

  - id: 2
    slug: "create-new-vm"
    title: "Creating a new VM from scratch"
    pedagogical_block:
      concept: { target_words: 220 }
      before_after: { target_words_each_side: 80 }
      analogy: { direction: "Creating a new VM is like commissioning a new apartment: pick the floor, the size, the layout, and the appliances; the building manager then carves it out for the tenant." }
      quick_check: { type: "multiple_choice", options: 4 }
