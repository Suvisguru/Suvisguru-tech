<html lang="en">

<style>

  #canvas { width: 100%; max-width: 1040px; height: auto; display: block; }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="overview"]  .mode-overview,
  #canvas[data-mode="create"]    .mode-create,
  #canvas[data-mode="templates"] .mode-templates,
  #canvas[data-mode="library"]   .mode-library,
  #canvas[data-mode="ovf"]       .mode-ovf,
  #canvas[data-mode="snapshots"] .mode-snapshots,

  <span class="speed-control"><span>Speed</span><input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider"><span id="speed-display">1.0&times;</span></span>
</div>
<div class="stage-label" id="stage-label">Subtopic 1 of 8 · Overview: a VM is virtual hardware (vCPU, vRAM, vDisk, vNIC) presenting itself to the guest OS as a real computer.</div>

<svg id="canvas" data-mode="overview" viewBox="0 0 1040 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="aArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#3F4A5E"/></marker>
    <marker id="aArrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#1F8A60"/></marker>
  </defs>

  <!-- MODE 1: OVERVIEW — show a VM with its virtual hardware labelled -->
  <g class="mode-group mode-overview">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 1 — INSIDE A VIRTUAL MACHINE</text>

    <!-- Big VM container -->
    <g transform="translate(220,80)">
      <rect width="600" height="380" rx="14" fill="#FFFFFF" stroke="#5DCAA5" stroke-width="3"/>
      <text x="300" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2937">VM: vm-app1</text>
      <text x="300" y="54" text-anchor="middle" font-size="11" fill="#5A6B81">guest OS thinks this is a real computer</text>

      <!-- vCPU -->
      <g transform="translate(40,80)">
        <rect width="120" height="80" rx="8" fill="#3F4A5E"/>
        <text x="60" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">vCPU × 4</text>
        <text x="60" y="52" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">scheduled onto</text>
        <text x="60" y="66" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">physical cores</text>
      </g>

      <!-- vRAM -->
      <g transform="translate(180,80)">
        <rect width="120" height="80" rx="8" fill="#5E4A8E"/>
        <text x="60" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">vRAM</text>
        <text x="60" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">8 GB</text>
        <text x="60" y="66" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.85">overcommit possible</text>
      </g>

      <!-- vDisk -->
      <g transform="translate(320,80)">
        <rect width="120" height="80" rx="8" fill="#1F8A60"/>
        <text x="60" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">vDisk</text>
        <text x="60" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">60 GB · vmdk</text>
        <text x="60" y="66" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.85">on a datastore</text>
      </g>

      <!-- vNIC -->
      <g transform="translate(460,80)">
        <rect width="120" height="80" rx="8" fill="#B85829"/>
        <text x="60" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">vNIC</text>
        <text x="60" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">VMXNET3</text>
        <text x="60" y="66" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.85">port group</text>
      </g>

      <!-- BIOS/EFI + controllers + version -->
      <g transform="translate(40,180)">
        <rect width="180" height="60" rx="8" fill="#FFFFFF" stroke="#5A6B81"/>
        <text x="90" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">BIOS / EFI firmware</text>
        <text x="90" y="42" text-anchor="middle" font-size="10" fill="#5A6B81">EFI for modern guests</text>
      </g>
      <g transform="translate(240,180)">
        <rect width="180" height="60" rx="8" fill="#FFFFFF" stroke="#5A6B81"/>
        <text x="90" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">Paravirtual SCSI / NVMe</text>
        <text x="90" y="42" text-anchor="middle" font-size="10" fill="#5A6B81">storage controller</text>
      </g>
      <g transform="translate(440,180)">
        <rect width="140" height="60" rx="8" fill="#FFFFFF" stroke="#5A6B81"/>
        <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">CD/DVD</text>
        <text x="70" y="42" text-anchor="middle" font-size="10" fill="#5A6B81">ISO mountable</text>
      </g>

      <!-- HW version -->
      <g transform="translate(40,260)">
        <rect width="540" height="40" rx="6" fill="#F2C94C" opacity="0.4"/>
        <text x="270" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2937">virtual hardware version: vmx-20 (defines available devices &amp; features)</text>
      </g>

      <!-- Files -->
      <g transform="translate(40,320)">
        <text x="0" y="14" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#5A6B81">files on datastore: [ds-vsan-cluster1] vm-app1/</text>
        <text x="0" y="30" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#1F2937">  vm-app1.vmx · vm-app1-flat.vmdk · vm-app1.nvram · vmware.log</text>
      </g>
    </g>
  </g>

  <!-- MODE 2: CREATE — visual wizard steps -->
  <g class="mode-group mode-create">
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 2 — NEW-VM WIZARD</text>

    <g transform="translate(80,90)">
      <text x="440" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2937">vSphere Client → cluster → New Virtual Machine</text>
    </g>

    <g transform="translate(80,120)">
      <!-- step 1 -->
      <g>
        <rect width="200" height="50" rx="6" fill="#FFFFFF" stroke="#5A6B81" stroke-width="1.5"/>
        <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">① Name + folder</text>
        <text x="100" y="40" text-anchor="middle" font-size="10" fill="#5A6B81">vm-app2 → Production</text>
      </g>
      <g transform="translate(220,0)">
        <rect width="200" height="50" rx="6" fill="#FFFFFF" stroke="#5A6B81" stroke-width="1.5"/>
        <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">② Compute</text>

      <g transform="translate(440,0)">
        <rect width="200" height="50" rx="6" fill="#FFFFFF" stroke="#5A6B81" stroke-width="1.5"/>

        <text x="100" y="40" text-anchor="middle" font-size="10" fill="#5A6B81">policy: Gold</text>
      </g>
      <g transform="translate(660,0)">
        <rect width="200" height="50" rx="6" fill="#FFFFFF" stroke="#5A6B81" stroke-width="1.5"/>
        <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">④ Compatibility</text>
        <text x="100" y="40" text-anchor="middle" font-size="10" fill="#5A6B81">vmx-20 (ESXi 8)</text>
      </g>

      <!-- step 5 -->
      <g transform="translate(0,70)">
        <rect width="200" height="50" rx="6" fill="#FFFFFF" stroke="#5A6B81" stroke-width="1.5"/>
        <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">⑤ Guest OS</text>
        <text x="100" y="40" text-anchor="middle" font-size="10" fill="#5A6B81">Ubuntu 22.04 (64-bit)</text>
      </g>
      <g transform="translate(220,70)">
        <rect width="200" height="50" rx="6" fill="#FFFFFF" stroke="#5A6B81" stroke-width="1.5"/>
        <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">⑥ Hardware</text>
        <text x="100" y="40" text-anchor="middle" font-size="10" fill="#5A6B81">2 vCPU · 4GB · 60GB</text>
      </g>
      <g transform="translate(440,70)">
        <rect width="200" height="50" rx="6" fill="#1F8A60" opacity="0.85"/>
        <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">VMXNET3 + PVSCSI</text>
        <text x="100" y="40" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.9">paravirt drivers</text>
      </g>
      <g transform="translate(660,70)">
        <rect width="200" height="50" rx="6" fill="#F2C94C"/>
        <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1F2937">⑦ ISO + EFI</text>
        <text x="100" y="40" text-anchor="middle" font-size="10" fill="#1F2937">mount ubuntu.iso</text>
      </g>
    </g>

    <!-- power on -->
    <g transform="translate(80,290)">
      <rect width="880" height="50" rx="8" fill="#3F4A5E"/>
      <text x="440" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">⑧ Power on → walk OS installer → install VMware Tools → configure</text>

    <!-- progress dot animating across stages -->
    <circle cx="180" cy="240" r="6" fill="#F2C94C" stroke="#1F2937" stroke-width="0.5">

    <g transform="translate(80,140)">
      <rect width="200" height="100" rx="8" fill="#2E7A8C"/>
      <text x="100" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">TEMPLATE</text>
      <text x="100" y="52" text-anchor="middle" font-size="11" fill="#FFFFFF" opacity="0.85">vm-template-ubuntu-22</text>
      <text x="100" y="74" text-anchor="middle" font-size="10" fill="#FFFFFF" opacity="0.85">OS + patches + agents + baseline</text>
      <text x="100" y="92" text-anchor="middle" font-size="9" font-style="italic" fill="#FFFFFF" opacity="0.85">cannot power on</text>

    <!-- Customization spec -->

      </g>
      <g transform="translate(0,80)" opacity="0">
        <animate attributeName="opacity" values="0;0;0;1;1;1;1" keyTimes="0;0.15;0.3;0.4;0.55;0.85;1" dur="6s" repeatCount="indefinite"/>
        <rect width="240" height="44" rx="6" fill="#5DCAA5" opacity="0.6"/>
        <text x="120" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#1F2937">clone-2: app-web-02</text>

      <g transform="translate(0,140)" opacity="0">

    <!-- arrows -->

    <line x1="580" y1="190" x2="680" y2="190" stroke="#3F4A5E" stroke-width="1.6" marker-end="url(#aArrow)"/>

    <text x="520" y="350" text-anchor="middle" font-size="12" fill="#1F2937">Build template once · stamp out clones with unique identities</text>
    <text x="520" y="490" text-anchor="middle" font-size="12" font-weight="600" fill="#5A6B81">no drift · no manual OS installs · 5 minutes vs 1 hour per VM</text>

    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">SUBTOPIC 4 — CONTENT LIBRARY: PUBLISHED + SUBSCRIBED</text>

      <rect x="20" y="60" width="240" height="20" rx="3" fill="#5DCAA5" opacity="0.7"/>
      <text x="140" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2937">ubuntu-22-template · win2022-template · isos · ovas</text>
      <text x="140" y="100" text-anchor="middle" font-size="10" font-style="italic" fill="#FFFFFF" opacity="0.85">single source of truth</text>
    </g>

    <!-- Lines down to subscribed libraries -->

    </g>
    <g transform="translate(420,290)">
      <rect width="200" height="100" rx="10" fill="#FFFFFF" stroke="#5DCAA5" stroke-width="2"/>
      <text x="100" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1F8A60">SUBSCRIBED</text>
      <text x="100" y="48" text-anchor="middle" font-size="11" fill="#1F2937">vc-west.lab.local</text>
      <text x="100" y="78" text-anchor="middle" font-size="10" font-style="italic" fill="#5A6B81">same templates · local copy</text>
    </g>
    <g transform="translate(760,290)">
      <rect width="200" height="100" rx="10" fill="#FFFFFF" stroke="#5DCAA5" stroke-width="2"/>
      <text x="100" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1F8A60">SUBSCRIBED</text>

      <g transform="translate(20,36)">

      <rect x="20" y="208" width="340" height="50" rx="6" fill="#1F8A60" opacity="0.15"/>

    <g transform="translate(580,100)">

      <text x="20" y="68" font-size="11" fill="#1F2937">✗ emulated drivers (slower)</text>
      <text x="20" y="92" font-size="11" fill="#1F2937">✗ "Shut Down" = hard power off</text>
      <text x="20" y="116" font-size="11" fill="#1F2937">✗ time can drift</text>
      <text x="20" y="140" font-size="11" fill="#1F2937">✗ no heartbeat</text>
      <text x="20" y="164" font-size="11" fill="#1F2937">✗ snapshots are crash-consistent</text>
      <text x="20" y="188" font-size="11" fill="#1F2937">✗ mouse / console worse</text>

      <rect x="20" y="208" width="340" height="50" rx="6" fill="#B85829" opacity="0.15"/>
      <text x="190" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#B85829">don't ship a production VM like this</text>

<script>
const svg = document.getElementById('canvas');
const playBtn = document.getElementById('play-btn');
const speedSlider = document.getElementById('speed-slider');
const speedDisplay = document.getElementById('speed-display');
const stageLabel = document.getElementById('stage-label');

const labels = {
  overview:  'Subtopic 1 of 8 · Overview: a VM is virtual hardware (vCPU, vRAM, vDisk, vNIC) presenting itself to the guest OS as a real computer.',
  create:    'Subtopic 2 of 8 · Create: walk the new-VM wizard (name, compute, storage policy, guest OS, hardware, ISO). VM exists powered off; install OS.',
  templates: 'Subtopic 3 of 8 · Templates + clones: build a gold VM once, convert to template, stamp out clones with customization specs for unique identity.',
  library:   'Subtopic 4 of 8 · Content libraries: publish gold templates centrally; subscribed libraries pull them to every other vCenter automatically.',
  ovf:       'Subtopic 5 of 8 · OVF/OVA: vendor packages a complete VM as a single .ova; you import in 5 minutes; ready to use.',
  snapshots: 'Subtopic 6 of 8 · Snapshots: short-term safety net before risky changes. NOT backups. Delete within 24-72h.',
  tools:     'Subtopic 7 of 8 · VMware Tools: paravirt drivers, graceful shutdown, time sync, snapshot quiesce. Every production VM should have it.',
  lifecycle: 'Subtopic 8 of 8 · Day-2 ops: power, edit settings, hot-add CPU/RAM/disk, vMotion, Storage vMotion. Most ops non-disruptive on modern vSphere.',
};

let isPaused = false; let speed = 1; let svgClock = 0; let lastWall = performance.now(); let rafId = null;
function loop(now) {
  if (!isPaused) { const dt = (now - lastWall) / 1000; svgClock += dt * speed; svg.setCurrentTime(svgClock); }
  lastWall = now; rafId = requestAnimationFrame(loop);
}
function startLoop() { svg.pauseAnimations(); svgClock = svg.getCurrentTime(); lastWall = performance.now(); if (rafId) cancelAnimationFrame(rafId); rafId = requestAnimationFrame(loop); }

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.getAttribute('data-mode');
    svg.setAttribute('data-mode', mode);
    stageLabel.textContent = labels[mode] || '';
    svgClock = 0; svg.setCurrentTime(0);
  });
});
playBtn.addEventListener('click', () => { isPaused = !isPaused; playBtn.textContent = isPaused ? 'Play' : 'Pause'; });
speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); speedDisplay.innerHTML = speed.toFixed(1) + '&times;'; });
startLoop();
</script>
