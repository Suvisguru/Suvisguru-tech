# Flashcards — Lesson 04: A short history of virtualization

cards:
  - front: "What decade did virtualization originate, and on what kind of hardware?"
    back: "The 1960s, on IBM mainframes. The first hypervisor was IBM's CP/CMS. The term 'virtual machine' was coined in this era."
  - front: "Why did virtualization stay mainframe-only for ~30 years?"
    back: >
      The techniques that worked on mainframes didn't translate cleanly to commodity x86
      hardware, which had architectural quirks (privileged instructions, memory management)
      that made hypervisors hard to write. Nobody figured it out until VMware did, in 1998.
  - front: "When and by whom was VMware founded?"
    back: >
      1998, in Palo Alto, by Diane Greene, Mendel Rosenblum, Edouard Bugnion, Scott Devine,
      and Edward Wang. Several were Stanford researchers; Mendel Rosenblum was the technical
      lead.
  - front: "What was VMware's first product, and what was its significance?"
    back: >
      VMware Workstation (1999) — a Type-2 hypervisor that ran on a host OS (Windows or
      Linux). It let developers run multiple OSes on a single PC. Significance: first proof
      that virtualization could work on commodity x86.
  - front: "What was ESX Server, and when did it ship?"
    back: >
      VMware ESX Server (2001) — the first Type-1 hypervisor for x86 servers. It ran
      directly on hardware, without a host OS. This is the moment virtualization moved from
      curiosity to enterprise infrastructure.
  - front: "What did vMotion (2003) do, and why was it remarkable?"
    back: >
      vMotion let a running VM move from one physical host to another with no downtime.
      The application kept serving traffic during the move. This had been theoretically
      impossible on physical hardware; in software, it became routine.
  - front: "When did AWS launch EC2, and what's the connection to virtualization?"
    back: >
      AWS EC2 launched publicly in 2006. EC2 is a service for renting VMs by the hour.
      AWS's compute platform — like every public cloud's — is built on virtualization at
      hyperscale.
  - front: "What's the relationship between containers and virtualization?"
    back: >
      Containers (popularized by Docker in 2013) are a lighter abstraction than VMs. They
      complement virtualization rather than replace it. Most production container workloads
      today run inside VMs that run on hypervisors.
  - front: "Why is virtualization called the 'invisible infrastructure' of the cloud?"
    back: >
      Because cloud users (developers, SaaS teams) interact with abstractions like
      containers, managed databases, serverless functions — never directly with hypervisors.
      But underneath, virtualization is what makes the whole experience possible.
  - front: "Which came first: virtualization, the public cloud, or containers?"
    back: >
      Virtualization (1960s) came first by far. Public cloud (2006) came next, built on
      virtualization. Containers (2013) came last, mostly running inside VMs on top of
      virtualization.
