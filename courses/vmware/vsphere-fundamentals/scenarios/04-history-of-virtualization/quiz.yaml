# Quiz — Lesson 04: A short history of virtualization

questions:
  - id: q1
    prompt: >
      Pause the animation in the '1960s' era. The screen shows a single IBM mainframe with
      many user sessions running on top via CP/CMS. Predict: what would have happened if a
      smaller business in 1972 had wanted this same capability?
    pause_at_mode: 1960s
    answer: >
      They couldn't have it. Mainframes cost millions of dollars and required specialized
      operations teams, climate-controlled rooms, and IBM service contracts. Virtualization
      was real, but only available to organizations that could afford a mainframe.
    reasoning: >
      This is exactly the gap VMware closed in 1998-2001. The technology had existed for
      decades; what changed was the price point and the hardware platform. Bringing
      virtualization to commodity x86 was the unlock.

  - id: q2
    prompt: >
      Pause the animation in the '1998-2001' era. VMware has just released ESX Server.
      Predict: what does the average IT department do for the next five years?
    pause_at_mode: 1998-2001
    answer: >
      Mostly nothing — they keep running physical servers as before. Adoption was slow.
      Early adopters tested ESX in lab environments and on non-critical workloads through
      the early 2000s. Mainstream enterprise virtualization adoption didn't peak until
      around 2008-2010.
    reasoning: >
      Most foundational technologies take a decade to go from possible to default. Even
      after ESX shipped, IT teams had years of inertia, vendor concerns, training needs,
      and "we don't run production on something this new" pushback to overcome.

  - id: q3
    prompt: >
      Pause the animation in the '2024' era. Today, a developer deploys to AWS Fargate
      without ever thinking about virtualization. Predict: is virtualization still
      involved? Where?
    pause_at_mode: 2024
    answer: >
      Yes, deeply. AWS Fargate runs containers; those containers run inside VMs that AWS
      operates; those VMs run on hypervisors that AWS manages on physical servers that AWS
      owns. The developer interacts with the container abstraction, but the entire stack
      below it is built on virtualization.
    reasoning: >
      The progression hasn't been "virtualization → cloud → containers, each replacing the
      last." It's "virtualization → cloud-on-virtualization → containers-on-VMs-on-cloud-on-
      virtualization." The lower layers are invisible from above, but they're still doing
      the work.
