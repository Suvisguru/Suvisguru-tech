# Intake brief — Lesson 04, vSphere Fundamentals
# Topic: A short history of virtualization.

lesson:
  title: "A short history of virtualization"
  slug: "04-history-of-virtualization"
  domain: "vmware"
  course_slug: "vsphere-fundamentals"
  position: 4
  granularity: "concept"
  brief_drafted_on: "2026-04-30"

learner_profile:
  prerequisites: ["Lessons 01, 02, 03 — knows what virtualization is, its benefits, and the vSphere components."]

learning_outcomes:
  - "Learner can place virtualization on a 60-year timeline (1960s mainframes → 1998 VMware → 2010s cloud)."
  - "Learner can name the 1998 founding of VMware and the 2001 release of ESX."
  - "Learner understands containers (Docker, 2013) as complementary to virtualization, not a replacement."

scope:
  in_scope_eras:
    - "1960s-70s: IBM mainframes — CP/CMS, then z/VM. Virtualization invented."
    - "1980s-90s: niche; mainframe-only."
    - "1998: VMware founded by Diane Greene, Mendel Rosenblum, others."
    - "1999: VMware Workstation — virtualization for desktop x86."
    - "2001: ESX Server — first x86 server hypervisor."
    - "2003: vMotion. Live VM migration becomes real."
    - "2005-2010: enterprise adoption. AWS launches (2006), starts the cloud era."
    - "2010s: KVM, Hyper-V, Xen mature; public cloud built on virtualization at scale."
    - "2013: Docker. Containers complement virtualization, don't replace it."
    - "2020s: virtualization is invisible infrastructure under nearly every cloud and SaaS application."
  out_of_scope: ["Specific feature timelines beyond the milestones. Vendor product trees beyond VMware."]
  decomposition_needed: false

