<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lesson 04 — A short history of virtualization
  Static timeline. Six milestones on a single horizontal line.
  ViewBox 1100 × 380. Alignment math verified pre-ship.

  Layout:
    Title:        y=30
    Timeline:     y=180 (horizontal line, x=80 to x=1020)
    6 milestones at x=100, 280, 460, 640, 820, 1000 (equal spacing 180px)
    Year labels:  y=170 (just above line)
    Title labels: y=110 (above year)
    Description:  y=240-280 (below line)
    Icon:         circle r=14 centered on (x_milestone, 180), filled slate
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" width="1100" height="380"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <text x="550" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#3F4A5E" letter-spacing="2.5">A SHORT HISTORY OF VIRTUALIZATION</text>
  <line x1="380" y1="48" x2="720" y2="48" stroke="#E8E5DD" stroke-width="1"/>

  <!-- Timeline line -->
  <line x1="80" y1="180" x2="1020" y2="180" stroke="#E8E5DD" stroke-width="3" stroke-linecap="round"/>
  <!-- Animated progress overlay -->
  <line x1="80" y1="180" x2="1020" y2="180" stroke="#3F4A5E" stroke-width="3" stroke-linecap="round" stroke-dasharray="940 940" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="940;0" dur="6s" fill="freeze"/>
  </line>

  <!-- ============= 1960s — IBM Mainframes ============= -->
  <g transform="translate(100, 180)">
    <text x="0" y="-70" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">IBM Mainframes</text>
    <text x="0" y="-86" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">CP/CMS hypervisor</text>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#3F4A5E" letter-spacing="1">1960s</text>
    <circle cx="0" cy="0" r="14" fill="#3F4A5E" stroke="#FFFFFF" stroke-width="3"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">1</text>
    <text x="0" y="46" text-anchor="middle" font-size="11" fill="#5F5E5A">First hypervisors,</text>
    <text x="0" y="62" text-anchor="middle" font-size="11" fill="#5F5E5A">on $20M mainframes.</text>
  </g>

  <!-- ============= 1998 — VMware Founded ============= -->
  <g transform="translate(280, 180)">
    <text x="0" y="-70" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">VMware founded</text>
    <text x="0" y="-86" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">Stanford spinout</text>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#3F4A5E" letter-spacing="1">1998</text>
    <circle cx="0" cy="0" r="14" fill="#3F4A5E" stroke="#FFFFFF" stroke-width="3"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">2</text>
    <text x="0" y="46" text-anchor="middle" font-size="11" fill="#5F5E5A">Diane Greene, Mendel</text>
    <text x="0" y="62" text-anchor="middle" font-size="11" fill="#5F5E5A">Rosenblum + 3 others.</text>
  </g>

  <!-- ============= 2001 — ESX Server ============= -->
  <g transform="translate(460, 180)">
    <text x="0" y="-70" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">ESX Server ships</text>
    <text x="0" y="-86" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">Type-1 on x86</text>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#3F4A5E" letter-spacing="1">2001</text>
    <circle cx="0" cy="0" r="14" fill="#1F8A60" stroke="#FFFFFF" stroke-width="3"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">3</text>
    <text x="0" y="46" text-anchor="middle" font-size="11" fill="#5F5E5A">First server hypervisor</text>
    <text x="0" y="62" text-anchor="middle" font-size="11" fill="#5F5E5A">for commodity x86.</text>
  </g>

  <!-- ============= 2003 — vMotion ============= -->
  <g transform="translate(640, 180)">
    <text x="0" y="-70" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">vMotion ships</text>
    <text x="0" y="-86" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">Live migration</text>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#3F4A5E" letter-spacing="1">2003</text>
    <circle cx="0" cy="0" r="14" fill="#3F4A5E" stroke="#FFFFFF" stroke-width="3"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">4</text>
    <text x="0" y="46" text-anchor="middle" font-size="11" fill="#5F5E5A">Move running VMs</text>
    <text x="0" y="62" text-anchor="middle" font-size="11" fill="#5F5E5A">between hosts, no downtime.</text>
  </g>

  <!-- ============= 2006 — AWS EC2 ============= -->
  <g transform="translate(820, 180)">
    <text x="0" y="-70" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">AWS EC2 launches</text>
    <text x="0" y="-86" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">Public cloud</text>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#3F4A5E" letter-spacing="1">2006</text>
    <circle cx="0" cy="0" r="14" fill="#1F8A60" stroke="#FFFFFF" stroke-width="3"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">5</text>
    <text x="0" y="46" text-anchor="middle" font-size="11" fill="#5F5E5A">Virtualization at hyperscale,</text>
    <text x="0" y="62" text-anchor="middle" font-size="11" fill="#5F5E5A">rented by the hour.</text>
  </g>

  <!-- ============= 2013 — Docker ============= -->
  <g transform="translate(1000, 180)">
    <text x="0" y="-70" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">Docker ships</text>
    <text x="0" y="-86" text-anchor="middle" font-size="10" fill="#9D9C95" font-style="italic">Containers</text>
    <text x="0" y="-14" text-anchor="middle" font-size="13" font-weight="700" fill="#3F4A5E" letter-spacing="1">2013</text>
    <circle cx="0" cy="0" r="14" fill="#3F4A5E" stroke="#FFFFFF" stroke-width="3"/>
    <text x="0" y="3" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">6</text>
    <text x="0" y="46" text-anchor="middle" font-size="11" fill="#5F5E5A">Lighter abstraction —</text>
    <text x="0" y="62" text-anchor="middle" font-size="11" fill="#5F5E5A">runs on top of VMs.</text>
  </g>

  <!-- Era labels along the timeline -->
  <text x="190" y="320" text-anchor="middle" font-size="11" font-style="italic" fill="#9D9C95" letter-spacing="1.5">MAINFRAME ERA</text>
  <text x="370" y="320" text-anchor="middle" font-size="11" font-style="italic" fill="#9D9C95" letter-spacing="1.5">EARLY VMWARE</text>
  <text x="550" y="320" text-anchor="middle" font-size="11" font-style="italic" fill="#9D9C95" letter-spacing="1.5">ENTERPRISE ADOPTION</text>
  <text x="730" y="320" text-anchor="middle" font-size="11" font-style="italic" fill="#9D9C95" letter-spacing="1.5">CLOUD ERA</text>
  <text x="910" y="320" text-anchor="middle" font-size="11" font-style="italic" fill="#9D9C95" letter-spacing="1.5">CONTAINER ERA</text>

  <!-- Bottom caption -->
  <text x="550" y="364" text-anchor="middle" font-size="13" fill="#3F4A5E" font-style="italic">60 years from a single mainframe to the entire public cloud.</text>

</svg>
