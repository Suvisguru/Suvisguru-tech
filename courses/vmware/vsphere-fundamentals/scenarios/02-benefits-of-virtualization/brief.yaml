# Intake brief — Lesson 02, vSphere Fundamentals
# Self-authored from founder direction: "next lesson topic is Benefits of virtualization."

lesson:
  title: "Benefits of virtualization"
  slug: "02-benefits-of-virtualization"
  domain: "vmware"
  course_slug: "vsphere-fundamentals"
  position: 2
  granularity: "sub-topic"
  parent_topic: "vsphere-fundamentals (course)"
  brief_drafted_on: "2026-04-30"

learner_profile:
  prerequisites:
    - "Lesson 01 completed: knows what virtualization, a VM, and a hypervisor are."
    - "Comfortable with the apartment-building analogy as the foundational frame."
  assumed_zero_knowledge_of:
    - "VMware product names (vMotion, HA, DRS, FT, etc.) — deliberately deferred."
    - "Type 1 vs Type 2 hypervisors — separate lesson."

learning_outcomes:
  - "Learner can name the five primary benefits virtualization unlocks."
  - "Learner can give a one-sentence concrete example of each benefit."
  - "Learner can explain why each benefit was harder or impossible with physical hardware alone."
  - "Learner extends the apartment-building analogy to each benefit without prompting."

scope:
  in_scope_benefits:
    - "Consolidation — fewer hosts, lower hardware spend, less power and cooling."
    - "Speed — provisioning a workload in minutes instead of weeks."
    - "Isolation — one VM's crash or runaway process stays inside that VM."
    - "Snapshots — capture and restore a VM's complete state in seconds."
    - "Mobility — move running VMs between hosts with no downtime."
  out_of_scope:
    - "VMware product names. Use generic terms: 'moving a VM,' 'auto-restart on host failure.'"
    - "High availability and disaster recovery as separate deep dives."
    - "Resource scheduling — already foreshadowed as next lesson."
  decomposition_needed: false
  reasoning: >
    Five benefits is a lot, but they hang together as one mental model: 'this is what
    virtualization GIVES you.' Splitting them across lessons would lose the breadth.
    Future lessons will deep-dive into specific mechanics (snapshots, mobility, HA).

planned_sections:
  concept_explanation:
    target_words: 240
    notes: >
      Open with: virtualization gave us five things hardware never could. List each
      benefit in one sentence. Don't over-explain — the rest of the lesson does that.
  before_after:
    target_words_each_side: 110
    before_focus: "Concrete company before virtualization. Specific friction points across all five benefit areas."
    after_focus: "Same company, same workloads, with virtualization. Specific wins."
  analogy:
    candidate_pool_target: "extend existing apartment-building analogy; no new analogy needed"
    direction: >
      Each benefit gets its own apartment-building extension, building directly on lesson 01.
      Mapping table shows benefit → apartment-building moment → tech reality.
  eli5:
    target_words_max: 100
  eli10:
    target_words: 220
    must_bridge_to: "what controls these benefits — resource scheduling, snapshots, mobility mechanics — covered in next lessons."
  real_world_scenarios:
    count: 4
    target_words_each: 110
    each_scenario_must_combine: "2 to 3 of the five benefits, not just one"
  static_diagram:
    purpose: "A single composition showing all 5 benefits in one frame, each labelled and visually distinct."
  animated_illustration:
    central_motion: "Tour through the 5 benefits with mode toggle. Each mode demonstrates one benefit in motion."
    mode_toggles: ["consolidate", "speed", "isolate", "snapshot", "move"]
    duration: "10-12s loop per mode"
  flashcards:
    count: 10
    must_cover: "Definition + apartment-building mapping for each of the 5 benefits, plus why each was hard before virtualization."
  quiz:
    count: 3
    style: "Pause-the-animation prediction questions across different benefit modes."

interactive_preview_page:
  follow: "STYLE.md 'Lesson preview page' section. Reference: preview-lesson-01.html."
  hero_widget: >
    'Tour the five benefits' interactive — five clickable cards in the hero, each
    revealing one benefit in motion when activated. Default state shows benefit 1
    (consolidation). User clicks through all five to complete the tour.
  inline_visualizations_per_benefit: "Custom small SVG illustrating that specific benefit"
  hover_to_define_terms:
    - "snapshot"
    - "downtime"
    - "high availability"
    - "provision"
    - "rollback"

new_primitives_or_overlays_likely_needed:
  - "snapshot-badge — small camera or timestamp icon to overlay on a VM tile"
  - "mobility-arrow — directional arrow indicating a VM relocating"
  - "failure-overlay — red diagonal strike-through for a failed host"
  - "These are inlined in compositions for now; promote to /library/primitives/vmware/ if reused in lesson 03+"

founder_decisions_anticipated:
  - "Apartment-building analogy continues as canonical (locked in DECISIONS.md from lesson 01)."
  - "5 benefits in one lesson rather than splitting (per scope rationale above)."
  - "Generic terminology — no VMware product names yet."
