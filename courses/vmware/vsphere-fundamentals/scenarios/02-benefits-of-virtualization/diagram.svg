<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lesson 02 — Benefits of virtualization
  Static diagram showing all 5 benefits in one frame.
  Each panel: number badge + benefit name + illustration + caption + stat.
  ViewBox 1100 × 380. Designed at scale 1.0 throughout.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" width="1100" height="380"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3F4A5E"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1F8A60"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#3F4A5E" letter-spacing="2.5">FIVE BENEFITS OF VIRTUALIZATION</text>
  <line x1="380" y1="48" x2="720" y2="48" stroke="#E8E5DD" stroke-width="1"/>

  <!-- ============================== PANEL 1: CONSOLIDATION ============================== -->
  <g transform="translate(14, 70)">
    <rect width="200" height="290" rx="12" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.5"/>

    <!-- Number badge + benefit name -->
    <circle cx="26" cy="28" r="14" fill="#3F4A5E"/>
    <text x="26" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">1</text>
    <text x="50" y="33" font-size="12" font-weight="600" fill="#1A1A1A" letter-spacing="1.2">CONSOLIDATION</text>

    <!-- Illustration: 6 small idle servers → 1 host with VMs -->
    <g transform="translate(20, 78)">
      <!-- 6 idle servers grid -->
      <g opacity="0.5">
        <rect x="0"  y="0"  width="22" height="14" rx="2" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="26" y="0"  width="22" height="14" rx="2" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="52" y="0"  width="22" height="14" rx="2" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="0"  y="18" width="22" height="14" rx="2" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="26" y="18" width="22" height="14" rx="2" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="0.5"/>
        <rect x="52" y="18" width="22" height="14" rx="2" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="0.5"/>
      </g>
      <!-- Arrow -->
      <line x1="86" y1="16" x2="104" y2="16" stroke="#3F4A5E" stroke-width="2" marker-end="url(#arrow-slate)"/>
      <!-- Single host with VMs -->
      <rect x="112" y="-2" width="48" height="36" rx="3" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <rect x="112" y="-2" width="48" height="6" rx="3" fill="#3F4A5E"/>
      <rect x="115" y="6" width="9" height="11" rx="1" fill="#5DCAA5"/>
      <rect x="125" y="6" width="9" height="11" rx="1" fill="#5DCAA5"/>
      <rect x="135" y="6" width="9" height="11" rx="1" fill="#5DCAA5"/>
      <rect x="145" y="6" width="9" height="11" rx="1" fill="#5DCAA5"/>
      <rect x="115" y="19" width="9" height="11" rx="1" fill="#5DCAA5"/>
      <rect x="125" y="19" width="9" height="11" rx="1" fill="#5DCAA5"/>
      <rect x="135" y="19" width="9" height="11" rx="1" fill="#5DCAA5"/>
      <rect x="145" y="19" width="9" height="11" rx="1" fill="#5DCAA5"/>
    </g>

    <!-- Caption -->
    <text x="100" y="160" text-anchor="middle" font-size="13" fill="#3A3A3A">Many workloads,</text>
    <text x="100" y="178" text-anchor="middle" font-size="13" fill="#3A3A3A">one host.</text>

    <!-- Divider -->
    <line x1="20" y1="200" x2="180" y2="200" stroke="#E8E5DD" stroke-width="1"/>

    <!-- Stat -->
    <text x="100" y="232" text-anchor="middle" font-size="22" font-weight="500" fill="#1A1A1A" letter-spacing="-0.3">200 → 6</text>
    <text x="100" y="252" text-anchor="middle" font-size="10" fill="#9D9C95" letter-spacing="1.3" font-weight="600">PHYSICAL HOSTS</text>

    <!-- Sub caption -->
    <text x="100" y="276" text-anchor="middle" font-size="11" fill="#5F5E5A" font-style="italic">Less hardware, less power.</text>
  </g>

  <!-- ============================== PANEL 2: SPEED ============================== -->
  <g transform="translate(232, 70)">
    <rect width="200" height="290" rx="12" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.5"/>

    <circle cx="26" cy="28" r="14" fill="#3F4A5E"/>
    <text x="26" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">2</text>
    <text x="50" y="33" font-size="12" font-weight="600" fill="#1A1A1A" letter-spacing="1.2">SPEED</text>

    <!-- Illustration: stopwatch + provisioning bar -->
    <g transform="translate(40, 78)">
      <!-- Stopwatch -->
      <circle cx="60" cy="35" r="30" fill="#FFFFFF" stroke="#3F4A5E" stroke-width="2.5"/>
      <rect x="55" y="0" width="10" height="6" fill="#3F4A5E"/>
      <line x1="60" y1="6" x2="60" y2="10" stroke="#3F4A5E" stroke-width="2.5"/>
      <!-- Hour ticks -->
      <line x1="60" y1="11" x2="60" y2="15" stroke="#3F4A5E" stroke-width="1.5"/>
      <line x1="60" y1="55" x2="60" y2="59" stroke="#3F4A5E" stroke-width="1.5"/>
      <line x1="35" y1="35" x2="39" y2="35" stroke="#3F4A5E" stroke-width="1.5"/>
      <line x1="81" y1="35" x2="85" y2="35" stroke="#3F4A5E" stroke-width="1.5"/>
      <!-- Hand pointing to ~12% (showing fast progress) -->
      <line x1="60" y1="35" x2="73" y2="20" stroke="#1F8A60" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="60" cy="35" r="3" fill="#1F8A60"/>
      <!-- "Fast" green checkmark -->
      <circle cx="93" cy="20" r="9" fill="#E0F2EA"/>
      <path d="M 88 20 L 92 24 L 98 17" stroke="#1F8A60" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Caption -->
    <text x="100" y="170" text-anchor="middle" font-size="13" fill="#3A3A3A">A new app is a click,</text>
    <text x="100" y="188" text-anchor="middle" font-size="13" fill="#3A3A3A">not a procurement.</text>

    <!-- Divider -->
    <line x1="20" y1="210" x2="180" y2="210" stroke="#E8E5DD" stroke-width="1"/>

    <!-- Stat -->
    <text x="100" y="240" text-anchor="middle" font-size="20" font-weight="500" fill="#1A1A1A" letter-spacing="-0.3">6 weeks → 15 min</text>
    <text x="100" y="258" text-anchor="middle" font-size="10" fill="#9D9C95" letter-spacing="1.3" font-weight="600">TIME TO PROVISION</text>

    <text x="100" y="278" text-anchor="middle" font-size="11" fill="#5F5E5A" font-style="italic">Capacity, on demand.</text>
  </g>

  <!-- ============================== PANEL 3: ISOLATION ============================== -->
  <g transform="translate(450, 70)">
    <rect width="200" height="290" rx="12" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.5"/>

    <circle cx="26" cy="28" r="14" fill="#3F4A5E"/>
    <text x="26" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">3</text>
    <text x="50" y="33" font-size="12" font-weight="600" fill="#1A1A1A" letter-spacing="1.2">ISOLATION</text>

    <!-- Illustration: 4 VM tiles (one crashed) on hypervisor on host. Layers abut. -->
    <g transform="translate(20, 78)">
      <!-- VMs occupy y=0 to y=42 (height 42 — see VM rect below) -->
      <!-- Hypervisor: y=42 to y=56 (height 14, abuts VM bottoms) -->
      <rect x="0" y="42" width="160" height="14" fill="#3F4A5E"/>
      <text x="80" y="52" text-anchor="middle" font-size="8" font-weight="500" fill="#E8E8E0" letter-spacing="1">hypervisor</text>
      <!-- Host: y=56 to y=78 (height 22, abuts hypervisor bottom) -->
      <rect x="0" y="56" width="160" height="22" rx="3" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <!-- 4 VMs on top, one is failed -->
      <g>
        <rect x="6" y="6" width="32" height="36" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
        <rect x="6" y="6" width="32" height="9" rx="4" fill="#5F5E5A"/>
        <rect x="6" y="11" width="32" height="4" fill="#5F5E5A"/>
        <circle cx="33" cy="11" r="2" fill="#5DCAA5"/>
        <text x="22" y="33" text-anchor="middle" font-size="8" fill="#3A3A3A">running</text>

        <!-- Failed VM -->
        <rect x="46" y="6" width="32" height="36" rx="4" fill="#FCEBE0" stroke="#B85829" stroke-width="1.5"/>
        <rect x="46" y="6" width="32" height="9" rx="4" fill="#B85829"/>
        <rect x="46" y="11" width="32" height="4" fill="#B85829"/>
        <circle cx="73" cy="11" r="2" fill="#E24B4A"/>
        <text x="62" y="28" text-anchor="middle" font-size="11" fill="#B85829" font-weight="600">×</text>
        <text x="62" y="38" text-anchor="middle" font-size="8" fill="#B85829">crashed</text>

        <rect x="86" y="6" width="32" height="36" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
        <rect x="86" y="6" width="32" height="9" rx="4" fill="#5F5E5A"/>
        <rect x="86" y="11" width="32" height="4" fill="#5F5E5A"/>
        <circle cx="113" cy="11" r="2" fill="#5DCAA5"/>
        <text x="102" y="33" text-anchor="middle" font-size="8" fill="#3A3A3A">running</text>

        <rect x="126" y="6" width="32" height="36" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
        <rect x="126" y="6" width="32" height="9" rx="4" fill="#5F5E5A"/>
        <rect x="126" y="11" width="32" height="4" fill="#5F5E5A"/>
        <circle cx="153" cy="11" r="2" fill="#5DCAA5"/>
        <text x="142" y="33" text-anchor="middle" font-size="8" fill="#3A3A3A">running</text>
      </g>
    </g>

    <!-- Caption -->
    <text x="100" y="190" text-anchor="middle" font-size="13" fill="#3A3A3A">One VM crashes —</text>
    <text x="100" y="208" text-anchor="middle" font-size="13" fill="#3A3A3A">the others stay up.</text>

    <line x1="20" y1="226" x2="180" y2="226" stroke="#E8E5DD" stroke-width="1"/>

    <text x="100" y="254" text-anchor="middle" font-size="20" font-weight="500" fill="#1A1A1A" letter-spacing="-0.3">Bounded blast</text>
    <text x="100" y="272" text-anchor="middle" font-size="10" fill="#9D9C95" letter-spacing="1.3" font-weight="600">ENFORCED BY HYPERVISOR</text>
  </g>

  <!-- ============================== PANEL 4: SNAPSHOTS ============================== -->
  <g transform="translate(668, 70)">
    <rect width="200" height="290" rx="12" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.5"/>

    <circle cx="26" cy="28" r="14" fill="#3F4A5E"/>
    <text x="26" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">4</text>
    <text x="50" y="33" font-size="12" font-weight="600" fill="#1A1A1A" letter-spacing="1.2">SNAPSHOTS</text>

    <!-- Illustration: VM with timestamp + camera icon, rollback arrow -->
    <g transform="translate(30, 78)">
      <!-- VM tile (current state) -->
      <rect x="0" y="0" width="56" height="46" rx="5" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1.2"/>
      <rect x="0" y="0" width="56" height="12" rx="5" fill="#5F5E5A"/>
      <rect x="0" y="7" width="56" height="5" fill="#5F5E5A"/>
      <text x="6" y="9" font-size="8" font-weight="500" fill="#FFFFFF">vm-01</text>
      <text x="28" y="30" text-anchor="middle" font-size="9" fill="#B85829" font-weight="600">corrupted</text>
      <text x="28" y="40" text-anchor="middle" font-size="8" fill="#5F5E5A">12:14 PM</text>

      <!-- Curved rollback arrow: starts at VM 1 right edge (x=56), ends at VM 2 left edge (x=84). -->
      <path d="M 56 12 Q 70 -6 84 12" stroke="#1F8A60" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
      <text x="70" y="-1" text-anchor="middle" font-size="9" fill="#1F8A60" font-weight="600">rollback</text>

      <!-- VM tile (snapshot state) -->
      <rect x="84" y="0" width="56" height="46" rx="5" fill="#E0F2EA" stroke="#1F8A60" stroke-width="1.5"/>
      <rect x="84" y="0" width="56" height="12" rx="5" fill="#1F8A60"/>
      <rect x="84" y="7" width="56" height="5" fill="#1F8A60"/>
      <text x="90" y="9" font-size="8" font-weight="500" fill="#FFFFFF">vm-01</text>
      <text x="112" y="28" text-anchor="middle" font-size="11" fill="#1F8A60" font-weight="600">📷</text>
      <text x="112" y="40" text-anchor="middle" font-size="8" fill="#1F8A60">12:00 PM</text>
    </g>

    <!-- Caption -->
    <text x="100" y="170" text-anchor="middle" font-size="13" fill="#3A3A3A">Capture state.</text>
    <text x="100" y="188" text-anchor="middle" font-size="13" fill="#3A3A3A">Roll back instantly.</text>

    <line x1="20" y1="210" x2="180" y2="210" stroke="#E8E5DD" stroke-width="1"/>

    <text x="100" y="240" text-anchor="middle" font-size="20" font-weight="500" fill="#1A1A1A" letter-spacing="-0.3">~2 seconds</text>
    <text x="100" y="258" text-anchor="middle" font-size="10" fill="#9D9C95" letter-spacing="1.3" font-weight="600">TO REVERT</text>

    <text x="100" y="278" text-anchor="middle" font-size="11" fill="#5F5E5A" font-style="italic">Like undo, for whole VMs.</text>
  </g>

  <!-- ============================== PANEL 5: MOBILITY ============================== -->
  <g transform="translate(886, 70)">
    <rect width="200" height="290" rx="12" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.5"/>

    <circle cx="26" cy="28" r="14" fill="#3F4A5E"/>
    <text x="26" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">5</text>
    <text x="50" y="33" font-size="12" font-weight="600" fill="#1A1A1A" letter-spacing="1.2">MOBILITY</text>

    <!-- Illustration: VM moving between two hosts -->
    <g transform="translate(20, 80)">
      <!-- Source host -->
      <rect x="0" y="20" width="50" height="32" rx="3" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <rect x="0" y="20" width="50" height="6" rx="3" fill="#3F4A5E"/>
      <text x="25" y="65" text-anchor="middle" font-size="8" fill="#5F5E5A">host-A</text>

      <!-- Destination host -->
      <rect x="110" y="20" width="50" height="32" rx="3" fill="#A8A8AC" stroke="#5F5E5A" stroke-width="1"/>
      <rect x="110" y="20" width="50" height="6" rx="3" fill="#3F4A5E"/>
      <text x="135" y="65" text-anchor="middle" font-size="8" fill="#5F5E5A">host-B</text>

      <!-- VM in transit (above the path) -->
      <g transform="translate(70, 0)">
        <rect x="0" y="0" width="22" height="14" rx="2" fill="#FFFFFF" stroke="#3F4A5E" stroke-width="1.2"/>
        <rect x="0" y="0" width="22" height="4" rx="2" fill="#3F4A5E"/>
        <circle cx="19" cy="2" r="1.2" fill="#5DCAA5"/>
        <text x="11" y="12" text-anchor="middle" font-size="6" fill="#3A3A3A">VM</text>
      </g>

      <!-- Curved trajectory arrow -->
      <path d="M 50 26 Q 80 -2 110 26" stroke="#3F4A5E" stroke-width="1.5" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-slate)"/>
    </g>

    <!-- Caption -->
    <text x="100" y="180" text-anchor="middle" font-size="13" fill="#3A3A3A">Move running VMs</text>
    <text x="100" y="198" text-anchor="middle" font-size="13" fill="#3A3A3A">between hosts.</text>

    <line x1="20" y1="220" x2="180" y2="220" stroke="#E8E5DD" stroke-width="1"/>

    <text x="100" y="250" text-anchor="middle" font-size="20" font-weight="500" fill="#1A1A1A" letter-spacing="-0.3">Zero downtime</text>
    <text x="100" y="268" text-anchor="middle" font-size="10" fill="#9D9C95" letter-spacing="1.3" font-weight="600">DURING THE MOVE</text>
  </g>

</svg>
