<!DOCTYPE html>
<!--
  Lesson 02 — Benefits of virtualization
  Animated SVG illustration. Five mode buttons let the learner tour each benefit
  in motion: consolidate, speed, isolate, snapshot, mobility.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Benefits of virtualization — animation</title>
<style>
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding: 24px;
    color: #1a1a1a;
    margin: 0;
  }
  .controls {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 12px; flex-wrap: wrap;
  }
  .mode-btn {
    border: 1px solid #d8d6cf;
    background: #ffffff;
    color: #3a3a3a;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active {
    background: #3F4A5E;
    color: #FFFFFF;
    border-color: #3F4A5E;
  }
  .stage-label {
    font-size: 15px;
    color: #3a3a3a;
    margin: 12px 0 18px 0;
    min-height: 22px;
    font-weight: 500;
  }
  .speed-control {
    margin-left: auto; font-size: 13px; color: #5F5E5A;
    display: flex; gap: 8px; align-items: center;
  }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas {
    width: 100%; max-width: 1040px;
    height: auto; display: block;
  }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="consolidate"] .mode-consolidate,
  #canvas[data-mode="speed"]      .mode-speed,
  #canvas[data-mode="isolate"]    .mode-isolate,
  #canvas[data-mode="snapshot"]   .mode-snapshot,
  #canvas[data-mode="mobility"]   .mode-mobility {
    display: block;
  }
  @media (max-width: 700px) {
    body { padding: 16px; }
    .speed-control { margin-left: 0; width: 100%; margin-top: 4px; }
    .mode-btn { padding: 7px 11px; font-size: 12px; }
  }
</style>
</head>

<div class="controls">
  <button class="mode-btn active" data-mode="consolidate" type="button">Consolidate</button>

  <button class="mode-btn" data-mode="isolate" type="button">Isolate</button>
  <button class="mode-btn" data-mode="snapshot" type="button">Snapshot</button>
  <button class="mode-btn" data-mode="mobility" type="button">Mobility</button>
  <button class="mode-btn" id="play-btn" type="button">Pause</button>
  <span class="speed-control">
    <span>Speed</span>
    <input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider">

</div>

  let speed = 1.0;
  let isPaused = false;
  let svgClock = 0;
  let lastFrame = performance.now();

  svg.pauseAnimations();

  function tick(now) {
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;
    if (!isPaused) {
      svgClock += dt * speed;
      svg.setCurrentTime(svgClock);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  document.querySelectorAll('.mode-btn[data-mode]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const mode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn[data-mode]').forEach(function (b) {
        b.classList.toggle('active', b === btn);
      });
      svg.dataset.mode = mode;
      stageLabel.textContent = stageText[mode];
      svgClock = 0;
      svg.setCurrentTime(0);
    });
  });

  playBtn.addEventListener('click', function () {
    isPaused = !isPaused;
    playBtn.textContent = isPaused ? 'Play' : 'Pause';
  });

  speedSlider.addEventListener('input', function (e) {
    speed = parseFloat(e.target.value);
    speedDisplay.textContent = speed.toFixed(1) + '×';
  });
})();
</script>

</body>
</html>
