<!DOCTYPE html>
<!--
  Lesson 05 — vSphere context and resources. Five modes (cpu, memory, network, storage, gpu).
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>vSphere context and resources — animation</title>
<style>
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; margin: 0; }
  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .mode-btn { border: 1px solid #d8d6cf; background: #ffffff; color: #3a3a3a; padding: 9px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; font-family: inherit; transition: all 0.15s; }
  .mode-btn:hover:not(.active) { background: #f4f1e8; border-color: #5F5E5A; }
  .mode-btn.active { background: #3F4A5E; color: #FFFFFF; border-color: #3F4A5E; }
  .stage-label { font-size: 15px; color: #3a3a3a; margin: 12px 0 18px 0; font-weight: 500; }
  .speed-control { margin-left: auto; font-size: 13px; color: #5F5E5A; display: flex; gap: 8px; align-items: center; }
  .speed-control input[type=range] { accent-color: #3F4A5E; }
  #canvas { width: 100%; max-width: 1040px; height: auto; display: block; }
  #canvas .mode-group { display: none; }
  #canvas[data-mode="cpu"] .mode-cpu, #canvas[data-mode="memory"] .mode-memory, #canvas[data-mode="network"] .mode-network, #canvas[data-mode="storage"] .mode-storage, #canvas[data-mode="gpu"] .mode-gpu { display: block; }
</style>
</head>
<body>

<div class="controls">
  <button class="mode-btn active" data-mode="cpu" type="button">CPU</button>
  <button class="mode-btn" data-mode="memory" type="button">Memory</button>
  <button class="mode-btn" data-mode="network" type="button">Network</button>
  <button class="mode-btn" data-mode="storage" type="button">Storage</button>
  <button class="mode-btn" data-mode="gpu" type="button">GPU</button>
  <button class="mode-btn" id="play-btn" type="button">Pause</button>
  <span class="speed-control"><span>Speed</span><input type="range" min="0.3" max="2" step="0.1" value="1" id="speed-slider"><span id="speed-display">1.0&times;</span></span>
</div>
<div class="stage-label" id="stage-label">CPU: vSphere schedules VM vCPUs onto physical cores, NUMA-aware.</div>

<svg id="canvas" data-mode="cpu" viewBox="0 0 1040 540" xmlns="http://www.w3.org/2000/svg">

  <!-- CPU MODE -->
  <g class="mode-group mode-cpu">
    <text x="520" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">CPU SCHEDULING — VMs MAPPED TO PHYSICAL CORES</text>
    <!-- 3 VMs with vCPU counts at top -->
    <g transform="translate(120, 100)">
      <rect width="220" height="80" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="220" height="22" rx="8" fill="#5F5E5A"/>
      <text x="12" y="16" font-size="13" font-weight="500" fill="#FFFFFF">vm-app · 4 vCPU</text>
      <rect x="14" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="34" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 1</text>
      <rect x="58" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="78" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 2</text>
      <rect x="102" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="122" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 3</text>
      <rect x="146" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="166" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 4</text>
    </g>
    <g transform="translate(410, 100)">
      <rect width="220" height="80" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="220" height="22" rx="8" fill="#5F5E5A"/>
      <text x="12" y="16" font-size="13" font-weight="500" fill="#FFFFFF">vm-db · 2 vCPU</text>
      <rect x="14" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="34" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 1</text>
      <rect x="58" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="78" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 2</text>
    </g>
    <g transform="translate(700, 100)">
      <rect width="220" height="80" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="220" height="22" rx="8" fill="#5F5E5A"/>
      <text x="12" y="16" font-size="13" font-weight="500" fill="#FFFFFF">vm-cache · 2 vCPU</text>
      <rect x="14" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="34" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 1</text>
      <rect x="58" y="34" width="40" height="34" rx="3" fill="#3F4A5E"/>
      <text x="78" y="55" text-anchor="middle" font-size="9" fill="#FFFFFF">vCPU 2</text>
    </g>
    <!-- Hypervisor band -->
    <rect x="120" y="200" width="800" height="26" fill="#3F4A5E"/>
    <text x="520" y="218" text-anchor="middle" font-size="12" font-weight="500" fill="#E8E8E0" letter-spacing="1.5">vSphere CPU scheduler (NUMA-aware)</text>
    <!-- Physical cores (16 cores in 2 sockets) -->
    <g transform="translate(120, 246)">
      <text x="200" y="-2" text-anchor="middle" font-size="11" font-weight="600" fill="#9D9C95" letter-spacing="1">SOCKET 1 (NUMA NODE 0)</text>
      <g transform="translate(0, 6)">
        <rect width="90" height="36" rx="3" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60" stroke-width="1.5"/>
        <text x="45" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1F8A60">core 1</text>
      </g>
      <g transform="translate(102, 6)">
        <rect width="90" height="36" rx="3" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60" stroke-width="1.5"/>
        <text x="45" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1F8A60">core 2</text>
      </g>
      <g transform="translate(204, 6)">

        <text x="45" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1F8A60">core 4</text>
      </g>
    </g>
    <g transform="translate(520, 246)">
      <text x="200" y="-2" text-anchor="middle" font-size="11" font-weight="600" fill="#9D9C95" letter-spacing="1">SOCKET 2 (NUMA NODE 1)</text>
      <g transform="translate(0, 6)">
        <rect width="90" height="36" rx="3" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60" stroke-width="1.5"/>
        <text x="45" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1F8A60">core 5</text>
      </g>
      <g transform="translate(102, 6)">
        <rect width="90" height="36" rx="3" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60" stroke-width="1.5"/>
        <text x="45" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1F8A60">core 6</text>
      </g>
      <g transform="translate(204, 6)">
        <rect width="90" height="36" rx="3" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60" stroke-width="1.5"/>
        <text x="45" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1F8A60">core 7</text>
      </g>
      <g transform="translate(306, 6)">
        <rect width="90" height="36" rx="3" fill="#5DCAA5" opacity="0.25" stroke="#1F8A60" stroke-width="1.5"/>
        <text x="45" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1F8A60">core 8</text>
      </g>
    </g>
    <text x="520" y="360" text-anchor="middle" font-size="14" fill="#3A3A3A">Each VM gets vCPUs scheduled onto physical cores. The scheduler tries to keep a VM's vCPUs on one NUMA node.</text>
    <text x="520" y="384" text-anchor="middle" font-size="13" fill="#9D9C95" font-style="italic">Hardware-assisted virtualization (Intel VT-x, AMD-V) makes this fast.</text>
  </g>

  <!-- MEMORY MODE -->
  <g class="mode-group mode-memory">
    <text x="520" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">MEMORY — OVERCOMMIT WITH BALLOONING AND COMPRESSION</text>
    <!-- 3 VMs each configured 8GB -->
    <g transform="translate(140, 90)">
      <rect width="220" height="60" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="220" height="20" rx="8" fill="#5F5E5A"/>
      <text x="12" y="14" font-size="12" font-weight="500" fill="#FFFFFF">vm-01 · configured 8 GB</text>
      <text x="12" y="36" font-size="11" fill="#3A3A3A">actively using:</text>
      <rect x="92" y="28" width="120" height="14" rx="2" fill="#E0E0DE"/>
      <rect x="92" y="28" width="50" height="14" rx="2" fill="#5A6B81">
        <animate attributeName="width" values="50;65;42;58" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="92" y="56" font-size="10" fill="#9D9C95">~3.5 GB</text>
    </g>
    <g transform="translate(410, 90)">
      <rect width="220" height="60" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="220" height="20" rx="8" fill="#5F5E5A"/>
      <text x="12" y="14" font-size="12" font-weight="500" fill="#FFFFFF">vm-02 · configured 8 GB</text>
      <text x="12" y="36" font-size="11" fill="#3A3A3A">actively using:</text>
      <rect x="92" y="28" width="120" height="14" rx="2" fill="#E0E0DE"/>
      <rect x="92" y="28" width="60" height="14" rx="2" fill="#5A6B81">
        <animate attributeName="width" values="60;72;50;66" dur="7s" repeatCount="indefinite"/>
      </rect>
      <text x="92" y="56" font-size="10" fill="#9D9C95">~4.2 GB</text>
    </g>
    <g transform="translate(680, 90)">
      <rect width="220" height="60" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="220" height="20" rx="8" fill="#5F5E5A"/>
      <text x="12" y="14" font-size="12" font-weight="500" fill="#FFFFFF">vm-03 · configured 8 GB</text>
      <text x="12" y="36" font-size="11" fill="#3A3A3A">actively using:</text>
      <rect x="92" y="28" width="120" height="14" rx="2" fill="#E0E0DE"/>
      <rect x="92" y="28" width="40" height="14" rx="2" fill="#5A6B81">
        <animate attributeName="width" values="40;55;32;48" dur="8s" repeatCount="indefinite"/>
      </rect>
      <text x="92" y="56" font-size="10" fill="#9D9C95">~2.8 GB</text>
    </g>
    <!-- Hypervisor -->
    <rect x="140" y="180" width="760" height="26" fill="#3F4A5E"/>
    <text x="520" y="198" text-anchor="middle" font-size="12" font-weight="500" fill="#E8E8E0" letter-spacing="1.5">vSphere memory manager (TPS, ballooning, compression)</text>
    <!-- Physical RAM bar -->
    <g transform="translate(140, 240)">
      <text x="380" y="-6" text-anchor="middle" font-size="12" font-weight="600" fill="#9D9C95" letter-spacing="1.2">PHYSICAL RAM (16 GB) — VMs CONFIGURED FOR 24 GB TOTAL</text>
      <rect width="760" height="40" rx="4" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="490" height="40" rx="4" fill="#5A6B81">
        <animate attributeName="width" values="490;520;460;500" dur="6s" repeatCount="indefinite"/>
      </rect>
      <text x="245" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">~10.5 GB actively used</text>
      <text x="625" y="26" text-anchor="middle" font-size="13" fill="#5F5E5A" font-style="italic">free / shared / ballooned</text>
    </g>
    <text x="520" y="360" text-anchor="middle" font-size="14" fill="#3A3A3A">3 VMs configured 8 GB each = 24 GB. Host has only 16 GB. It works because they don't all use 8 GB at once.</text>
    <text x="520" y="384" text-anchor="middle" font-size="13" fill="#9D9C95" font-style="italic">Transparent page sharing dedupes; ballooning pressures idle guests; compression delays swap.</text>
  </g>

  <!-- NETWORK MODE -->
  <g class="mode-group mode-network">
    <text x="520" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">NETWORK — VMs CONNECT TO A vSWITCH INSIDE THE HOST</text>
    <g transform="translate(140, 90)">
      <rect width="760" height="240" rx="8" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1"/>
      <text x="380" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#5F5E5A" letter-spacing="1">INSIDE ONE ESXi HOST</text>
      <!-- 4 VMs y=44-104 -->
      <g transform="translate(40, 44)"><rect width="160" height="60" rx="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/><rect width="160" height="20" rx="6" fill="#5F5E5A"/><text x="12" y="14" font-size="12" fill="#FFFFFF">vm-app</text><text x="80" y="42" text-anchor="middle" font-size="11" fill="#3A3A3A">eth0 → 10.0.1.5</text></g>
      <g transform="translate(220, 44)"><rect width="160" height="60" rx="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/><rect width="160" height="20" rx="6" fill="#5F5E5A"/><text x="12" y="14" font-size="12" fill="#FFFFFF">vm-db</text><text x="80" y="42" text-anchor="middle" font-size="11" fill="#3A3A3A">eth0 → 10.0.1.6</text></g>
      <g transform="translate(400, 44)"><rect width="160" height="60" rx="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/><rect width="160" height="20" rx="6" fill="#5F5E5A"/><text x="12" y="14" font-size="12" fill="#FFFFFF">vm-web</text><text x="80" y="42" text-anchor="middle" font-size="11" fill="#3A3A3A">eth0 → 10.0.1.7</text></g>
      <g transform="translate(580, 44)"><rect width="140" height="60" rx="6" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/><rect width="140" height="20" rx="6" fill="#5F5E5A"/><text x="12" y="14" font-size="12" fill="#FFFFFF">vm-cache</text><text x="70" y="42" text-anchor="middle" font-size="11" fill="#3A3A3A">eth0 → 10.0.1.8</text></g>

      </g>

      <path id="net-pkt-path-5" d="M 120 104 L 120 156 L 300 156 L 300 104 L 300 156 L 480 156" fill="none" opacity="0"/>

        <rect width="200" height="32" rx="3" fill="#3a3a3a"/>
        <text x="100" y="14" text-anchor="middle" font-size="11" font-weight="500" fill="#cfcfcf">PHYSICAL NIC (uplink)</text>

        <rect x="80" y="20" width="20" height="8" rx="1" fill="#1a1a1a"/>
        <rect x="120" y="20" width="20" height="8" rx="1" fill="#1a1a1a"/>
        <rect x="160" y="20" width="20" height="8" rx="1" fill="#1a1a1a"/>

      <line x1="380" y1="180" x2="380" y2="200" stroke="#3F4A5E" stroke-width="2"/>
    </g>
    <text x="520" y="380" text-anchor="middle" font-size="14" fill="#3A3A3A">VMs talk to the vSwitch through virtual NICs. Same-host traffic stays in memory; cross-host crosses the physical NIC.</text>
  </g>

  <!-- STORAGE MODE -->
  <g class="mode-group mode-storage">
    <text x="520" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#5F5E5A" letter-spacing="1.5">STORAGE — VM DISKS LIVE AS .VMDK FILES IN A DATASTORE</text>

    <g transform="translate(160, 90)">
      <rect width="320" height="100" rx="8" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.5"/>
      <rect width="320" height="22" rx="8" fill="#5F5E5A"/>
      <text x="12" y="16" font-size="13" font-weight="500" fill="#FFFFFF">vm-app</text>
      <text x="20" y="50" font-size="12" fill="#3A3A3A">Inside the VM:</text>
      <text x="120" y="50" font-size="12" fill="#1F8A60" font-weight="600">"I have a disk at /dev/sda"</text>
      <text x="20" y="74" font-size="11" fill="#9D9C95" font-style="italic">The VM doesn't know it's a file.</text>

    <g transform="translate(560, 90)">

    <!-- Datastore -->

      <text x="360" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#5F5E5A" letter-spacing="1.2">DATASTORE — production-ds (VMFS, 2 TB)</text>
      <g transform="translate(40, 42)">
        <rect width="160" height="100" rx="6" fill="#F4F1E8" stroke="#5F5E5A" stroke-width="1"/>

      </g>
      <g transform="translate(220, 42)">
        <rect width="160" height="100" rx="6" fill="#F4F1E8" stroke="#5F5E5A" stroke-width="1"/>
        <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#3A3A3A">vm-db folder</text>
        <text x="80" y="46" text-anchor="middle" font-size="10" fill="#5F5E5A">vm-db.vmx</text>

      </g>
      <g transform="translate(420, 42)">
        <ellipse cx="40" cy="6" rx="40" ry="6" fill="#A8A8AC" stroke="#5F5E5A"/>

<script>
(function () {
  const svg = document.getElementById('canvas');
  const playBtn = document.getElementById('play-btn');
  const speedSlider = document.getElementById('speed-slider');
  const speedDisplay = document.getElementById('speed-display');
  const stageLabel = document.getElementById('stage-label');
  const stageText = {
    cpu: 'CPU: vSphere schedules VM vCPUs onto physical cores, NUMA-aware.',
    memory: 'Memory: 24 GB of VMs on 16 GB of host RAM, via TPS / ballooning / compression.',
    network: 'Network: VMs connect to a vSwitch; same-host traffic stays in memory.',
    storage: 'Storage: each VM\'s disk is a .vmdk file inside a datastore.',
    gpu: 'GPU: pass the whole card to one VM, or slice it into vGPUs for many.'
  };
  let speed = 1.0, isPaused = false, svgClock = 0, lastFrame = performance.now();
  svg.pauseAnimations();
  function tick(now) {
    const dt = (now - lastFrame) / 1000;
    lastFrame = now;
    if (!isPaused) { svgClock += dt * speed; svg.setCurrentTime(svgClock); }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.toggle('active', b === btn));
    svg.dataset.mode = mode;
    stageLabel.textContent = stageText[mode];
    svgClock = 0; svg.setCurrentTime(0);
  }));
  playBtn.addEventListener('click', () => { isPaused = !isPaused; playBtn.textContent = isPaused ? 'Play' : 'Pause'; });
  speedSlider.addEventListener('input', e => { speed = parseFloat(e.target.value); speedDisplay.textContent = speed.toFixed(1) + '×'; });
})();
</script>
