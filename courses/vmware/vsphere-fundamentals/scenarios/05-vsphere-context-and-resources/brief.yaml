# Intake brief — Lesson 05, vSphere Fundamentals
# Topic: vSphere — where it fits in the SDDC and cloud, how you access it, and how it talks to hardware.

lesson:
  title: "vSphere: where it fits, how you access it, what it touches"
  slug: "05-vsphere-context-and-resources"
  domain: "vmware"
  course_slug: "vsphere-fundamentals"
  position: 5
  granularity: "concept"
  brief_drafted_on: "2026-05-01"

learner_profile:
  prerequisites: ["Lessons 01-04, 06, 07. Comfortable with the apartment-building analogy and the SDDC pattern."]
  assumed_zero_knowledge_of:
    - "Specific user interfaces for managing virtualization."
    - "How a hypervisor schedules CPU, slices memory, attaches storage, presents networks, or assigns GPUs."

learning_outcomes:
  - "Learner can place vSphere in the SDDC and cloud picture (compute layer; foundation of VMware Cloud on AWS)."
  - "Learner can name the four primary user interfaces for vSphere: vSphere Client, VMware Host Client, DCUI, command-line."
  - "Learner can describe how vSphere uses each of five hardware resources: CPU, memory, network, storage, GPU."

scope:
  in_scope:
    - "vSphere as the compute layer of the SDDC; relationship to vSAN/NSX (already covered in lesson 7) and to public cloud."
    - "Four UIs: vSphere Client (web), VMware Host Client (per-host), DCUI (yellow console on the host), CLI / API (PowerCLI, esxcli, REST)."
    - "Hardware resources: CPU (hyperthreading, NUMA, VT-x/AMD-V), memory (TPS, ballooning, compression, swap), networking (NICs, vSwitches, port groups, vmkernel), storage (HBAs, datastores, VMFS/NFS/vSAN), GPU (vGPU, DirectPath I/O)."
  out_of_scope:
    - "Operational steps (installing ESXi, configuring vCenter, etc) — those are lessons 08-12."
    - "Storage protocol deep-dives — lesson 11."
    - "Networking policy details — lesson 10."

planned_sections:
  concept_explanation: { target_words: 320 }
  before_after: { target_words_each_side: 110 }
  analogy: { direction: "Building control rooms (UIs) plus building services (hardware abstractions)." }
  eli5: { target_words_max: 100 }
  eli10: { target_words: 240 }
  real_world_scenarios: { count: 4 }
  static_diagram: { purpose: "vSphere at the center, 4 UIs feeding in, 5 hardware resources feeding out, SDDC/cloud frame around it." }
  animated_illustration:
    mode_toggles: ["cpu", "memory", "network", "storage", "gpu"]
  flashcards: { count: 10 }
  quiz: { count: 3 }

