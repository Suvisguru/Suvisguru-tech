course_disclaimer:
  non_kubernetes: true
  rationale: 'AWS ECS uses its own APIs (Cluster / Service / Task / Task Definition / Capacity Provider / Service Connect) — not K8s APIs. Included as a companion to K-EKS because organisations frequently choose between or coexist with EKS.'

learner_profile:
  prerequisites:
    - 'AWS basics: IAM, VPC, EC2, ALB, ECR, CloudWatch, Secrets Manager, KMS.'
    - 'Container fundamentals: Docker, image registries, container lifecycle.'
    - 'K-ECS modules 1-5 (cumulative).'
  assumed_zero_knowledge_of:
    - 'Kubernetes Pods / Deployments / Services / Ingress / RBAC / CRDs.'

learning_outcomes:
  - 'Learner can explain deploymentConfiguration, minimumHealthyPercent, maximumPercent, circuit breaker.'
  - 'Learner can explain two target groups, listener swap, canary + traffic shift.'
  - 'Learner can explain task count + node count.'

sections:
  - 'deploymentConfiguration, minimumHealthyPercent, maximumPercent, circuit breaker'
  - 'Two target groups, listener swap, canary + traffic shift'
  - 'Task count + node count'
  - 'Where Tasks land on capacity'

