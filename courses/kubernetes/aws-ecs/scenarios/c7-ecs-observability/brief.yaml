# Intake brief — C7, K-ECS (non-Kubernetes companion course)
# Topic: C7 · ECS Observability — Container Insights, ECS Exec, FireLens, ADOT, X-Ray
# Module C7 · ECS Observability

lesson:
  title: 'C7 · ECS Observability — Container Insights, ECS Exec, FireLens, ADOT, X-Ray'
  slug: 'c7-ecs-observability'
  domain: 'kubernetes'
  course_slug: 'aws-ecs'
  position: 07
  granularity: 'module'
  brief_drafted_on: '2026-05-03'
  central_metaphor: 'K-Harbor · Lighthouse — The harbor''s **Lighthouse** is the highest point. Four observers work shifts there.
    The **weather observer** (Container Insights) keeps charts of every pier and ship — wind speed (CPU), tide level'
  module: 'Module C7 · ECS Observability'

course_disclaimer:
  non_kubernetes: true
  rationale: 'AWS ECS uses its own APIs (Cluster / Service / Task / Task Definition / Capacity Provider / Service Connect) — not K8s APIs. Included as a companion to K-EKS because organisations frequently choose between or coexist with EKS.'

learner_profile:
  prerequisites:
    - 'AWS basics: IAM, VPC, EC2, ALB, ECR, CloudWatch, Secrets Manager, KMS.'
    - 'Container fundamentals: Docker, image registries, container lifecycle.'
    - 'K-ECS modules 1-6 (cumulative).'
  assumed_zero_knowledge_of:
    - 'Kubernetes Pods / Deployments / Services / Ingress / RBAC / CRDs.'

learning_outcomes:
  - 'Learner can explain cluster + Service + Task metrics + dashboards.'
  - 'Learner can explain interactive shell via SSM, no SSH, CloudTrail-audited.'
  - 'Learner can explain fluent Bit / Fluentd sidecar; logs to anywhere.'

sections:
  - 'Cluster + Service + Task metrics + dashboards'
  - 'Interactive shell via SSM, no SSH, CloudTrail-audited'
  - 'Fluent Bit / Fluentd sidecar; logs to anywhere'
  - 'OpenTelemetry collector + distributed tracing'

section_5_real_world:
  count: 4
  examples:
    - 'A 100-engineer org has a Service Catalog template that every new ECS Service uses.'
    - 'On-call engineer pages on a Fargate Service with intermittent 5xx.'
    - 'A regulated workload requires 7-year log retention.'
    - 'A team had Container Insights + FireLens but no ADOT/X-Ray.'

