bar:
  - '**ECS Anywhere = control plane in AWS, capacity on your hardware. SSM + ECS agents register external instances. Networking is bridge/host (no awsvpc on external; no ALB). Pick for regulated, edge, hybrid bridge use cases — not for general-purpose workloads.**'

