    - 'Container fundamentals: Docker, image registries, container lifecycle.'
    - 'K-ECS modules 1-7 (cumulative).'
  assumed_zero_knowledge_of:
    - 'Kubernetes Pods / Deployments / Services / Ingress / RBAC / CRDs.'

learning_outcomes:
  - 'Learner can explain control plane in AWS, capacity on your hardware.'
  - 'Learner can explain sSM activation + agent installation.'
  - 'Learner can explain bridge/host network only; no ALB; storage on host.'

sections:
