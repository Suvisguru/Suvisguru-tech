shared_artifacts:
  preview_page: { file: '/preview-kubernetes-ecs-lesson-02.html' }
  lesson_md: { file: 'lesson.md' }
  flashcards: { file: 'flashcards.yaml', count: 8 }
  quiz: { file: 'quiz.yaml', count: 3 }

bar:
  - '**Task Definitions are immutable; every change is a new revision. Two IAM roles: execution (image pull + secrets + logs) vs task (your app''s AWS calls). awsvpc is the recommended network mode for almost every Task. Sidecars share the Task''s network namespace + task-level volumes via mountPoints.**'

