# Intake brief — C4, K-ECS (non-Kubernetes companion course)
# Topic: C4 · IAM and Security — Roles, Secrets, KMS, ECR, VPC Endpoints
# Module C4 · IAM and Security

lesson:
  title: 'C4 · IAM and Security — Roles, Secrets, KMS, ECR, VPC Endpoints'
  slug: 'c4-iam-and-security'
  domain: 'kubernetes'
  course_slug: 'aws-ecs'
  position: 04
  granularity: 'module'
  brief_drafted_on: '2026-05-03'
  central_metaphor: 'K-Harbor · Customs House — The **Customs House** at the harbor is where authority is checked. Every captain (Task) carries two letters from the port authority. The **boarding letter** (execution role) is signed for one purpose '
  module: 'Module C4 · IAM and Security'

course_disclaimer:
  non_kubernetes: true
  rationale: 'AWS ECS uses its own APIs (Cluster / Service / Task / Task Definition / Capacity Provider / Service Connect) — not K8s APIs. Included as a companion to K-EKS because organisations frequently choose between or coexist with EKS.'

learner_profile:
  prerequisites:
    - 'AWS basics: IAM, VPC, EC2, ALB, ECR, CloudWatch, Secrets Manager, KMS.'
    - 'Container fundamentals: Docker, image registries, container lifecycle.'
    - 'K-ECS modules 1-3 (cumulative).'
  assumed_zero_knowledge_of:
    - 'Kubernetes Pods / Deployments / Services / Ingress / RBAC / CRDs.'

learning_outcomes:
  - 'Learner can explain two roles, two lifecycles, two scopes.'
  - 'Learner can explain inject at launch; KMS gates Decrypt.'
  - 'Learner can explain image pull paths and how to keep them off the public Internet.'

sections:
  - 'Two roles, two lifecycles, two scopes'
  - 'Inject at launch; KMS gates Decrypt'
  - 'Image pull paths and how to keep them off the public Internet'
  - 'Platform versions, OS patching, regulated workloads'

section_5_real_world:
  count: 4
  examples:
    - 'A health-tech runs PHI-handling Tasks.'
    - 'A regulated workload runs in private subnets with no NAT gateway.'
    - 'A Service stores a database password in Secrets Manager with quarterly rotation.'
    - 'A team rotated KMS keys and updated key policies but forgot to update *execution-role policy* to reference the new key ARN.'

