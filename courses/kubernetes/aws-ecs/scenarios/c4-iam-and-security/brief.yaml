bar:
  - '**Two roles, different lifecycles. Secrets injected at Task launch by execution role; never logged. KMS Decrypt is the most-forgotten policy on encrypted ECR + Secrets. VPC endpoints keep ECR/Logs/SSM traffic off the public Internet — and required in disconnected/regulated VPCs.**'

