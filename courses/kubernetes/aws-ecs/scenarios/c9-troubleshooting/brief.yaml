bar:
  - '**Read top-down: describe-tasks → stoppedReason → service events → CloudWatch logs → ECS Exec. Each step narrows the cause class. Stop reading the moment the cause is identified — most ECS failures are in the first three categories: ENI / image pull / IAM-KMS.**'

