course_disclaimer:
  non_kubernetes: true
  rationale: 'AWS ECS uses its own APIs (Cluster / Service / Task / Task Definition / Capacity Provider / Service Connect) — not K8s APIs. Included as a companion to K-EKS because organisations frequently choose between or coexist with EKS.'

learner_profile:
  prerequisites:
    - 'AWS basics: IAM, VPC, EC2, ALB, ECR, CloudWatch, Secrets Manager, KMS.'
    - 'Container fundamentals: Docker, image registries, container lifecycle.'
    - 'K-ECS modules 1-8 (cumulative).'
  assumed_zero_knowledge_of:
    - 'Kubernetes Pods / Deployments / Services / Ingress / RBAC / CRDs.'

learning_outcomes:
  - 'Learner can explain eNI, image pull, IAM, KMS — the launch-time failure quartet.'
  - 'Learner can explain read the reason; take the matching action.'
  - 'Learner can explain a deploy halted itself — read why.'

sections:
  - 'ENI, image pull, IAM, KMS — the launch-time failure quartet'
  - 'Read the reason; take the matching action'
  - 'A deploy halted itself — read why'
  - 'Tasks RUNNING but not serving traffic'

section_5_real_world:
  count: 4
  examples:
    - 'A Service''s Tasks all stop with *CannotPullContainerError: failed to decrypt image manifest with KMS key arn:.'
    - 'New revision raised the workload''s baseline memory; container memory was unchanged; OOM at startup.'
    - 'During an autoscale-out spike, Tasks stuck PROVISIONING with *VPC.'
    - 'A team''s Service had circuit breaker disabled.'

