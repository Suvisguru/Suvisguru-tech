bar:
  - '**awsvpc network mode is the recommended default — ENI per Task, SG per Task, required for Fargate. Service Connect is the modern east-west pattern (replaces App Mesh). ALB target type = IP for awsvpc Tasks. VPC Lattice for cross-VPC / cross-account application networking.**'

