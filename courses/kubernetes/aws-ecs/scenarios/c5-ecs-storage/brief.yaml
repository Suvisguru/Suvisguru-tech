lesson:
  title: 'C5 · ECS Storage — Ephemeral, Bind, Docker, EFS, FSx'
  slug: 'c5-ecs-storage'
  domain: 'kubernetes'
  course_slug: 'aws-ecs'
  position: 05
  granularity: 'module'
  brief_drafted_on: '2026-05-03'
  central_metaphor: 'K-Harbor · Cargo Holds — Down at the harbor''s **Cargo Holds** there are five places to put cargo while ships work.
    **The ship''s own scratch hold** (ephemeral storage) is where each ship dumps temp cargo during the voyage.'
  module: 'Module C5 · ECS Storage'

course_disclaimer:
  non_kubernetes: true
  rationale: 'AWS ECS uses its own APIs (Cluster / Service / Task / Task Definition / Capacity Provider / Service Connect) — not K8s APIs. Included as a companion to K-EKS because organisations frequently choose between or coexist with EKS.'

