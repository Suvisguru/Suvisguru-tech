    - 'Container fundamentals: Docker, image registries, container lifecycle.'
    - 'K-ECS modules 1-4 (cumulative).'
  assumed_zero_knowledge_of:
    - 'Kubernetes Pods / Deployments / Services / Ingress / RBAC / CRDs.'

learning_outcomes:
  - 'Learner can explain per-Task scratch, sized at Task Definition.'
  - 'Learner can explain eC2-launch storage patterns.'
  - 'Learner can explain nFSv4 managed filesystem; access points; mount targets per AZ.'

sections:
