bar:
  - '**Pick storage by lifetime + sharing. Ephemeral = per-Task scratch (sized in Task Definition). EFS = the only RWX-across-Tasks-across-AZs answer. Bind mounts + Docker volumes are EC2-only legacy. FSx for Windows or NetApp use cases. Always set ephemeralStorage explicitly on Fargate when you need >20 GiB.**'

