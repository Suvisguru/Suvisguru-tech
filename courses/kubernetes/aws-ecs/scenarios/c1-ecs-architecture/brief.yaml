learning_outcomes:
  - 'Learner can explain eCS vs EKS vs Fargate vs App Runner vs Lambda.'
  - 'Learner can explain cluster, Service, Task, Task Definition.'
  - 'Learner can explain eC2, Fargate, External (ECS Anywhere), ECS Managed Instances.'

sections:
