bar:
  - '**ECS = AWS-native orchestrator (Cluster / Service / Task / Task Definition); EKS = managed K8s; Fargate = serverless capacity (a launch type, not a product); App Runner = opinionated PaaS for single-service HTTPS apps; Lambda = functions, 15-min cap. Pick by operational appetite + workload shape, not popularity.**'

