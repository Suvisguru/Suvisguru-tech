# Flashcards — K-ADV-PE P (count: 8)

cards:
  - id: 1
    front: |
      What's the IDP's definition?
    back: |
      **Internal Developer Platform** — the platform team's product, with developers as customers. Includes self-service portal (Backstage), automation (Crossplane / Argo CD), policy (OPA / Kyverno), templates, SLOs.

  - id: 2
    front: |
      Golden path — what does it ship?
    back: |
      A new repo + manifests + CI + observability + GitOps onboarding for the 80% common case (e.g., new Go service). Developer fills in business logic; platform-quality from day-1.

  - id: 3
    front: |
      Self-service namespace — what auto-provisions?
    back: |
      Namespace + RoleBinding (per OIDC group) + NetworkPolicy default-deny + ResourceQuota + LimitRange + service catalog entry. Day-1 governance day-0.

  - id: 4
    front: |
      Five typical platform SLOs?
    back: |
      Cluster availability (99.9-99.99%), deploy latency (P95 < 5 min), capacity headroom (≥ 20% free), onboarding latency (P95 < 1 day for new tenant), IR (detect < 5min, respond < 15min).

  - id: 5
    front: |
      Backstage Scaffolder — input + output?
    back: |
      Input: template (skeleton + parameter spec). Output: new repo + commits + initial PR for cluster onboarding. Developer answers form questions; output materializes.

  - id: 6
    front: |
      Why prioritise developer NPS as a metric?
    back: |
      Platform team's success = developers' productivity. Low NPS = platform isn't serving customers; high NPS = customer adoption. Quarterly survey + open-text feedback drives roadmap.

  - id: 7
    front: |
      What does "day-1 governance is day-0" mean?
    back: |
      The new namespace / service / tenant has every guardrail from the moment it exists. Platform team doesn't add governance later; it's baked into the template.

  - id: 8
    front: |
      Three roles in K-Workshop universe?
    back: |
      **Master Craftsperson** (platform engineer), **Apprentice** (developer / consumer), **Foreman** (platform operator running the platform).
