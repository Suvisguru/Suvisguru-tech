# Flashcards — K-ADV-PE P (count: 8)

cards:
  - id: 1
    front: |
      Score — what's the win?
    back: |
      **Portable** across targets (K8s / ECS / Compose / Cloud Run). Same spec; per-target render via score-CLI.

  - id: 2
    front: |
      KubeVela — based on what model?
    back: |
      **Open Application Model (OAM)**: Components + Traits + Policies + Workflows. CUE-typed; trait composition.

  - id: 3
    front: |
      Radius — what's its differentiator?
    back: |
      App as a **graph**: resources + connections first-class. Authored in Bicep or YAML; per-env recipes hide cloud.

  - id: 4
    front: |
      Humanitec — what does it offer?
    back: |
      Commercial hosted PaaS on top of K8s + Crossplane + GitOps. Portal-driven; trade self-build for speed.

  - id: 5
    front: |
      Component vs Trait in OAM?
    back: |
      **Component**: workload type (web-service / worker). **Trait**: cross-cutting concern (scaling / ingress / observability). Compose Components + Traits per app.

  - id: 6
    front: |
      Score CLI variants?
    back: |
      **score-compose** (Docker Compose), **score-helm** (Helm chart), **score-k8s** (K8s manifests), **score-ecs** (AWS ECS Task Defs).

  - id: 7
    front: |
      Radius recipe — what does it do?
    back: |
      Environment-specific implementation of an abstract resource. "DB recipe" in dev = local container; in prod = managed Postgres + IRSA. Tenant spec stays the same.

  - id: 8
    front: |
      When NOT use a workload abstraction?
    back: |
      When team is small + already comfortable with K8s + service shapes are highly varied. Abstractions add a layer to maintain; pay only when developer-ergonomics gain exceeds maintenance cost.
