# Quiz — K-ADV-PE P (count: 3)

questions:
  - id: 1
    prompt: |
      Walk a new engineer through the IDP in 5 minutes.
    answer: |
      "Three ways into the workshop. (1) **Backstage portal**: catalog + docs + scaffolder + plugins; daily home page. (2) **Crossplane XRDs**: kubectl apply a Claim for a Postgres / Bucket / Queue / Namespace. (3) **Score spec**: in your repo, declare workload + dependencies; rendered to K8s by score-helm. **Day-1 governance**: every namespace + service has RBAC + NetPol + Quota + cost label baked in. **Cost transparency**: per-team cost in Slack weekly. **SLOs**: published; we hit them or postmortem. **Game days quarterly**; cost reviews monthly; SLO retros quarterly. **NPS survey**: tell us what's broken — we ship roadmap from your feedback."

  - id: 2
    type: 'cyoa'
    prompt: |
      Leadership says: "build IDP this quarter." Defend phasing.
    answer: |
      "**Phased adoption beats big-bang.** Phasing: (1) Q1 — Backstage portal + Catalog auto-discovery + 1 Scaffolder template. Quick value; visible portal. (2) Q2 — Crossplane self-service namespace + Argo CD ApplicationSet for a few apps. (3) Q3 — OPA + Kyverno gates + tenant onboarding flow. (4) Q4 — OpenCost + SLOs + workload abstraction. Each step is 1-quarter; each delivers value; bug-budget for course-correct. Big-bang quarter = months of build, no value, high risk."

  - id: 3
    prompt: |
      The CFO sees IDP team is 5 engineers. "Why?" Defend.
    answer: |
      "**Five engineers serving 200 developers = 1:40 leverage.** Without IDP, those 200 devs each spend ~10% on platform-glue work — equivalent to 20 dev-engineers wasted. IDP team's 5 = net 15 engineer-equivalents added. Plus quality (uniform governance) + speed (10-min new service) + cost (cost transparency drives 20% bill reduction). **Net**: IDP team pays for itself in saved engineer-time + reduced cloud bill within 1 quarter. Not overhead — multiplier."
