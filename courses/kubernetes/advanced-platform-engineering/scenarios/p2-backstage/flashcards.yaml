# Flashcards — K-ADV-PE P (count: 8)

cards:
  - id: 1
    front: |
      Backstage four pillars?
    back: |
      **Catalog**, **TechDocs**, **Scaffolder**, **Plugins**.

  - id: 2
    front: |
      catalog-info.yaml lives where?
    back: |
      In each repo. Backstage auto-discovers via GitHub / GitLab integration.

  - id: 3
    front: |
      Catalog entity kinds?
    back: |
      **Component** (service), **API** (contract), **Resource** (DB / queue), **System** (collection), **Domain** (collection of Systems), **User / Group**.

  - id: 4
    front: |
      TechDocs build pattern at scale?
    back: |
      Per-PR CI builds MkDocs static site → S3 / GCS. Backstage TechDocs Backend serves from object storage. No central build bottleneck.

  - id: 5
    front: |
      Scaffolder steps?
    back: |
      `fetch:template` (skeleton), `publish:github` (create repo), `catalog:register` (add to Catalog), custom actions for org-specific (cluster onboarding PR, Crossplane Claim, etc.).

  - id: 6
    front: |
      Most-used Backstage plugins?
    back: |
      Argo CD (deploy status), Kubernetes (cluster view), PagerDuty (on-call), GitHub Actions (CI), Datadog / Grafana (dashboards), Snyk (security), AWS / Azure / GCP.

  - id: 7
    front: |
      Software Catalog API — what does it expose?
    back: |
      REST + GraphQL access to all catalog entities. CI pipelines + downstream tools query "who owns this commit?" "what tier?" "which APIs does this consume?"

  - id: 8
    front: |
      Hosted Backstage options?
    back: |
      **Spotify Portal** (Spotify-managed), **Roadie** (Backstage-as-a-service). Trade self-host setup cost for ongoing fee.
