section_5_real_world:
  count: 4
  examples:
    - 'A new cluster ships with cluster-wide default `enforce: restricted`; `kube-system` + monitoring exempt to `privileged`.'
    - 'A 100-engineer org with 90 prod namespaces.'
    - 'A compromised dev image silently launched a crypto-miner.'
    - 'A team flipped enforce: restricted on a namespace whose images ran as root.'

