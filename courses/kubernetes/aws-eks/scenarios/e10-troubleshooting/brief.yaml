bar:
  - 'EKS-specific failure modes need EKS-specific debugging. Top eight: **(1) IAM/RBAC unauth** (access entries vs aws-auth precedence); **(2) node NotReady / NG launch fail** (IAM, AMI, subnet capacity); **(3) VPC CNI IP exhaustion** (enable prefix delegation); **(4) LB pending** (subnet tags, IAM); **(5) EBS multi-AZ attach** (WaitForFirstConsumer); **(6) IRSA / Pod Identity** (trust policy, OIDC, association); **(7) Karpenter / Auto Mode stuck** (instance availability, IAM, NodeClass); **(8) API throttling** (CloudWatch + CloudTrail RCA, request limits). **CloudTrail + CloudWatch + Container Insights** are the diagnostic surfaces.'

