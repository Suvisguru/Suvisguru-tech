bar:
  - 'AWS-native EKS observability: **CloudWatch Container Insights (enhanced)** for Pod/node metrics + logs; **Amazon Managed Prometheus (AMP)** for scaled metrics; **Amazon Managed Grafana (AMG)** for dashboards (IAM SSO); **ADOT** (AWS Distro for OpenTelemetry) collector → AMP / X-Ray; **Fluent Bit → CloudWatch Logs** for app logs; **X-Ray** for distributed traces; **Control-plane logs** (api / audit / authenticator / controllerManager / scheduler) → CloudWatch; **AWS Split Cost Allocation Data** for per-namespace cost.'

