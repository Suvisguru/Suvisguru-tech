bar:
  - 'Storage CSI drivers (managed add-ons): **EBS CSI** (RWO block; gp3 default; **VolumeAttributesClass for live IOPS/throughput tuning**), **EFS CSI** (RWX, multi-AZ), **FSx CSI** (Lustre / NetApp ONTAP / OpenZFS), **S3 Mountpoint CSI** (object as FS, read-heavy). **snapshot-controller** for VolumeSnapshot. **KMS encryption** on every StorageClass. **WaitForFirstConsumer** for zone-aware provisioning.'

