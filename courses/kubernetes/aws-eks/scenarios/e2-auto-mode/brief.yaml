bar:
  - 'EKS Auto Mode = AWS''s built-in compute layer. You declare **NodePool** (label/taint/disruption rules) + **NodeClass** (instance constraints). AWS provisions EC2, picks instance type, manages lifecycle, consolidates idle, replaces nodes on a regular cadence (max node lifetime). Bundles core add-ons (VPC CNI, EBS CSI, LB controller, CoreDNS, GPU plugins, health checkers) — AWS upgrades them. **Auto Mode vs Managed NG vs Karpenter**: Auto Mode is the modern default for new clusters; doesn''t fit every shop.'

