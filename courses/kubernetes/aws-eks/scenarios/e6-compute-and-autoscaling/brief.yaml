bar:
  - '**Karpenter** = recommended autoscaler for EKS. NodePool + EC2NodeClass per workload class. Consolidation: WhenUnderutilized (aggressive) or WhenEmpty (conservative). **Spot** (60-90% off) for tolerant workloads + spot interruption handling. **Graviton ARM** (~25% cheaper, often faster per dollar). **GPUs** (P/G families) + **Inferentia/Trainium** + **Neuron device plugin** + **EFA** for distributed training. **Savings Plans / RIs** on the always-on baseline.'

