bar:
  - 'EKS upgrades: **14 months standard support + 12 months extended support** per minor. Order: **(1) backup + scan** (etcd snapshot equivalent doesn''t exist; AWS handles control plane state — but Velero your workloads + scan with Pluto for deprecated APIs); **(2) control plane** (`aws eks update-cluster-version`; ~30-60 min, AWS handles); **(3) Managed Node Groups** (rolling drain via AWS); **(4) Self-managed nodes**; **(5) Fargate Pod refresh** (recreate Pods); **(6) Add-ons** (CNI, CoreDNS, kube-proxy, EBS / EFS CSI); **(7) Verify**. Blue-green cluster for high-stakes upgrades.'

