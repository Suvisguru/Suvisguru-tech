bar:
  - '**Capstone deliverables**: (1) Working multi-AZ EKS Auto Mode cluster (3 AZs). (2) EKS Blueprints / Terraform repo reproducing the cluster from scratch. (3) Pod Identity + access entries (no IRSA / aws-auth). (4) KMS CMK encryption everywhere. (5) Gateway API + VPC Lattice for cross-VPC. (6) AMP + AMG + ADOT + control-plane logs. (7) Argo CD App-of-Apps for workloads + add-ons. (8) Eight runbooks for the eight EKS failure patterns. (9) Documented blue-green upgrade rehearsal. (10) DR plan covering AZ failure + region failure. **K-EKS-complete** when a peer reproduces from your artifacts + recovers a chaos-injected disaster.'

