# Flashcards — K-EKS E (count: 8)

cards:
  - id: 1
    front: |
      K-EKS deliverables (10)?
    back: |
      Architecture doc, EKS Blueprints repo, working multi-AZ Auto Mode cluster, Pod Identity + access entries, KMS CMK encryption everywhere, Gateway + VPC Lattice, AMP + AMG + ADOT + control-plane logs, Argo CD GitOps, 8 EKS-specific runbooks, blue-green upgrade rehearsal + DR plan.

  - id: 2
    front: |
      Reference K-EKS stack?
    back: |
      EKS Auto Mode (Karpenter + add-ons), AWS LB Controller (built-in), Pod Identity, KMS CMK, Gateway API + VPC Lattice, AMP + AMG + ADOT + X-Ray, Argo CD, Velero, GuardDuty + Inspector + Cosign + Kyverno verifyImages.

  - id: 3
    front: |
      Phase A?
    back: |
      Architecture doc + EKS Blueprints provisioning multi-AZ cluster with Auto Mode + KMS + control-plane logs + Container Insights. Cluster nodes Ready.

  - id: 4
    front: |
      Phase B?
    back: |
      Pod Identity per (ns, SA), access entries for human IAM, KMS-encrypted StorageClass, EBS / EFS CSI configs, AMP + AMG + ADOT observability stack.

  - id: 5
    front: |
      Phase C?
    back: |
      Security (GuardDuty / Inspector / Cosign / PSA / AdminNetworkPolicy), Argo CD GitOps for workloads + add-ons, Velero + DR plan, blue-green upgrade rehearsal, 8 runbooks.

  - id: 6
    front: |
      How to know K-EKS-complete?
    back: |
      Peer reproduces the cluster from EKS Blueprints + recovers a chaos-injected disaster using your runbook. Score = pass.

  - id: 7
    front: |
      Substitute components?
    back: |
      Calico for Cilium (FIPS); Datadog for AMP/AMG (existing licence); HashiCorp Vault for Secrets Manager. Same modules apply; substitute components.

  - id: 8
    front: |
      K-EKS time investment?
    back: |
      3-5 weeks of focused work for one engineer + reviewer pair. Less if your org has K-EKS graduates to mentor. AWS cost ~$200-400 for the lab.
