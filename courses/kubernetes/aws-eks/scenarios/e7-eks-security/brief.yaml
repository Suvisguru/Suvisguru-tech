bar:
  - 'EKS security baseline: **KMS envelope encryption** for K8s Secrets + EBS + EFS (CMK, not default key); **GuardDuty EKS Protection** (audit) + **Runtime Monitoring** (eBPF threat detection); **Inspector + ECR enhanced scanning** (Snyk-powered CVE); **Cosign + AWS Signer** for image signing + verifyImages admission; **ECR replication + pull-through cache**; **Bottlerocket** immutable nodes; **PSA Restricted**; **private cluster endpoint**; **CloudTrail audit**; **IAM Access Analyzer**; **FIPS** for regulated.'

