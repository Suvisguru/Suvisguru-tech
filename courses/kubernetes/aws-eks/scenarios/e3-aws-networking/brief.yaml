bar:
  - 'AWS VPC CNI gives Pods real VPC IPs via secondary ENIs/IPs. **Enable prefix delegation** (16x more IPs per ENI) — this is non-negotiable for serious clusters. **AWS LB Controller** creates ALBs from Ingress/HTTPRoute, NLBs from Services. **VPC Lattice + AWS Gateway API Controller** for cross-VPC service-to-service. **ExternalDNS** for Route 53. **SG-for-pods** for per-Pod security groups. **Cilium / Calico / AWS Cilium dataplane** as alternatives.'

