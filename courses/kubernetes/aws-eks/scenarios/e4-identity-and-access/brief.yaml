bar:
  - 'Two identity layers: **AWS IAM** (cluster API access — CreateCluster, DescribeNodegroup, kubeconfig retrieval) and **K8s RBAC** (in-cluster — get pods, edit deployments). Map IAM → K8s via **access entries** (modern, recommended) or **aws-auth ConfigMap** (legacy, fragile). For Pod-to-AWS-service: **EKS Pod Identity** (Pod Identity Agent + association API — modern, simpler) or **IRSA** (OIDC provider + IAM trust policy — legacy but still common).'

