section_5_real_world:
  count: 4
  examples:
    - 'Cluster lost in us-east-1; Vault HA in us-east-1 + us-west-2; rebuild cluster in us-west-2; ESO re-syncs from Vault us-west-2; secrets immediately available.'
    - 'Primary cluster ALB unhealthy; Route 53 health check fires; A record swaps to DR ALB within 60s.'
    - 'Fintech runs Aurora Global across us-east-1 + us-west-2; RPO < 1s; on disaster, promote DR to primary; RTO < 1 min.'
    - 'Pre-test: assumed RDS multi-AZ = enough.'

