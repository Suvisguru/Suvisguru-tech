section_5_real_world:
  count: 4
  examples:
    - 'Quarterly disaster drill: destroy non-prod cluster; rebuild from Terraform + Argo CD + Velero.'
    - 'Bad upgrade corrupted prod cluster; rebuild via runbook in 28 min; tenants noticed brief degradation; full recovery within RTO.'
    - 'Initial recovery attempt failed; apps referenced CRDs not yet created.'
    - 'Backup existed but restore failed (StorageClass mismatch new cluster vs old).'

