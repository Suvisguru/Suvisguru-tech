# Flashcards — K-ADV-DR D (count: 8)

cards:
  - id: 1
    front: |
      Five sources for cluster rebuild?
    back: |
      **Git** (config + apps + IaC), **backups** (Velero + DB snapshots), **OCI registry** (images + signatures + models), **secrets** (external Vault + KMS), **DNS** (managed DNS + health checks).

  - id: 2
    front: |
      Drill cadence?
    back: |
      **Quarterly** full drill + **monthly** per-namespace + **semi-annual** tabletop. Continuous improvement.

  - id: 3
    front: |
      Drill roles?
    back: |
      **Drill Master** (scenario + coordinator), **On-call** (executor), **Observer** (timer / scribe), **Tenant rep** (validation).

  - id: 4
    front: |
      Capstone runbook order?
    back: |
      (1) Cluster IaC; (2) GitOps install + sync waves; (3) Vault restore; (4) Velero restore; (5) DB restore; (6) Validate; (7) DNS swap; (8) Tenant comms.

  - id: 5
    front: |
      RTO target for managed K8s + warm DR?
    back: |
      30-60 min end-to-end; longer for cold DR or self-managed clusters.

  - id: 6
    front: |
      Why measure per-phase timing?
    back: |
      Identifies bottleneck. Optimise the bottleneck phase; iterate. Without per-phase measurement, optimisation is guesswork.

  - id: 7
    front: |
      What's a tabletop drill?
    back: |
      Paper-walk through scenarios (no live execution). Cheap; finds runbook gaps + decision-point ambiguities.

  - id: 8
    front: |
      DR engineering team — typical size?
    back: |
      1-2 engineers per platform. Owns backup + restore tooling + drill orchestration + DR roadmap.
