# Flashcards — K-VAN V (count: 8)

cards:
  - id: 1
    front: |
      Six K-VAN deliverables?
    back: |
      Architecture doc, working 6-node HA cluster, git repo (Argo CD App-of-Apps), etcd + Velero backups (tested), upgrade rehearsal runbook, 7 DR runbooks. Plus kube-bench score > 95%.

  - id: 2
    front: |
      Reference stack components?
    back: |
      Talos Linux, 3 CP + 3 worker, stacked etcd, Cilium CNI + Gateway, cert-manager, Longhorn CSI, Velero, kube-prometheus-stack, Loki + Vector, Kyverno + Falco, Argo CD.

  - id: 3
    front: |
      Phase A milestones?
    back: |
      Architecture doc complete; 6 VMs provisioned with Talos + machine-config; cluster bootstrapped with kube-vip + stacked etcd; Cilium installed with kube-proxy replacement + Hubble; `kubectl get nodes` shows 6 Ready.

  - id: 4
    front: |
      Phase B milestones?
    back: |
      Argo CD installed + App-of-Apps reconciling all add-ons; cluster config tuned (audit + encryption + reserved); PSA + Kyverno + Falco enforcing; kube-bench > 95%.

  - id: 5
    front: |
      Phase C milestones?
    back: |
      etcd snapshots scheduled + tested; Velero scheduled + restore tested; upgrade rehearsal documented; all 7 DR scenarios recovered + documented.

  - id: 6
    front: |
      How to know you're K-VAN-complete?
    back: |
      A colleague reproduces the cluster from your artifacts (git + runbooks + architecture doc) without help. They recover at least one disaster using your runbook only. Score = pass.

  - id: 7
    front: |
      Reference stack alternatives?
    back: |
      RKE2 instead of Talos (regulated). Calico instead of Cilium (BGP / FIPS). HAProxy + keepalived instead of kube-vip (large org). Same modules apply; substitute components.

  - id: 8
    front: |
      Time investment?
    back: |
      4-6 weeks of focused work for a single engineer + reviewer pair. Less if your org has previous K-VAN graduates to mentor. More if doing in spare time alongside other duties.
