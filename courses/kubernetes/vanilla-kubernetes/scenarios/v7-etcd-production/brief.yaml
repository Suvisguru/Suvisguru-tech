bar:
  - 'etcd uses **Raft consensus** across 3+ members for HA (need majority for quorum). Disk: **dedicated NVMe SSD**, < 10ms p99 fsync, separate from kubelet. Routine ops: **snapshots** (every 30 min, off-site), **defragmentation** (weekly, rolling), **compaction** (auto via kube-apiserver). DR: **practice restore quarterly** — backups you don''t test are fiction. Failed member: detach + add as learner + promote.'

