# Flashcards — K-VAN V (count: 8)

cards:
  - id: 1
    front: |
      Two kernel modules to load?
    back: |
      `overlay` (overlay filesystem for container layers) and `br_netfilter` (bridge traffic visible to iptables/nftables). Both go in `/etc/modules-load.d/k8s.conf`.

  - id: 2
    front: |
      Three sysctl values?
    back: |
      `net.bridge.bridge-nf-call-iptables=1`, `net.bridge.bridge-nf-call-ip6tables=1`, `net.ipv4.ip_forward=1`. Apply via `/etc/sysctl.d/k8s.conf` + `sysctl --system`.

  - id: 3
    front: |
      Cgroup driver alignment?
    back: |
      containerd `SystemdCgroup = true` + kubelet defaults to systemd in modern K8s = aligned. Mismatch = kubelet refuses to start with cryptic cgroup errors.

  - id: 4
    front: |
      Time sync — why?
    back: |
      Certificates, etcd Raft, audit logs all assume monotonic time within ms tolerance. `chrony` or `systemd-timesyncd` on every node.

  - id: 5
    front: |
      Image pre-pulling for air-gap?
    back: |
      `kubeadm config images list` for the version. `ctr -n k8s.io images import <tar>` on every node, or pull from an internal registry mirror configured in containerd.

  - id: 6
    front: |
      Why disable swap?
    back: |
      Kubelet eviction + QoS logic assumes no swap. K8s 1.28+ supports it behind a flag, but production default is off.

  - id: 7
    front: |
      Pin package versions?
    back: |
      `apt-mark hold kubeadm kubelet kubectl containerd` on Debian/Ubuntu. `dnf versionlock` on RHEL family. Prevents surprise minor-version drift between unattended-upgrades runs.

  - id: 8
    front: |
      Talos Linux's answer to V2?
    back: |
      Bakes everything in: machine-config YAML covers kernel, sysctl, runtime, swap, time. No SSH, no per-node tweaking. Re-image to upgrade.
