bar:
  - 'Per-node prep, in order: **kernel modules** (`overlay`, `br_netfilter`), **sysctl** (`net.ipv4.ip_forward=1`, `net.bridge.bridge-nf-call-iptables=1`), **swap OFF**, **time sync**, **container runtime** (`containerd 2.x` with `SystemdCgroup=true`), **image pre-pulling** for air-gap. Reboot, sanity-check, then run kubeadm.'

