bar:
  - 'Drill seven disasters: **(1) expired CP certs** (`kubeadm certs renew all`); **(2) broken CNI** (delete + reinstall DaemonSet, restart Pods); **(3) broken CoreDNS** (fix Corefile, restart); **(4) apiserver down** (fix static-pod manifest); **(5) etcd quorum loss** (snapshot restore — V7); **(6) webhook blocking apiserver** (edit static-pod manifest to disable admission temporarily); **(7) accidentally deleted namespace** (Velero restore). Run as tournament; document each recovery in a runbook.'

