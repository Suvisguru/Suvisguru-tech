bar:
  - 'K8s release cadence: **minor every ~4 months**, patches monthly, ~14 months support per minor. Version skew: **kubelet ≤ apiserver, max 3 minors behind**; never skip a minor on upgrade. Order: **etcd snapshot → cp-1 (kubeadm upgrade apply) → cp-2/3 → kubelet on CP → workers (drain → upgrade → uncordon) → add-ons → CNI/CSI**. Pre-upgrade: scan for deprecated APIs (kubectl convert, Pluto). Rollback: limited — backup-restore is the safety net.'

