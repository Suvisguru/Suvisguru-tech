bar:
  - 'Tune four components: **kube-apiserver** (audit policy, EncryptionConfiguration, admission plugins, APF flow schemas), **kubelet** (cgroupDriver, systemReserved, kubeReserved, evictionHard, CPU/Memory/Topology Manager), **kube-scheduler** (profiles for bin-packing vs spreading; multiple schedulers like Volcano), **kube-proxy** (mode or replaced by Cilium). Plus **RuntimeClass** (Kata / gVisor) for sandboxing. All via kubeadm config, no flag soup.'

