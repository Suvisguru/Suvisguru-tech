bar:
  - 'Hardening posture: **CIS Kubernetes Benchmark** (kube-bench scores), **NSA/CISA K8s hardening guide**. Tactical layers: **API server** (anonymous-auth=false, audit, encryption-at-rest, admission), **RBAC least privilege** (no default-SA grants), **PSA** (restricted profile baseline), **NetworkPolicy** (default-deny), **supply chain** (cosign + SBOM + verifyImages), **runtime** (Falco / Tetragon), **certificate rotation** (cert-manager + auto-renewal), **break-glass admin** (time-bounded + audited).'

