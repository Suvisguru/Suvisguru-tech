bar:
  - '`kubeadm init` runs **10 phases** in order: preflight, certs, kubeconfig, control-plane (static pods), etcd, mark-cp, bootstrap-token, kubelet, addon (CoreDNS + kube-proxy), upload-certs. `kubeadm join` uses a bootstrap token + CA hash (or certificate key for control-plane join). For HA: **API server LB** (kube-vip / HAProxy / external) + 3+ CP nodes. Alternatives: kubespray, RKE2, k3s, Talos, Cluster API.'

