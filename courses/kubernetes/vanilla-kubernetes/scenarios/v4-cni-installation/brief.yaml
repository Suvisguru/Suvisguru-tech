bar:
  - 'Choose CNI by trade-off: **Cilium** (eBPF, fastest, observability via Hubble, kube-proxy replacement), **Calico** (BGP-native, mature, eBPF data plane optional), **Antrea / OVN-K** (OVS-based, SDN-friendly), **Flannel / kube-router** (simple, limited policy). The CNI''s Pod CIDR config **must match** kubeadm''s podSubnet. **MTU**: pod MTU = underlay MTU minus encap overhead.'

