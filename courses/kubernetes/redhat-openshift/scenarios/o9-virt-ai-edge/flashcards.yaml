# Flashcards — K-OCP O (count: 8)

cards:
  - id: 1
    front: |
      What is OpenShift Virtualization?
    back: |
      Productized KubeVirt — VMs as first-class CRs in OCP. VirtualMachine + VirtualMachineInstance + DataVolume + live migration + snapshot + hot-plug. VMs and containers in same cluster.

  - id: 2
    front: |
      Five core OCP Virtualization CRs?
    back: |
      **VirtualMachine (VM)** declarative spec, **VirtualMachineInstance (VMI)** running VM, **DataVolume** disk source, **VirtualMachineSnapshot/Restore** snapshots, **VirtualMachineInstanceMigration** live migration.

  - id: 3
    front: |
      What is MTV?
    back: |
      **Migration Toolkit for Virtualization**. Operator-based tool ingesting VMs from vSphere → KubeVirt VirtualMachines on OCP. Batches; preserves IPs; minimal downtime.

  - id: 4
    front: |
      What is OpenShift AI (formerly RHODS)?
    back: |
      Red Hat's ML platform on OCP. Notebooks (Jupyter), KServe model serving, Kubeflow Pipelines, distributed training (PyTorchJob/TFJob/MPIJob), RHEL AI integration.

  - id: 5
    front: |
      What does the NVIDIA GPU Operator do?
    back: |
      Manages NVIDIA driver + container runtime + device plugin lifecycle on GPU pools. MIG (Multi-Instance GPU) for slicing H100/H200. Required for advanced GPU features.

  - id: 6
    front: |
      What is RHEL AI?
    back: |
      Red Hat's curated inference platform: IBM Granite models + InstructLab for fine-tuning + RHEL base. Hosted on OCP via OpenShift AI. Enterprise-supported AI stack.

  - id: 7
    front: |
      What is SNO?
    back: |
      Single Node OpenShift — full OCP control plane + worker on one node. Same APIs as multi-node. For edge sites (cell, retail, factory). Single etcd; storage-backed resilience.

  - id: 8
    front: |
      What is MicroShift and how is it different from SNO?
    back: |
      **MicroShift** = sub-1GB-RAM variant for IoT / kiosks / embedded. Lighter API surface (Routes / OperatorHub absent). Restarts in seconds. **SNO** = full OCP on one node. MicroShift for ultra-edge; SNO for edge sites with more capacity.
