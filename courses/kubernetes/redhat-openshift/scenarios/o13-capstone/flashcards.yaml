# Flashcards — K-OCP O (count: 8)

cards:
  - id: 1
    front: |
      Four phases of the K-OCP capstone?
    back: |
      **Phase A** base (IPI + EUS + private + OVN-K). **Phase B** platform (ODF + SCCs + RHACS + Monitoring + Logging + Tracing). **Phase C** apps + Virt + DR (Pipelines + GitOps + Virtualization with MTV + OADP + disconnected). **Phase D** RHACM federation + defence + live drill.

  - id: 2
    front: |
      What does "defendable" mean for the reference foundry?
    back: |
      Every architectural choice can be justified by trade-offs the operator can articulate to a peer reviewer.

  - id: 3
    front: |
      Three Argo CD repos in the GitOps layout?
    back: |
      **cluster-config** (RootSync seed), **platform** (RHACS, Logging, Monitoring, ODF, MetalLB, etc.), **workloads** (per-tenant or per-team apps).

  - id: 4
    front: |
      Six chaos events in the live drill?
    back: |
      (1) Kill node — MCO + MachineSet replace. (2) Revoke RBAC binding — 403, Audit Log surfaces, fix. (3) CTD finding — RHACS triage + admission hardening. (4) DR restore — OADP into sibling cluster. (5) 10× inference burst — KServe scales + SLO maintained. (6) etcd quorum loss — documented restore procedure.

  - id: 5
    front: |
      Why include OCP Virtualization in the capstone?
    back: |
      Most enterprise migrations to OCP include legacy VM workloads. KubeVirt + MTV give a unified container + VM platform — VMs run alongside containers under one RBAC, observability, DR. Removes the "two control planes" problem.

  - id: 6
    front: |
      Why include RHACM in the capstone?
    back: |
      Enterprise OCP rarely lives in isolation — multi-cluster fleet (regions, environments, tenants) needs unified policy + apps + observability. RHACM is the multi-cluster governance plane; assemble alternative (per-cluster Argo CD + OPA + custom telemetry aggregation) is too much for the value.

  - id: 7
    front: |
      What makes the upgrade runbook safe?
    back: |
      EUS channel + planned maintenance + MachineConfigPool roll discipline + tunable max-surge + PDB-tested workloads + blue-green node-pool fallback for high-stakes + disconnected mirror procedure for air-gapped.

  - id: 8
    front: |
      What does "K-OCP-complete" mean as a deliverable?
    back: |
      install configs (openshift-install or Bicep/Terraform) + per-cluster architecture Markdown + DR runbook + AI/Virt runbook + must-gather pack + live-drill recording. A successor operator can read the docs, run the runbooks, and operate the cluster without you.
