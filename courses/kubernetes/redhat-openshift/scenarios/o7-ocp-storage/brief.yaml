section_5_real_world:
  count: 4
  examples:
    - 'On-prem bank cluster: ODF with 4 storage nodes + 8TB local NVMe each.'
    - 'Each cell site = 1 SNO.'
    - 'AWS-installed OCP.'
    - 'Bank schedules nightly OADP backups: cluster-wide manifests + PV snapshots; cross-region replicated to S3 in DR region.'

