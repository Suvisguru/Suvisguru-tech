section_5_real_world:
  count: 4
  examples:
    - 'A SaaS prod cluster: Regular channel, maintenance window Tuesdays 02-06 UTC, exclusion *no minor upgrades* Nov 20 - Dec 1 (security patches still apply).'
    - 'A bank''s payment cluster: Stable channel for slow predictable cadence, plus 6-week exclusion windows aligned with their change-control cycle.'
    - 'An ISV runs two GKE clusters per region.'
    - 'A team''s Pub/Sub upgrade notification fired with target version v1.'

