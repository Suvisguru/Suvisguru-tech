# Flashcards — Lesson 02, Virtualization vs Containerization
# Total: 8 cards.

cards:
  - id: 1
    front: "What is a virtual machine?"
    back: "A complete simulated computer running inside a real one. It has its own OS, its own kernel, its own simulated hardware. Created by a hypervisor."

  - id: 2
    front: "What is a container?"
    back: "A lightweight isolated process that shares the host's operating system. Packages the app + its files but no OS. Created by a container runtime."

  - id: 3
    front: "What's a hypervisor?"
    back: "The software that creates and manages virtual machines. Examples: VMware ESXi, Microsoft Hyper-V, KVM, Xen. Sits between the hardware and the VMs."

  - id: 4
    front: "What's a container runtime?"
    back: "The software that creates and manages containers. Examples: containerd, CRI-O, runc. Sits on top of the host OS and uses kernel features to isolate containers."

  - id: 5
    front: "Biggest size difference?"
    back: "A VM image is typically 5-20 GB (because it includes a full OS). A container image is typically 10-500 MB (because it includes only the app and its files)."

  - id: 6
    front: "Why do containers start so much faster?"
    back: "Because there's no OS to boot. Starting a container is starting a process on an already-running OS — milliseconds. Starting a VM means booting an OS — minutes."

  - id: 7
    front: "VMs vs containers — isolation strength?"
    back: "VMs give stronger isolation: each VM has its own kernel. Containers share the host kernel — lighter, but a kernel bug affects every container on the host."

  - id: 8
    front: "Are VMs and containers competitors?"
    back: "Mostly complementary. In the cloud, your Kubernetes nodes are usually VMs (provided by the cloud), and Kubernetes runs containers on top of them. Both are used together."
