bar:
  - 'Gateway API splits Ingress into three roles: **GatewayClass** (cluster recipe — infra team), **Gateway** (listener bank — platform team), **HTTPRoute / GRPCRoute / TCPRoute / TLSRoute** (traffic clips — app teams). The same logical setup as Ingress, but with cleaner ownership boundaries and far more expressiveness. Ingress NGINX is sunsetting in 2026 — start the migration now.'

