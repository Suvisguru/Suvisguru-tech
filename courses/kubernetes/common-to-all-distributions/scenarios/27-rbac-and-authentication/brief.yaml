bar:
  - 'Two checks: **authentication** (who are you?) and **authorisation** (RBAC: verb on resource for subject). Authentication is plug-in: OIDC for humans, ServiceAccount tokens for Pods, certs/webhooks for special cases. RBAC has four objects: **Role** + **RoleBinding** (namespace-scoped), **ClusterRole** + **ClusterRoleBinding** (cluster-wide). First match wins; if no rule allows, the request is denied.'

