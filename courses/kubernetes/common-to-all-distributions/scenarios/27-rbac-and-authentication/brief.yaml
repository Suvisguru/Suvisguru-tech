    - 'Every developer authenticates via OIDC.'
    - 'Every PR touching a `RoleBinding` or `ClusterRoleBinding` runs `rbac-tool` + `kubectl auth can-i --list` diff.'
    - 'Webhook authenticator integrates with AWS IAM; `eks-iam-authenticator` validates an AWS-signed token and returns an identity.'

