bar:
  - 'A CRD has a name, group, versions, scope, and (per version) an OpenAPI v3 schema. Add **CEL validation** via `x-kubernetes-validations`. To evolve schemas safely, define multiple `versions` with one as `storage` + a **conversion webhook** that translates between them on read/write. **Status subresource** separates user spec from controller writes; **scale subresource** enables HPA on custom kinds.'

