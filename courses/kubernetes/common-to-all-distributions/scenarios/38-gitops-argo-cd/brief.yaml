bar:
  - 'Argo CD is a controller that watches a git repo + reconciles the cluster to match. Define an **Application** CRD pointing at a git path; Argo CD syncs (auto or manual). Drift detection is built in — if someone `kubectl edit`s a managed resource, Argo CD shows it as *OutOfSync*. Pair with **Argo CD Image Updater** for image-bump automation; **App-of-Apps** for managing many Apps at scale.'

