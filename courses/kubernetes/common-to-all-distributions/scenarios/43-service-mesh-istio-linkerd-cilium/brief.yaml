bar:
  - 'Three meshes worth knowing in 2026: **Istio Ambient** (node-level + waypoint proxies; supersedes the original sidecar architecture), **Linkerd** (purpose-built for K8s; smallest + fastest), **Cilium Service Mesh** (eBPF-native; integrates with the CNI). All provide: mTLS by default, observability (golden signals + traces), traffic shaping (canary, retries, timeouts), policy. **Sidecar vs ambient:** the trend is decisively away from per-Pod sidecars.'

