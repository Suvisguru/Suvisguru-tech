bar:
  - 'An **operator** = CRD + controller. Use **Kubebuilder** to scaffold a Go project (or **Operator SDK** for Helm/Ansible-based operators). The controller logic lives in a **Reconciler**: "given the CR''s desired state, make the cluster match." controller-runtime handles watches, caching, queueing, leader election. Distribute via Helm chart or OLM (OperatorHub).'

