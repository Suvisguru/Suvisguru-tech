<?xml version="1.0" encoding="UTF-8"?>
<!--
  Static diagram — Lesson 01: Cloud-Native and Kubernetes Foundations
  Domain: kubernetes / common-to-all-distributions

  Layout:
   - Title strip (top)
   - Big central reconciliation-loop schematic (the lesson's spine)
   - Five subtopic stations laid out horizontally below the loop
   - One-line tagline per station
   - Color coding matches the preview-page subtopic header palette:
       s1 #3F4A5E (slate)   — cloud-native principles
       s2 #5E4A8E (purple)  — twelve-factor + microservices
       s3 #2E7A8C (teal)    — when K8s fits
       s4 #1F8A60 (green)   — GitOps / platform / SRE
       s5 #B85829 (warn)    — history / CNCF / KEPs / feature gates
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3F4A5E"/>
    </marker>
    <marker id="arr-d-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F8A60"/>
    </marker>
  </defs>

  <!-- Title strip -->
  <text x="600" y="34" font-family="sans-serif" font-size="20" font-weight="500"
        fill="#1F2937" text-anchor="middle" letter-spacing="-0.5">
    Cloud-Native and Kubernetes Foundations
  </text>
  <text x="600" y="56" font-family="sans-serif" font-size="13"
        fill="#5A6B81" text-anchor="middle">
    Lesson 01 · Module 1 of K-COM · Common to all Kubernetes distributions
  </text>

  <!-- ======================= Reconciliation loop spine ======================= -->
  <text x="600" y="90" font-family="sans-serif" font-size="13" font-weight="500"
        fill="#3F4A5E" text-anchor="middle" letter-spacing="1.5">
    THE SPINE OF THE LESSON · THE RECONCILIATION LOOP
  </text>

  <!-- Loop frame -->
  <rect x="120" y="106" width="960" height="240" rx="14"
        fill="#FAFBFC" stroke="#3F4A5E" stroke-width="1.6" stroke-dasharray="0"/>

  <!-- Desired state card (left) -->
  <g transform="translate(150,138)">
    <rect width="240" height="180" rx="10" fill="#FFFFFF" stroke="#3F4A5E" stroke-width="1.4"/>
    <rect width="240" height="30" rx="10 10 0 0" fill="#3F4A5E"/>
    <text x="120" y="20" font-family="sans-serif" font-size="13" font-weight="500"
          fill="#FFFFFF" text-anchor="middle">desired state · written</text>
    <g transform="translate(16,46)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#3A3A3A">
      <text y="14">apiVersion: apps/v1</text>
      <text y="30">kind: Deployment</text>
      <text y="46">spec:</text>
      <text x="14" y="62">replicas: 3</text>
      <text x="14" y="78">selector:</text>
      <text x="28" y="94">matchLabels:</text>
      <text x="42" y="110">app: web</text>
      <text x="14" y="126">template: …</text>
    </g>
  </g>

  <!-- Controller (center) -->
  <g transform="translate(540,176)">
    <!-- Spinning arrows ring -->
    <g>
      <path d="M 60 8 A 52 52 0 0 1 107 41 L 99 45 A 44 44 0 0 0 60 16 Z" fill="#5E6E89"/>
      <path d="M 107 79 A 52 52 0 0 1 60 112 L 60 104 A 44 44 0 0 0 99 75 Z" fill="#5E6E89"/>
      <path d="M 13 79 A 52 52 0 0 1 13 41 L 21 45 A 44 44 0 0 0 21 75 Z" fill="#5E6E89"/>
    </g>
    <!-- Disc -->
    <circle cx="60" cy="60" r="36" fill="#3F4A5E" stroke="#1F2433" stroke-width="1.4"/>
    <text x="60" y="56" font-family="sans-serif" font-size="11" font-weight="500"
          fill="#E8E8E0" text-anchor="middle" letter-spacing="1">CONTROLLER</text>
    <text x="60" y="72" font-family="sans-serif" font-size="9"
          fill="#A8B0C0" text-anchor="middle">deployment-ctrl</text>
    <text x="60" y="138" font-family="sans-serif" font-size="11"
          fill="#3F4A5E" text-anchor="middle" font-style="italic">observe → diff → act → repeat</text>
  </g>

  <!-- Actual state cluster (right) -->
  <g transform="translate(810,138)">
    <rect width="240" height="180" rx="10" fill="#FFFFFF" stroke="#1F8A60" stroke-width="1.4"/>
    <rect width="240" height="30" rx="10 10 0 0" fill="#1F8A60"/>
    <text x="120" y="20" font-family="sans-serif" font-size="13" font-weight="500"
          fill="#FFFFFF" text-anchor="middle">actual state · live cluster</text>
    <!-- Three pod tiles -->
    <g transform="translate(14,42)">
      <rect width="65" height="50" rx="4" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1"/>
      <rect width="65" height="14" rx="4 4 0 0" fill="#3F4A5E"/>
      <text x="6" y="11" font-family="sans-serif" font-size="9" fill="#FFFFFF">web-7f...</text>
      <rect x="6" y="20" width="14" height="14" rx="2" fill="#3F4A5E"/>
      <text x="13" y="30" font-family="sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">C</text>
      <text x="22" y="32" font-family="sans-serif" font-size="9" fill="#3A3A3A">web</text>
      <circle cx="58" cy="7" r="2.4" fill="#5DCAA5"/>
    </g>
    <g transform="translate(86,42)">
      <rect width="65" height="50" rx="4" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1"/>
      <rect width="65" height="14" rx="4 4 0 0" fill="#3F4A5E"/>
      <text x="6" y="11" font-family="sans-serif" font-size="9" fill="#FFFFFF">web-7f...</text>
      <rect x="6" y="20" width="14" height="14" rx="2" fill="#3F4A5E"/>
      <text x="13" y="30" font-family="sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">C</text>
      <text x="22" y="32" font-family="sans-serif" font-size="9" fill="#3A3A3A">web</text>
      <circle cx="58" cy="7" r="2.4" fill="#5DCAA5"/>
    </g>
    <g transform="translate(158,42)">
      <rect width="65" height="50" rx="4" fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1"/>
      <rect width="65" height="14" rx="4 4 0 0" fill="#3F4A5E"/>
      <text x="6" y="11" font-family="sans-serif" font-size="9" fill="#FFFFFF">web-7f...</text>
      <rect x="6" y="20" width="14" height="14" rx="2" fill="#3F4A5E"/>
      <text x="13" y="30" font-family="sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">C</text>
      <text x="22" y="32" font-family="sans-serif" font-size="9" fill="#3A3A3A">web</text>
      <circle cx="58" cy="7" r="2.4" fill="#5DCAA5"/>
    </g>
    <text x="120" y="118" font-family="sans-serif" font-size="11" fill="#1F8A60" text-anchor="middle" font-weight="500">3 / 3 replicas Running</text>
    <text x="120" y="138" font-family="sans-serif" font-size="10" fill="#5A6B81" text-anchor="middle">node-a · node-b · node-c</text>
    <text x="120" y="158" font-family="sans-serif" font-size="9" fill="#9D9D9D" text-anchor="middle" font-style="italic">reported by kubelets</text>
  </g>

  <!-- Loop arrows -->
  <!-- desired → controller -->
  <path d="M 390 226 L 540 230" stroke="#3F4A5E" stroke-width="2.4" fill="none" marker-end="url(#arr-d)"/>
  <text x="465" y="218" font-family="sans-serif" font-size="11" fill="#3F4A5E" text-anchor="middle">read desired</text>
  <!-- actual → controller (returning, lower) -->
  <path d="M 810 246 L 660 246" stroke="#1F8A60" stroke-width="2.4" fill="none" marker-end="url(#arr-d-green)"/>
  <text x="735" y="262" font-family="sans-serif" font-size="11" fill="#1F8A60" text-anchor="middle">observe actual</text>
  <!-- controller → cluster action (up and over) -->
  <path d="M 600 176 C 600 130, 880 130, 930 132" stroke="#1F8A60" stroke-width="2.4" fill="none" marker-end="url(#arr-d-green)"/>
  <text x="765" y="118" font-family="sans-serif" font-size="11" fill="#1F8A60" text-anchor="middle" font-style="italic">act · create / delete pods to close the gap</text>

  <!-- ======================= Five subtopic stations ======================= -->
  <text x="600" y="394" font-family="sans-serif" font-size="13" font-weight="500"
        fill="#3F4A5E" text-anchor="middle" letter-spacing="1.5">
    FIVE STATIONS · ONE PER SUBTOPIC
  </text>

  <!-- Horizontal flow arrow -->
  <path d="M 80 444 L 1120 444" stroke="#D5DCE6" stroke-width="3" fill="none"/>
  <path d="M 1120 444 L 1108 438 L 1108 450 Z" fill="#D5DCE6"/>

  <!-- Stations -->
  <!-- Station 1 -->
  <g transform="translate(40,420)">
    <circle cx="56" cy="24" r="22" fill="#3F4A5E"/>
    <text x="56" y="29" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
    <rect x="0" y="60" width="200" height="158" rx="10" fill="#FFFFFF" stroke="#3F4A5E" stroke-width="1.4"/>
    <text x="100" y="82" font-family="sans-serif" font-size="13" font-weight="500" fill="#3F4A5E" text-anchor="middle">Cloud-native principles</text>
    <text x="100" y="104" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">Reconciliation · desired</text>
    <text x="100" y="120" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">vs actual · pets vs cattle</text>
    <text x="100" y="146" font-family="sans-serif" font-size="20" text-anchor="middle">🔁</text>
    <text x="100" y="180" font-family="sans-serif" font-size="10" fill="#9D9D9D" text-anchor="middle" font-style="italic">"the spine"</text>
    <text x="100" y="200" font-family="sans-serif" font-size="9" fill="#9D9D9D" text-anchor="middle">analogy: thermostat</text>
  </g>

  <!-- Station 2 -->
  <g transform="translate(280,420)">
    <circle cx="56" cy="24" r="22" fill="#5E4A8E"/>
    <text x="56" y="29" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
    <rect x="0" y="60" width="200" height="158" rx="10" fill="#FFFFFF" stroke="#5E4A8E" stroke-width="1.4"/>
    <text x="100" y="82" font-family="sans-serif" font-size="13" font-weight="500" fill="#5E4A8E" text-anchor="middle">12-factor &amp; services</text>
    <text x="100" y="104" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">12 rules · microservices</text>
    <text x="100" y="120" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">vs modular monoliths</text>
    <text x="100" y="146" font-family="sans-serif" font-size="20" text-anchor="middle">📦</text>
    <text x="100" y="180" font-family="sans-serif" font-size="10" fill="#9D9D9D" text-anchor="middle" font-style="italic">"runs anywhere"</text>
    <text x="100" y="200" font-family="sans-serif" font-size="9" fill="#9D9D9D" text-anchor="middle">analogy: shipping containers</text>
  </g>

  <!-- Station 3 -->
  <g transform="translate(520,420)">
    <circle cx="56" cy="24" r="22" fill="#2E7A8C"/>
    <text x="56" y="29" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
    <rect x="0" y="60" width="200" height="158" rx="10" fill="#FFFFFF" stroke="#2E7A8C" stroke-width="1.4"/>
    <text x="100" y="82" font-family="sans-serif" font-size="13" font-weight="500" fill="#2E7A8C" text-anchor="middle">When K8s fits</text>
    <text x="100" y="104" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">When useful</text>
    <text x="100" y="120" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">When overkill</text>
    <text x="100" y="146" font-family="sans-serif" font-size="20" text-anchor="middle">🍳</text>
    <text x="100" y="180" font-family="sans-serif" font-size="10" fill="#9D9D9D" text-anchor="middle" font-style="italic">"right tool?"</text>
    <text x="100" y="200" font-family="sans-serif" font-size="9" fill="#9D9D9D" text-anchor="middle">analogy: industrial kitchen</text>
  </g>

  <!-- Station 4 -->
  <g transform="translate(760,420)">
    <circle cx="56" cy="24" r="22" fill="#1F8A60"/>
    <text x="56" y="29" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
    <rect x="0" y="60" width="200" height="158" rx="10" fill="#FFFFFF" stroke="#1F8A60" stroke-width="1.4"/>
    <text x="100" y="82" font-family="sans-serif" font-size="13" font-weight="500" fill="#1F8A60" text-anchor="middle">Operating model</text>
    <text x="100" y="104" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">GitOps · platform eng</text>
    <text x="100" y="120" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">SRE · multi-tenancy</text>
    <text x="100" y="146" font-family="sans-serif" font-size="20" text-anchor="middle">📚</text>
    <text x="100" y="180" font-family="sans-serif" font-size="10" fill="#9D9D9D" text-anchor="middle" font-style="italic">"how to run it"</text>
    <text x="100" y="200" font-family="sans-serif" font-size="9" fill="#9D9D9D" text-anchor="middle">analogy: library catalog</text>
  </g>

  <!-- Station 5 -->
  <g transform="translate(1000,420)">
    <circle cx="56" cy="24" r="22" fill="#B85829"/>
    <text x="56" y="29" font-family="sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
    <rect x="0" y="60" width="200" height="158" rx="10" fill="#FFFFFF" stroke="#B85829" stroke-width="1.4"/>
    <text x="100" y="82" font-family="sans-serif" font-size="13" font-weight="500" fill="#B85829" text-anchor="middle">Origins &amp; releases</text>
    <text x="100" y="104" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">Borg→Omega→K8s · CNCF</text>
    <text x="100" y="120" font-family="sans-serif" font-size="11" fill="#5A6B81" text-anchor="middle">KEPs · feature gates</text>
    <text x="100" y="146" font-family="sans-serif" font-size="20" text-anchor="middle">🚆</text>
    <text x="100" y="180" font-family="sans-serif" font-size="10" fill="#9D9D9D" text-anchor="middle" font-style="italic">"how it ships"</text>
    <text x="100" y="200" font-family="sans-serif" font-size="9" fill="#9D9D9D" text-anchor="middle">analogy: train-line testing</text>
  </g>

  <!-- ======================= Bottom synthesis bar ======================= -->
  <rect x="120" y="660" width="960" height="44" rx="8" fill="#FAFAF6" stroke="#3F4A5E" stroke-width="1.2"/>
  <text x="600" y="688" font-family="sans-serif" font-size="13" fill="#3F4A5E" text-anchor="middle">
    <tspan font-weight="500">Hold onto this:</tspan> the reconciliation loop is the spine. Every later lesson layers a new resource onto it.
  </text>
</svg>
