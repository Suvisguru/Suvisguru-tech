# Quiz — Lesson 01, How Kubernetes fixes things on its own
# Total: 3 questions (single-concept lesson)
# Style: pause-the-thermostat prompts (the hero widget is the animation).

questions:
  - id: 1
    pause_widget: "thermostat"
    prompt: |
      You set the dial to 23°. The room is at 18°. The furnace is firing.
      What does the thermostat do when the room reaches 23°?
    answer: |
      It stops the furnace. The gap is closed. But it doesn't walk away —
      it keeps reading the thermometer. As soon as the room drops below 23°
      again, it'll fire the furnace right back up. The loop never ends.

  - id: 2
    pause_widget: "thermostat"
    prompt: |
      You walk over and open a window in the room. The dial is still at 23°.
      What happens, and what does this teach about Kubernetes?
    answer: |
      The room cools down. The thermostat sees the gap and fires the furnace,
      again and again, fighting the open window. In Kubernetes terms: a
      "node failed" or "a pod got killed by hand" is the same as opening a
      window — the controller will keep trying to close the gap.
      Self-healing, automatically.

  - id: 3
    pause_widget: null
    prompt: |
      Why is it described as "the thermostat is the entire idea behind
      Kubernetes"?
    answer: |
      Because every other Kubernetes thing — pods, deployments, services,
      jobs, autoscalers, even custom operators you might write — is just
      another tiny thermostat watching a different number. Once you can
      see that pattern, the rest of Kubernetes is variations on the same idea.
