# Quiz — Lesson 03, Cloud-Native Principles
# Total: 3 questions.

questions:
  - id: 1
    pause_animation: true
    prompt: |
      In the heater animation, the desired is 22° and actual is 19°. The
      controller fires the heater, the room warms to 22°, and… then what?
    answer: |
      The controller doesn't stop. It keeps reading the room temperature
      forever. When the room cools again (someone opens a window, the
      weather changes), the gap reopens and the controller fires the
      heater again. That's the entire loop — it never finishes, it just
      sleeps when the gap is zero.

  - id: 2
    prompt: |
      A teammate writes a 200-line bash script that "deploys our app." It
      has lots of "if this fails, do that" branches. How would you reframe
      this in cloud-native terms?
    answer: |
      Replace the script with a declarative YAML file that describes the
      goal ("3 copies of web:v2 running, healthy, exposed on port 80").
      Hand it to Kubernetes. The "if this fails, do that" logic becomes
      the controller's job — and the controller is way better at it than
      the script, because it never stops watching and never gets confused
      about what state things are in.

  - id: 3
    prompt: "Why is 'treat servers as cattle' a reliability strategy, not just a fashion statement?"
    answer: |
      Because if every server is hand-tuned (a "pet"), losing one means
      losing knowledge. Documentation is always incomplete. Recovery
      means a human reverse-engineering what made that server special.
      If servers are interchangeable cattle described declaratively,
      losing one is a non-event — the controller starts another from
      the same spec. Reliability scales because nothing depends on a
      specific machine surviving.
