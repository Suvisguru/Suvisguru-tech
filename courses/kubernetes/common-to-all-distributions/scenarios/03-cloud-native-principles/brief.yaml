# Intake brief — Lesson 03, K-COM
# Topic: Cloud-Native Principles
# Format: Standard 7-section PROJECT.md structure (mirrors approved Lessons 01-02).

lesson:
  title: "Cloud-Native Principles"
  slug: "03-cloud-native-principles"
  domain: "kubernetes"
  course_slug: "common-to-all-distributions"
  position: 3
  granularity: "concept"
  brief_drafted_on: "2026-05-02"
  central_metaphor: "thermostat (the reconciliation loop)"

learner_profile:
  prerequisites:
    - "Lesson 01: What is Kubernetes?"
    - "Lesson 02: Virtualization vs Containerization"
  assumed_zero_knowledge_of:
    - "Reconciliation loops, controllers."
    - "Declarative vs imperative configuration."
    - "Desired vs actual state."
    - "Pets vs cattle, immutable infrastructure, horizontal scaling, failure as normal."

learning_outcomes:
  - "Learner can explain the reconciliation loop in plain terms (thermostat metaphor)."
  - "Learner can name the difference between declarative and imperative configuration."
  - "Learner can explain why pets vs cattle is a reliability strategy."
  - "Learner understands all 7 cloud-native principles fit under one big idea: the loop."

structure_per_project_md:
  section_1_concept:
    illustration: "The reconciliation loop diagram: desired state (left) → controller (middle, thermostat icon) → actual state (right). Arrows showing the loop never stops."
    word_target: 240
  section_2_before_after:
    illustration: "Side-by-side: long imperative bash script (left) vs short declarative YAML (right). Both achieve same goal."
    word_target_each_side: 80
  section_3_analogy:
    primary: "The thermostat in your house"
    illustration: "Drawn thermostat with dial set to 22°C connected to a house with a thermometer reading 19°C; arrows showing the loop"
  section_4_eli_pair:
    eli5: "Thermostat with the dial. Under 100 words."
    eli10: "Declarative spec + controller + reconciliation loop = self-healing. 150-250 words."
  section_5_real_world:
    count: 4
    examples:
      - "Black Friday e-commerce: HPA scales pods 3 → 40 automatically"
      - "3 AM cloud machine failure: pods auto-reschedule, on-call sleeps through it"
      - "Bad deployment rolling out: controller stops, rolls back, no outage"
      - "Engineer manually edits ConfigMap: GitOps controller reverts to source of truth"
  section_6_animated_svg:
    modes: ["Thermostat fires heater", "Pod self-heals", "Scale up to 5"]
    description: "Each mode shows desired/controller/actual. Mode 1: thermostat warms a cold room. Mode 2: pod dies, controller creates replacement. Mode 3: replicas changed from 2 to 5, controller starts 3 new pods."
  section_7_flashcards_quiz:
    flashcards: 8
    quiz_questions: 3

shared_artifacts:
  preview_page: { file: "/preview-kubernetes-lesson-03.html" }
  lesson_md: { file: "lesson.md" }
  flashcards: { file: "flashcards.yaml", count: 8 }
  quiz: { file: "quiz.yaml", count: 3 }

bar:
  - "First-timer can explain the thermostat = Kubernetes mapping."
  - "First-timer understands declarative vs imperative without jargon."
  - "First-timer sees self-healing in action via the animation."

fact_check_anchors:
  - "kubernetes.io/docs/concepts/architecture/controller/"
  - "kubernetes.io/docs/concepts/overview/components/"
