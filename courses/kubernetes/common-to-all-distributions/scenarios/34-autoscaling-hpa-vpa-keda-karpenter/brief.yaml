bar:
  - '**Workload scaling**: HPA (CPU/memory/custom metrics), VPA (right-size requests), KEDA (event-based — queue depth, Kafka lag, etc.). **Cluster scaling**: Cluster Autoscaler (legacy, node-group based) or **Karpenter** (modern, fast, picks instance type per Pending Pod). Combine for end-to-end scaling.'

