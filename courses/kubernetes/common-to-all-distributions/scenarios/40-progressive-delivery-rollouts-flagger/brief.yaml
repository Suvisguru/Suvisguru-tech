bar:
  - '**Argo Rollouts** + **Flagger** are the two main K8s progressive-delivery controllers. They replace Deployment with a CRD that knows how to *shift traffic gradually* (10% → 25% → 100%) using a service mesh, Ingress, or Gateway API. They run *automated analysis* (Prometheus metrics, custom queries) at each step; promote on success, abort + rollback on failure. **Argo Rollouts** is K8s-native + integrates with Argo CD; **Flagger** is mesh-native + integrates with Flux + many meshes.'

