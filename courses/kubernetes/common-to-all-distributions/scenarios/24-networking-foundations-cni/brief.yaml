bar:
  - 'Every Pod gets a Linux `veth` pair pulled into a node bridge. The **CNI plugin** creates the veth, assigns the IP, and connects nodes (encapsulation or native routing). Modern CNIs (**Cilium**) use **eBPF** instead of iptables — much faster and more observable. The most common production bug: **MTU mismatch**.'

