bar:
  - '**Traces** answer "where did time go in this request?" Implement with OTel SDKs; store in **Tempo / Jaeger**. **eBPF** tools (Hubble, Pixie, Tetragon) get kernel-level visibility without app changes. **SLOs** are explicit reliability targets (e.g., "99.9% of requests under 200ms over 30 days"); the gap between target and reality is your *error budget*. Alerts page when the budget burns fast.'

