bar:
  - 'Three artefacts plus signing: **SBOM** (Software Bill of Materials — what''s in the image), **SLSA provenance** (how the image was built, attested), **Cosign signature** (the artefact is authentic). All stored alongside the image in the OCI registry. Admission verifies the chain via `cosign verify` or Kyverno `verifyImages`.'

