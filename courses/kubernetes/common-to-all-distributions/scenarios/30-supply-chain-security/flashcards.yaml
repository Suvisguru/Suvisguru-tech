# Flashcards — Lesson 30
# Total: 8 cards.

cards:
  - id: 1
    front: |
      Three artefacts in modern supply-chain security?
    back: |
      Image (the thing). SBOM (what's in it). Provenance attestation (how it was built). All three signed and stored as OCI attestations alongside the image.

  - id: 2
    front: |
      What is Cosign?
    back: |
      Sigstore CLI for signing/verifying container images and blobs. Supports both keyed and keyless signing.

  - id: 3
    front: |
      What is keyless signing?
    back: |
      Sign with a short-lived (10 min) cert from Fulcio tied to an OIDC identity. No key file to rotate. Trust root is the OIDC identity.

  - id: 4
    front: |
      What is Rekor?
    back: |
      Sigstore's tamper-evident transparency log. Every signing event recorded; append-only. Provides cryptographic proof a signature existed at a given time.

  - id: 5
    front: |
      What does SLSA stand for?
    back: |
      Supply-chain Levels for Software Artifacts. OpenSSF standard. Levels 0-4 grade the maturity of the build process.

  - id: 6
    front: |
      SLSA L3 requirements?
    back: |
      Build runs on isolated, ephemeral runner. Provenance generated by the build platform (not user code). Provenance is signed. Source platform is trusted.

  - id: 7
    front: |
      SPDX vs CycloneDX?
    back: |
      Two SBOM formats. SPDX = Linux Foundation; widely used in license compliance. CycloneDX = OWASP; more common for security. Both are JSON; tools (Syft, Trivy) support both.

  - id: 8
    front: |
      What is Syft?
    back: |
      Anchore's SBOM generator. Inspects images and produces SPDX or CycloneDX SBOMs. Often paired with Grype for vulnerability scanning.
