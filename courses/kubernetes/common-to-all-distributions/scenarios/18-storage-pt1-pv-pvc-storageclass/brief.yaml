# Intake brief — Lesson 18, K-COM
# Topic: Storage Part 1 · PV, PVC, StorageClass
# Module 9 · Storage · Lesson 1 of 2

lesson:
  title: 'Storage Part 1 · PV, PVC, StorageClass'
  slug: '18-storage-pt1-pv-pvc-storageclass'
  domain: 'kubernetes'
  course_slug: 'common-to-all-distributions'
  position: 18
  granularity: 'concept'
  brief_drafted_on: '2026-05-03'
  central_metaphor: 'Customs Warehouse — locker rental front desk. The PVC is the rental form (your request). The PV is the assigned locker (the actual disk). The StorageClass is the warehouse policy book (how new lockers are made + what happens at checkout). The clerk reading the form is the provisioner / CSI driver.'
  module: 'Module 9 · Storage · Lesson 1 of 2'

learner_profile:
  prerequisites:
    - 'Lessons 1-17 of K-COM (cumulative).'
  assumed_zero_knowledge_of: []

learning_outcomes:
  - 'Explain why Pod storage is ephemeral by default.'
  - 'Write a PVC referencing a StorageClass; bind it to a PV.'
  - 'Pick the right access mode for a workload (RWO / ROX / RWX / RWOP).'
  - 'Pick the right reclaim policy (Delete vs Retain).'
  - 'Use WaitForFirstConsumer in any multi-zone cluster.'

sections:
  - 'See lesson.md for full section list.'

section_5_real_world:
  count: 4
  examples:
    - 'Single primary, two read replicas, all on EKS.'
    - 'Five Fluentd Pods need to write into the same staging directory before forwarding to a SIEM.'
    - 'Training Pods need read access to a 4 TB dataset of pre-processed images.'
    - 'Legacy app wrote to /var/lib/myapp/sessions on the host.'

