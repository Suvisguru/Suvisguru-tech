bar:
  - '`ConfigMap` for non-sensitive values; `Secret` for credentials. By default Secrets are stored in **etcd as plaintext** (base64 ≠ encryption) — wire up a **KMS provider** for encryption-at-rest. For credentials managed outside the cluster (Vault, AWS SM, GCP SM), use the **External Secrets Operator** to sync them in.'

