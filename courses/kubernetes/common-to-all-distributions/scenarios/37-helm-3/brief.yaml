bar:
  - 'A Helm **chart** = templates + values schema + Chart.yaml. `helm install` renders the templates with values, applies to the cluster, records a **release** in a Secret. `helm upgrade` applies a new chart version + values diff. Charts are distributed via **OCI registries** (same as images). Sign + verify charts with **cosign**. The dominant pattern: Kustomize for your own apps; Helm for vendor software.'

