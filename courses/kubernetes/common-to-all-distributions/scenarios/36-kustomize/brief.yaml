bar:
  - '**Kustomize** takes plain Kubernetes YAML files in a `base/` + `overlays/{env}/` structure and produces final manifests via **declarative patches**. Built into `kubectl` as `kubectl apply -k`. *No templates, no string interpolation*. The base is real YAML; overlays are real YAML; the result is real YAML.'

