section_5_real_world:
  count: 4
  examples:
    - 'One base/ per microservice, three overlays/ for dev/staging/prod.'
    - 'A `compliance/` Component adds: PSA-restricted label, NetworkPolicy default-deny, ResourceQuota, audit annotations.'
    - '`helm template` renders the vendor chart (Ingress NGINX); the rendered output goes through Kustomize to add namespace + labels + monitoring sidecars.'
    - 'Started with 3 environments × 14 services = 42 nearly-identical YAML files.'

