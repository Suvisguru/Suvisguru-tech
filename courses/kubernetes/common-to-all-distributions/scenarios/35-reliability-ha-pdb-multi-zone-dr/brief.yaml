bar:
  - 'Three layers: **PodDisruptionBudget (PDB)** caps voluntary disruptions (drains, autoscaler, upgrades). **Topology spread + zone-aware autoscaling** survives zone failures. **Regional DR** (multi-region GitOps + DNS-level failover, or active-active mesh) survives a region. Most outages are voluntary — get the PDB right, you avoid most of them.'

