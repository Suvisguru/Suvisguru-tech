# Intake brief — Lesson 04, K-COM
# Topic: Twelve-Factor Apps + Microservices vs Modular Monoliths
# Format: Standard 7-section PROJECT.md structure (mirrors approved Lessons 01-03).

lesson:
  title: "Twelve-Factor Apps + Microservices vs Modular Monoliths"
  slug: "04-twelve-factor-and-microservices"
  domain: "kubernetes"
  course_slug: "common-to-all-distributions"
  position: 4
  granularity: "concept"
  brief_drafted_on: "2026-05-02"
  central_metaphors:
    - "12-factor = standard shipping container"
    - "Monolith vs microservices = single restaurant vs food court"

learner_profile:
  prerequisites:
    - "Lesson 01: What is Kubernetes?"
    - "Lesson 02: Virtualization vs Containerization"
    - "Lesson 03: Cloud-native principles"
  assumed_zero_knowledge_of:
    - "The 12-factor methodology and its rules."
    - "Monolith, modular monolith, microservices."
    - "Distributed-systems tax."
    - "Bounded context, stateless processes, backing services."

learning_outcomes:
  - "Learner can describe what makes an app 12-factor and why it matters in Kubernetes."
  - "Learner can name the trade-offs between monolith, modular monolith, and microservices."
  - "Learner can recommend a starting architecture for a small team."
  - "Learner understands that microservices are an answer to organizational scale, not a starting architecture."

structure_per_project_md:
  section_1_concept:
    illustration: "Hero: same shipping container being moved by truck, ship, and train (showing 12-factor portability)"
    word_target: 240
  section_1_5_factors_grid:
    illustration: "Compact 12-tile reference grid — one tile per factor with name + 1-line description"
    description: "Quick scannable reference of all 12 factors, no need to memorize"
  section_1_7_split:
    illustration: "Three side-by-side cards: monolith (one big box with features), modular monolith (one box with internal divisions), microservices (six small connected boxes)"
    description: "Three answers to 'how big should each app be?' with trade-offs"
  section_2_before_after:
    illustration: "Custom fragile crate (pre-12-factor) vs standard ISO container (12-factor)"
    word_target_each_side: 90
  section_3_analogy:
    primary: "Standard shipping container + restaurant vs food court"
    illustration: "Two mappings explained in prose — see Section 3 mapping list"
  section_4_eli_pair:
    eli5: "Same toy boxes vs different boxes; one big Lego castle vs many small Lego sets"
    eli10: "12 factors as portability rules; granularity trade-offs (operational simplicity vs team independence)"
  section_5_real_world:
    count: 4
    examples:
      - "Heroku and the birth of 12-factor (2011)"
      - "Netflix · 1,000+ microservices"
      - "Shopify · the modular monolith champion"
      - "The startup that microservices'd too early (cautionary tale)"
  section_6_animated_svg:
    modes: ["Monolith under load", "Modular monolith under load", "Microservices under load"]
    description: "Same load scenario, three architectures. Monolith: whole thing must scale. Modular: same operationally but cleaner internal boundaries. Microservices: only the service that needs scaling scales."
  section_7_flashcards_quiz:
    flashcards: 8
    quiz_questions: 3

shared_artifacts:
  preview_page: { file: "/preview-kubernetes-lesson-04.html" }
  lesson_md: { file: "lesson.md" }
  flashcards: { file: "flashcards.yaml", count: 8 }
  quiz: { file: "quiz.yaml", count: 3 }

bar:
  - "First-timer can name 4-5 of the 12 factors after reading."
  - "First-timer can articulate the monolith vs microservices trade-off."
  - "First-timer would recommend a modular monolith for a 6-engineer startup."

fact_check_anchors:
  - "https://12factor.net — the original manifesto"
  - "https://kubernetes.io/docs/concepts/configuration/overview/"
  - "https://martinfowler.com/articles/microservices.html"
  - "Shopify monolith engineering blog posts"
