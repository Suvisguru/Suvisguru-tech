  - "12factor.net — the canonical 12-factor manifesto"
  - "github.com/cncf/landscape — CNCF landscape"
  - "kubernetes.io/releases/ — release cadence (~3 minor/year, ~14 months patch support)"
  - "github.com/kubernetes/enhancements — KEP process"
  - "kubernetes.io/docs/reference/command-line-tools-reference/feature-gates/ — feature gates and graduation stages"
  - "research.google/pubs/large-scale-cluster-management-at-google-with-borg/ — Borg paper (2015)"
