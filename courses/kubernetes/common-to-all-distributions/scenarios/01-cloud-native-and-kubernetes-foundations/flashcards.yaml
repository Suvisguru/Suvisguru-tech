# Flashcards — Lesson 01, How Kubernetes fixes things on its own
# Total: 5 cards (single-concept lesson, no per-subtopic blocks)

cards:
  - id: 1
    front: "What is a reconciliation loop?"
    back: "A small program that reads what you wanted, observes what actually exists, takes the minimum action to close the gap, and repeats forever. The brain inside a thermostat — and inside Kubernetes."

  - id: 2
    front: "Desired state vs actual state?"
    back: "Desired state is the picture you wrote down (the thermostat dial / a YAML file). Actual state is what's running right now (the thermometer reading / the live cluster). The controller is the loop between them."

  - id: 3
    front: "Why does Kubernetes self-heal?"
    back: "Because the controllers never stop watching. When something breaks, the actual state diverges from the desired state, and the controller takes action to close the gap automatically — like a thermostat firing the furnace when the room cools."

  - id: 4
    front: "Pets vs cattle?"
    back: "A pet is a hand-tuned named server you'd grieve when it dies. Cattle are identical, numbered, replaceable units. Kubernetes treats every machine as cattle — which is exactly what makes self-healing work."

  - id: 5
    front: "Declarative vs imperative configuration?"
    back: "Declarative says 'here's a photo of what I want' (the goal). Imperative says 'do this, then this, then this' (the steps). Kubernetes is declarative — you hand it the photo and the controllers figure out how."
