bar:
  - 'Namespaces are logical, not security boundaries. Multi-tenancy stacks: RBAC + NetworkPolicy + PSA + **ResourceQuota** (cap CPU/mem/object counts per namespace) + **LimitRange** (per-Pod min/max defaults). Run **kube-bench** regularly for CIS Benchmark scoring. Use **HierarchicalNamespaces (HNC)** for namespace trees with inherited policy. For real isolation: **vCluster**, **kata containers**, or separate clusters.'

