bar:
  - '**Kyverno** uses K8s-native YAML for policies (validate / mutate / generate / cleanup / verifyImages). **OPA Gatekeeper** uses Rego (more powerful, harder to learn) via `ConstraintTemplate` + `Constraint`. Both produce **PolicyReport** CRDs (a CNCF standard). Pick Kyverno for K8s-only governance; pick Gatekeeper if you already run OPA for non-K8s policy.'

