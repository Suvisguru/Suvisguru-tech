bar:
  - 'Behind every PVC sits a **CSI driver** — a vendor-supplied plug-in that handles the actual disk plumbing. Once you have a CSI driver you get **snapshots** (point-in-time copies), **cloning** (new PVC from existing PVC or snapshot), **expansion** (grow the disk), and **VolumeAttributesClass** (re-tune performance live, GA in 1.34).'

