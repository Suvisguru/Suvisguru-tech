# Quiz — Lesson 01, What is Kubernetes?
# Total: 3 questions.

questions:
  - id: 1
    pause_animation: true
    prompt: |
      In the animation, the app moves from your request, into the Kubernetes
      wheel, then onto one of the servers. Why does the wheel get to pick
      which server?
    answer: |
      Because that's literally Kubernetes' job. You said "run my app" — you
      didn't say where. Kubernetes looks at all the servers, sees which ones
      have capacity, and picks one. This is called "scheduling." It's the
      reason you don't have to keep track of which app is on which server.

  - id: 2
    prompt: |
      Your team has one small app with three users a day. A friend recommends
      you "move to Kubernetes." Should you?
    answer: |
      Almost certainly not. Kubernetes pays back when you have many services
      and the operations cost of managing them by hand becomes the bottleneck.
      With one tiny app, that bottleneck doesn't exist — you'd be paying the
      cost of running a cluster (a cluster is a small project to keep
      healthy) without getting any benefit. A managed app platform like
      Render or Fly is a better fit.

  - id: 3
    prompt: |
      Why does describing what you want (instead of writing the steps) matter
      so much?
    answer: |
      Because the world keeps changing — servers fail, traffic spikes, new
      versions ship. If your instructions were a list of steps ("first do A,
      then B, then C"), they'd break the moment reality drifted from the
      plan. But if you described what you want ("3 copies running, healthy"),
      Kubernetes can keep adjusting reality to match — forever. The next
      lesson goes deep on this.
