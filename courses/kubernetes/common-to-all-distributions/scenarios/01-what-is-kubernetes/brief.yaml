# Intake brief — Lesson 01, K-COM
# Topic: What is Kubernetes?
# Format: Standard 7-section PROJECT.md structure.
#
# Sequence note (2026-05-02):
#   This lesson is the foundation of the K-COM track. Comes before any
#   discussion of cloud-native principles, containers, or the K8s control plane.
#   Establishes the answer to "what is Kubernetes" so all subsequent lessons
#   have a shared baseline.

lesson:
  title: "What is Kubernetes?"
  slug: "01-what-is-kubernetes"
  domain: "kubernetes"
  course_slug: "common-to-all-distributions"
  position: 1
  granularity: "concept"
  brief_drafted_on: "2026-05-02"

learner_profile:
  prerequisites:
    - "Has used a computer professionally."
    - "Knows that web apps run on servers."
    - "Has heard the word 'Kubernetes' but doesn't know what it is."
  assumed_zero_knowledge_of:
    - "Kubernetes itself."
    - "Containers, virtualization, cloud orchestration."
    - "Pods, deployments, controllers, the K8s control plane."
    - "YAML, declarative config."

learning_outcomes:
  - "Learner can explain in one sentence what Kubernetes is."
  - "Learner can describe what Kubernetes does for them (runs apps, keeps them running, scales them)."
  - "Learner can decide whether they're a candidate for Kubernetes (signal: many services, many teams) vs not (single small app)."
  - "Learner can name the property-manager analogy and apply it to a new scenario."

structure_per_project_md:
  section_1_concept:
    illustration: "Friendly diagram showing description-card → K8s wheel → cluster of 4 servers with apps placed on them"
    word_target: 220
  section_2_before_after:
    illustration: "Side-by-side: stressed engineer with broken server (left), peaceful sleeping engineer with healthy servers (right)"
    word_target_each_side: 80
  section_3_analogy:
    primary: "Property manager"
    illustration: "Friendly building manager character with clipboard standing next to 3 apartment buildings with happy tenants in windows"
  section_4_eli_pair:
    eli5: "Toys + toy boxes + a friend who organizes them. Under 100 words."
    eli10: "Truck dispatcher analogy. 150-250 words."
  section_5_real_world:
    count: 4
    examples:
      - "Streaming media company (200 engineers)"
      - "Regional hospital system (30 engineers)"
      - "Fintech startup (12 engineers — overkill cautionary tale)"
      - "Government agency (compliance use case)"
  section_6_animated_svg:
    modes: ["place an app", "recover from failure", "scale up to 3 copies"]
    description: "Apps flow from your request → through the K8s wheel → onto servers. Mode toggle changes what happens."
  section_7_flashcards_quiz:
    flashcards: 8
    quiz_questions: 3

shared_artifacts:
  preview_page:
    file: "/preview-kubernetes-lesson-01.html"
    visual_style: "Warm cream backgrounds, hand-drawn-feeling rounded shapes, friendly faces on characters where appropriate"
  lesson_md: { file: "lesson.md" }
  flashcards: { file: "flashcards.yaml", count: 8 }
  quiz: { file: "quiz.yaml", count: 3 }

bar:
  - "First-timer can answer 'what is Kubernetes?' in one sentence after this lesson."
  - "First-timer is curious about Lesson 02 (containers), not exhausted."
  - "Visuals look friendly, not like architecture documentation."

fact_check_anchors:
  - "kubernetes.io/docs/concepts/overview/ — what Kubernetes is"
  - "github.com/cncf/landscape — CNCF projects"
