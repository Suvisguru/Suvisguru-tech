# Flashcards — Lesson 01, What is Kubernetes?
# Total: 8 cards.

cards:
  - id: 1
    front: "What is Kubernetes in one sentence?"
    back: "Software that runs your apps across many computers and keeps them running automatically. You describe what you want; it figures out how."

  - id: 2
    front: "Why is it called K8s?"
    back: "Because there are 8 letters between the K and the s in 'Kubernetes.' It's a numeronym — same trick as i18n (internationalization) and a11y (accessibility)."

  - id: 3
    front: "What is a cluster?"
    back: "A group of computers (anywhere from 3 to thousands) that Kubernetes treats as one big pool. Your apps run somewhere on the pool — Kubernetes picks where."

  - id: 4
    front: "What does it mean to 'describe what you want'?"
    back: "You write a small file (usually YAML) that says things like '3 copies of my web app, listening on port 80.' You don't say how to make it happen; Kubernetes works that out."

  - id: 5
    front: "What does 'self-heal' mean?"
    back: "If an app crashes or a server dies, Kubernetes notices in seconds and starts a replacement on a healthy server. No human needs to wake up."

  - id: 6
    front: "What problem does Kubernetes solve?"
    back: "Running many apps across many computers, with auto-recovery, easy scaling, and consistent deploys — without doing it all by hand. It exists because modern apps stopped fitting on a single machine."

  - id: 7
    front: "When is Kubernetes overkill?"
    back: "For a single small app with a small team. The cluster itself becomes work to maintain. Kubernetes pays back when you have many services and many teams sharing one platform."

  - id: 8
    front: "Who made Kubernetes?"
    back: "Engineers at Google open-sourced it in 2014, based on Google's internal system called Borg. It's now governed by the Cloud Native Computing Foundation (CNCF)."
