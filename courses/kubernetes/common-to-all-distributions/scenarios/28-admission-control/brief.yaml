bar:
  - 'Admission runs *after* auth/RBAC, *before* persistence. **Mutating** admission can rewrite the object (add defaults, inject sidecars). **Validating** admission can accept or reject. Three modern tools: **Pod Security Admission (PSA)** for the standard Pod-security profiles, **ValidatingAdmissionPolicy (VAP)** for CEL-based rules in-cluster (no webhook needed, GA 1.30), and **policy webhooks** (Kyverno, OPA Gatekeeper) for richer logic.'

