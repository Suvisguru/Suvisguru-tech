bar:
  - 'Four-step triage: **(1) Reproduce** the issue. **(2) Observe + measure** with logs / events / metrics / traces. **(3) Hypothesise** a cause. **(4) Test + verify** the fix. The K8s evidence kit: `kubectl describe` (events!), `kubectl get events`, `kubectl logs --previous`, `kubectl debug`, `kubectl top`, the observability stack from L32-L33. Common failure patterns cluster around: image pulls, resource limits, storage, networking, admission policy, certificates.'

