# Intake brief — Lesson 07, K-COM
# Topic: Kubernetes History · CNCF · Releases · KEPs · Feature Gates
# Format: Standard 7-section PROJECT.md structure (mirrors approved Lessons 01-06).

lesson:
  title: "Kubernetes History · CNCF · Releases · KEPs · Feature Gates"
  slug: "07-history-cncf-releases-keps"
  domain: "kubernetes"
  course_slug: "common-to-all-distributions"
  position: 7
  granularity: "concept"
  brief_drafted_on: "2026-05-02"
  central_metaphor: "train-line testing — alpha (quiet branch) → beta (moderately busy) → GA (main intercity)"
  module: "Module 1 final lesson"

learner_profile:
  prerequisites:
    - "Lessons 01-06 (Kubernetes basics, containers, cloud-native, app design, fit decision, operating model)"
  assumed_zero_knowledge_of:
    - "The Borg → Omega → Kubernetes lineage."
    - "What CNCF is and what it does."
    - "The release cadence and support windows."
    - "KEPs (Kubernetes Enhancement Proposals)."
    - "Feature gates and the alpha/beta/GA stages."
    - "Conformance vs vendor-specific features."

learning_outcomes:
  - "Learner can name the Borg → Omega → K8s lineage and key dates."
  - "Learner can explain what the CNCF is and that K8s was its first graduated project."
  - "Learner can name the ~3-releases-per-year cadence and ~14-month support window."
  - "Learner can describe a KEP and the SIG review process."
  - "Learner can explain alpha/beta/GA and why GA-only is the right production rule."
  - "Learner understands Certified Kubernetes vs 'Kubernetes-compatible' marketing."

structure_per_project_md:
  section_1_concept:
    illustration: "Hero: 3 train scenes side-by-side — alpha (quiet branch line, broken signal, broken cart with 💥), beta (moderately busy, yellow signal, sturdy cart), GA (main intercity, green signal, sleek modern train with windows)"
    word_target: 320
  section_1_5_topics:
    illustration: "5 tile cards (one per topic) with icon + name + tagline + small SVG + description"
    description: "Lineage · CNCF · Releases · KEPs · Feature gates"
  section_1_7_gates:
    illustration: "3 gate cards side-by-side (alpha/beta/GA) with bullet points per stage"
    description: "Alpha/Beta/GA in detail — defaults, stability, production rule"
  section_2_before_after:
    illustration: "2014 (6 competing orchestrators in a grid) vs today (one big K8s, with EKS/AKS/GKE/on-prem distros below)"
    word_target_each_side: 80
  section_3_analogy:
    primary: "Train-line testing for new signals"
    illustration: "Already shown in hero"
  section_4_eli_pair:
    eli5: "Test new train signals on a quiet line first. Under 100 words."
    eli10: "Lineage + CNCF + cadence + KEPs + 3 stages. 150-250 words."
  section_5_real_world:
    count: 4
    examples:
      - "Platform team's 'GA only in prod' rule (avoids beta-change pain)"
      - "'Kubernetes-compatible' vs 'Certified Kubernetes' (the marketing trap)"
      - "Tracking KEPs to plan a year ahead"
      - "Quarterly K8s upgrade cadence (latest in dev, minus-one in prod)"
  section_6_animated_svg:
    modes: ["Alpha", "Beta", "GA", "Full lifecycle"]
    description: "Same feature, three stages. Stage badge changes color/shape. Properties grid updates (default state, API stability, deprecation, production fit). Adoption bar grows from ~10% (alpha) to ~40% (beta) to ~90% (GA)."
  section_7_flashcards_quiz:
    flashcards: 8
    quiz_questions: 3

shared_artifacts:
  preview_page: { file: "/preview-kubernetes-lesson-07.html" }
  lesson_md: { file: "lesson.md" }
  flashcards: { file: "flashcards.yaml", count: 8 }
  quiz: { file: "quiz.yaml", count: 3 }

bar:
  - "First-timer can name lineage (Borg → Omega → K8s) and key dates."
  - "First-timer can explain why production should use GA-only features."
  - "First-timer understands Certified Kubernetes is a real CNCF program (not marketing)."

fact_check_anchors:
  - "Borg paper: research.google/pubs/large-scale-cluster-management-at-google-with-borg/"
  - "Omega paper: research.google/pubs/omega-flexible-scalable-schedulers-for-large-compute-clusters/"
  - "https://kubernetes.io/releases/ — release cadence"
  - "https://github.com/kubernetes/enhancements — KEP process"
  - "https://kubernetes.io/docs/reference/command-line-tools-reference/feature-gates/"
  - "https://www.cncf.io/training/certification/software-conformance/ — Certified Kubernetes"
