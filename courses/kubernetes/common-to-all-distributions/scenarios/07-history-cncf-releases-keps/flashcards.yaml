# Flashcards — Lesson 07, History · CNCF · Releases · KEPs · Feature Gates
# Total: 8 cards.

cards:
  - id: 1
    front: "What is the Kubernetes lineage?"
    back: "Borg (Google internal since early 2000s, paper 2015) → Omega (Google research, paper 2013) → Kubernetes (open-sourced June 2014, 1.0 in July 2015, CNCF first graduated project March 2018). 'K8s' = K + 8 letters + s."

  - id: 2
    front: "What is the CNCF?"
    back: "Cloud Native Computing Foundation. Linux Foundation project formed 2015. Hosts vendor-neutral cloud-native open-source projects. K8s was its first graduated project (March 2018). landscape.cncf.io shows hundreds of projects."

  - id: 3
    front: "Current K8s release cadence?"
    back: "Roughly 3 minor releases per year (since 2023; was 4/year before). Each minor release is patched for ~14 months (12 months active + ~2 months EOL transition). The most recent 3 minors are supported at any time."

  - id: 4
    front: "What is a KEP?"
    back: "Kubernetes Enhancement Proposal — a markdown document in github.com/kubernetes/enhancements reviewed by the relevant SIG (Special Interest Group). Any non-trivial change goes through a KEP."

  - id: 5
    front: "What is a feature gate?"
    back: "A runtime flag that turns an individual feature on or off. Default depends on stage. Per-component flag (--feature-gates). Cluster-wide on managed services."

  - id: 6
    front: "What does 'alpha' mean?"
    back: "Alpha = off by default, may change incompatibly or be removed without deprecation, may be buggy. Production rule: use only in dev/test clusters. Reserve for evaluation, not real workloads."

  - id: 7
    front: "What does 'GA' mean?"
    back: "General Availability. Stable. On by default. Backward-compatible behaviour. Multi-release deprecation cycle if removal ever happens. The default choice for production."

  - id: 8
    front: "What is conformance?"
    back: "CNCF Certified Kubernetes program. Distributions that pass the test suite (run via hydrophone, historically sonobuoy) can call themselves Certified Kubernetes. Vendor-specific features sit OUTSIDE conformance — they're product additions."
