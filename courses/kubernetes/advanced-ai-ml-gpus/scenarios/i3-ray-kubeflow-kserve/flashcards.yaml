# Flashcards — K-ADV-AI I (count: 8)

cards:
  - id: 1
    front: |
      KubeRay three CRDs?
    back: |
      **RayCluster** (long-running), **RayJob** (one-shot), **RayService** (serving).

  - id: 2
    front: |
      Kubeflow Training Operator job kinds?
    back: |
      **PyTorchJob**, **TFJob**, **MPIJob**, **XGBoostJob**, **PaddleJob**.

  - id: 3
    front: |
      What does Kubeflow Pipelines do?
    back: |
      DAG workflow engine (Argo-based) for ML — preprocess → train → eval → deploy. Reusable components + parameterized.

  - id: 4
    front: |
      KServe InferenceService components?
    back: |
      **predictor** (per-framework runtime: vLLM / Triton / TF Serving / sklearn), **transformer** (pre/post-processing), **explainer** (interpretability).

  - id: 5
    front: |
      KServe autoscaling options?
    back: |
      **Knative serverless** (scale-to-zero on idle) or **HPA** (CPU / mem / requests). Knative for bursty / cost-sensitive; HPA for steady.

  - id: 6
    front: |
      JobSet vs Job?
    back: |
      **Job** = single-template parallel Pods. **JobSet** = multiple Job templates (replicaJobs) — for distributed training where each replica may differ.

  - id: 7
    front: |
      Katib — what does it do?
    back: |
      HPO (hyperparameter optimization) — random / Bayesian / TPE / NAS. Spawns Trial Pods; collects metrics; converges to best params.

  - id: 8
    front: |
      ServingRuntime in KServe?
    back: |
      Per-framework runtime template — declares container image + protocol + capabilities. ServingRuntime `kserve-vllm` + InferenceService picks it for vLLM serving.
