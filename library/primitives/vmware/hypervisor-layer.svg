<?xml version="1.0" encoding="UTF-8"?>
<!--
  Primitive: hypervisor-layer
  Domain: vmware
  Status: draft, pending founder approval (lesson 01)

  Description: A horizontal band representing the hypervisor software layer.
  Renders between the physical host (below) and the VMs (above). The visual
  spine that says "this is the abstraction layer."

  Default viewBox: 480 x 30 (width matched to rack-server-rear chassis interior).

  Color: slate #3F4A5E. NEW palette entry. Reserved for software-layer
  abstractions (hypervisor and similar). Distinct from networking teal,
  storage coral, encapsulation purple, failure red, healthy green, inactive
  gray. See STYLE.md (proposed addition) and DECISIONS.md (proposed entry).

  Slot anchors:
    label_center: (240, 20) for the "hypervisor" label, centered

  States:
    idle    Single static band. No animation.
    active  Optional: a packet flowing between VM and host can be drawn as
            passing through this band; the band itself does not change.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 30" width="480" height="30">

  <symbol id="hypervisor-layer" overflow="visible">
    <rect x="0" y="0" width="480" height="30" fill="#3F4A5E" stroke="#1F2433" stroke-width="1"/>
    <line x1="0" y1="8"  x2="480" y2="8"  stroke="#536179" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="15" x2="480" y2="15" stroke="#536179" stroke-width="0.5" opacity="0.6"/>
    <line x1="0" y1="22" x2="480" y2="22" stroke="#536179" stroke-width="0.5" opacity="0.6"/>
    <text x="240" y="20" font-family="sans-serif" font-size="13" font-weight="500"
          fill="#E8E8E0" text-anchor="middle" letter-spacing="1.5">hypervisor</text>
  </symbol>

  <!-- Preview render -->
  <use href="#hypervisor-layer"/>
</svg>
