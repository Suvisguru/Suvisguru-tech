<?xml version="1.0" encoding="UTF-8"?>
<!--
  Primitive: utilization-meter
  Domain: vmware
  Status: draft, pending founder approval (lesson 01)

  Description: A horizontal bar showing CPU/RAM utilization on a server or
  host. Same primitive used for the small per-server meter in pre-virt mode
  and the larger host meter in post-virt mode (consumer applies a transform
  scale to enlarge).

  Default viewBox: 100 x 18.

  Color convention: a single neutral fill #5A6B81 regardless of percentage.
  The pedagogical contrast is conveyed by fill *level* and the numeric label,
  not by color shifts. See DECISIONS.md (proposed entry) for why color does
  not encode value here.

  Consumer overrides:
    - Set the .utilization-fill rect width to (percentage * 1.0) to scale 0-100.
    - Set the .utilization-label tspan/text content to the percentage string.

  States: same primitive across all values; only the fill width and label change.
  Animations: typically driven by SMIL on the .utilization-fill rect's width
  attribute (e.g., bounce 3-12% in pre-virt mode; bounce 60-75% in post-virt mode).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 18" width="100" height="18">

  <symbol id="utilization-meter" overflow="visible">
    <rect x="0" y="4" width="100" height="10" rx="2" fill="#E0E0DE" stroke="#9D9D9D" stroke-width="0.5"/>
    <rect x="0" y="4" width="50" height="10" rx="2" fill="#5A6B81" class="utilization-fill"/>
    <text x="50" y="13" font-family="sans-serif" font-size="9" font-weight="500"
          fill="#3A3A3A" text-anchor="middle" class="utilization-label">50%</text>
  </symbol>

  <!-- Preview render -->
  <use href="#utilization-meter"/>
</svg>
