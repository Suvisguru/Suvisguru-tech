<?xml version="1.0" encoding="UTF-8"?>
<!--
  Primitive: pod-tile
  Domain: kubernetes
  Status: draft, lesson 01 production (Cloud-Native and Kubernetes Foundations).

  Description: A Kubernetes Pod rendered as a small labelled card. The pod is
  the smallest schedulable unit in Kubernetes. A pod has one or more
  containers that share a network namespace, IP, and storage volumes. This
  primitive shows a single-container pod by default; multi-container pods are
  represented by stacking additional container squares inside.

  Default viewBox: 110 x 78.

  Slot anchors:
    name_text:   (8,  13)  pod name in header bar
    container_a: (10, 30)  first container square (16 x 16)
    container_b: (32, 30)  second container square (sidecar) — shown only in multi-container variant
    pod_ip_text: (8,  56)  pod IP label
    status_dot:  (100, 9)  status indicator (top-right)
    phase_text:  (8,  70)  phase label (Running / Pending / etc.)

  States:
    pending   Status dot #FAC775, container squares hollow.
    running   Status dot #5DCAA5 opacity 1.0, container squares filled.
    failed    Status dot #E24B4A, container square red border.
    terminating Status dot #5F5E5A, dashed border on body.

  Color: pod body uses warm cream #F4F4F0 (same as vm-tile for cross-domain
  consistency). Container squares are slate #3F4A5E (the software-layer
  abstraction color from STYLE.md, since a container *is* a software-layer
  thing — process group with isolation).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 78" width="110" height="78">

  <symbol id="pod-tile" overflow="visible">
    <!-- Pod body -->
    <rect x="0" y="0" width="110" height="78" rx="6" ry="6"
          fill="#F4F4F0" stroke="#5F5E5A" stroke-width="1.2"/>
    <!-- Pod header bar (top 18px) -->
    <path d="M 0 18 L 0 6 Q 0 0 6 0 L 104 0 Q 110 0 110 6 L 110 18 Z"
          fill="#3F4A5E"/>
    <text x="9" y="13" font-family="sans-serif" font-size="11" font-weight="500" fill="#FFFFFF">pod-name</text>
    <!-- Container square (single-container default) -->
    <rect x="10" y="26" width="16" height="16" rx="2"
          fill="#3F4A5E" stroke="#1F2433" stroke-width="0.8"/>
    <text x="18" y="37" font-family="sans-serif" font-size="9" font-weight="500"
          fill="#FFFFFF" text-anchor="middle">C</text>
    <!-- Pod identity labels -->
    <text x="32" y="33" font-family="sans-serif" font-size="11" fill="#3A3A3A">1 container</text>
    <text x="10" y="56" font-family="sans-serif" font-size="9" fill="#5F5E5A">IP 10.244.1.5</text>
    <text x="10" y="70" font-family="sans-serif" font-size="9" font-weight="500" fill="#1F8A60">Running</text>
    <!-- Status dot -->
    <circle cx="100" cy="9" r="2.8" fill="#5DCAA5" class="pod-status"/>
  </symbol>

  <use href="#pod-tile"/>
</svg>
