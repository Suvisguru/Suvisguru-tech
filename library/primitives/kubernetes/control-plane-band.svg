<?xml version="1.0" encoding="UTF-8"?>
<!--
  Primitive: control-plane-band
  Domain: kubernetes
  Status: draft, lesson 01 production (Cloud-Native and Kubernetes Foundations).

  Description: A horizontal band representing the Kubernetes control plane
  collectively (kube-apiserver + etcd + kube-scheduler + kube-controller-manager
  + cloud-controller-manager). Renders above the worker nodes in any frame
  that explicitly shows the cluster's control vs data plane separation.

  Distinct from the VMware hypervisor-layer band: same slate fill family
  (software-layer abstraction, per STYLE.md / DECISIONS.md 2026-04-29) but
  carries four small "component dots" along its length to suggest "this band
  is composed of multiple coordinating services" — whereas the hypervisor
  band's hairlines suggest "code layer."

  Default viewBox: 600 x 56.

  Slot anchors:
    label_center:    (300, 16) top label "control plane"
    component_dots:  (90, 36), (220, 36), (380, 36), (510, 36)
                     for api-server, etcd, scheduler, controller-manager
    component_labels: rendered below dots at y 50

  States:
    healthy   All four dots #5DCAA5 (green).
    degraded  One or more dots #FAC775 or #E24B4A.

  The band itself is static — animations layer over it (e.g., a request
  flowing into api-server, then etcd, then back).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 56" width="600" height="56">

  <symbol id="control-plane-band" overflow="visible">
    <!-- Slate band -->
    <rect x="0" y="0" width="600" height="56" rx="4"
          fill="#3F4A5E" stroke="#1F2433" stroke-width="1"/>
    <!-- Top label -->
    <text x="300" y="14" font-family="sans-serif" font-size="11" font-weight="500"
          fill="#E8E8E0" text-anchor="middle" letter-spacing="1.5">control plane</text>
    <!-- Four component dots + labels -->
    <g class="cp-component" data-component="apiserver">
      <circle cx="90" cy="32" r="6" fill="#5DCAA5"/>
      <text x="90" y="50" font-family="sans-serif" font-size="9" fill="#E8E8E0"
            text-anchor="middle">kube-apiserver</text>
    </g>
    <g class="cp-component" data-component="etcd">
      <circle cx="220" cy="32" r="6" fill="#5DCAA5"/>
      <text x="220" y="50" font-family="sans-serif" font-size="9" fill="#E8E8E0"
            text-anchor="middle">etcd</text>
    </g>
    <g class="cp-component" data-component="scheduler">
      <circle cx="380" cy="32" r="6" fill="#5DCAA5"/>
      <text x="380" y="50" font-family="sans-serif" font-size="9" fill="#E8E8E0"
            text-anchor="middle">kube-scheduler</text>
    </g>
    <g class="cp-component" data-component="controller-manager">
      <circle cx="510" cy="32" r="6" fill="#5DCAA5"/>
      <text x="510" y="50" font-family="sans-serif" font-size="9" fill="#E8E8E0"
            text-anchor="middle">controller-manager</text>
    </g>
  </symbol>

  <use href="#control-plane-band"/>
</svg>
